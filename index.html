<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JEX — JTED Stock Exchange</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#161b27;--bg3:#1c2333;--border:#1e2d47;--border2:#253450;
  --text:#e8e6e1;--text2:#8896a8;--text3:#4a5568;
  --amber:#f0a500;--amber2:#f7c842;
  --green:#00c896;--red:#ff4d6a;--blue:#378ADD;--blue2:#185FA5;
  --purple:#534AB7;--teal:#1D9E75;
  --radius:8px;--radius-lg:12px;
  --font:'DM Sans',system-ui,sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
body{font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);min-height:100vh}
#app{display:flex;flex-direction:column;min-height:100vh}

/* Layout */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:40}
.logo{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:10px}
.logo .jex{color:var(--amber)}
.logo .sep{width:1px;height:16px;background:var(--border)}
.logo .full{font-family:var(--font);font-size:12px;font-weight:300;color:var(--text2)}
.user-pill{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500}
.av-s{background:rgba(55,138,221,0.2);color:#85B7EB}
.av-c{background:rgba(240,165,0,0.15);color:var(--amber)}
.av-a{background:rgba(83,74,183,0.2);color:#AFA9EC}
.logout-btn{font-size:12px;color:var(--text3);cursor:pointer;padding:3px 8px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--text2);font-family:var(--font)}
.logout-btn:hover{background:var(--bg3)}
.session-banner{display:flex;align-items:center;justify-content:space-between;padding:7px 20px;font-size:12px;border-bottom:1px solid var(--border)}
.s-open{background:rgba(0,200,150,0.08);color:var(--green)}
.s-closed{background:rgba(255,77,106,0.08);color:var(--red)}
.s-paused{background:rgba(240,165,0,0.08);color:var(--amber)}
.timer{font-family:var(--mono);font-size:16px;font-weight:500;margin-left:8px}
.nav{display:flex;gap:2px;padding:6px 20px;border-bottom:1px solid var(--border);background:var(--bg2);flex-wrap:wrap}
.nav-btn{font-size:13px;padding:5px 12px;border-radius:var(--radius);cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:var(--font)}
.nav-btn:hover{background:var(--bg3)}
.nav-btn.active{background:var(--bg);color:var(--text);font-weight:500;border:1px solid var(--border)}
.content{flex:1;padding:20px;overflow:auto;max-width:1200px;margin:0 auto;width:100%}

/* Cards & Tables */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:14px}
.section-title{font-size:15px;font-weight:500;margin-bottom:14px;color:var(--text)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:14px}
.mcard{background:var(--bg3);border-radius:var(--radius);padding:12px 14px}
.mlabel{font-size:11px;color:var(--text2);margin-bottom:4px}
.mval{font-size:22px;font-weight:500}
.mval.green{color:var(--green)}.mval.red{color:var(--red)}.mval.amber{color:var(--amber)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-weight:500;font-size:11px;color:var(--text2);padding:6px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid rgba(30,45,71,0.5);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
th.r,td.r{text-align:right}

/* Badges */
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px}
.b-green{background:rgba(0,200,150,0.12);color:var(--green)}
.b-red{background:rgba(255,77,106,0.12);color:var(--red)}
.b-amber{background:rgba(240,165,0,0.12);color:var(--amber)}
.b-blue{background:rgba(55,138,221,0.15);color:#85B7EB}
.b-gray{background:rgba(136,150,168,0.12);color:var(--text2)}
.b-purple{background:rgba(83,74,183,0.15);color:#AFA9EC}
.b-teal{background:rgba(0,200,150,0.1);color:var(--teal)}
.b-coral{background:rgba(255,77,106,0.1);color:#FF8099}

/* Forms */
input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;font-family:var(--font);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(55,138,221,0.15)}
.frow{margin-bottom:12px}
.flabel{font-size:12px;color:var(--text2);margin-bottom:5px;display:block}

/* Buttons */
.btn{padding:7px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text);font-family:var(--font);transition:background 0.15s}
.btn:hover{background:var(--bg3)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:var(--blue2)}
.btn-success{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn-success:hover{background:#0F6E56}
.btn-danger{background:var(--red);color:#fff;border-color:var(--red)}
.btn-danger:hover{background:#cc2240}
.btn-warning{background:#BA7517;color:#fff;border-color:#BA7517}
.btn-warning:hover{background:#854F0B}
.btn-purple{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn-purple:hover{background:#3C3489}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-row{display:flex;gap:6px;flex-wrap:wrap}
.row{display:flex;gap:10px;align-items:flex-start}
.ot-toggle{display:flex;border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;width:fit-content;margin-bottom:14px}
.ot-btn{font-size:13px;padding:6px 18px;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:var(--font)}
.ot-buy{background:var(--teal);color:#fff}
.ot-sell{background:var(--red);color:#fff}
.ot-short{background:var(--purple);color:#fff}
.ot-cover{background:#BA7517;color:#fff}

/* Misc UI */
.price-up{color:var(--green)}.price-down{color:var(--red)}
.empty{text-align:center;padding:32px;color:var(--text2);font-size:13px}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.tab-row{display:flex;gap:2px;margin-bottom:14px;flex-wrap:wrap}
.tab{font-size:13px;padding:5px 12px;cursor:pointer;border-radius:var(--radius);color:var(--text2);border:none;background:transparent;font-family:var(--font)}
.tab:hover{background:var(--bg3)}
.tab.active{background:var(--bg3);color:var(--text);font-weight:500}
.app-row{display:flex;align-items:flex-start;justify-content:space-between;padding:12px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;gap:12px}
.app-info{flex:1}.app-name{font-size:13px;font-weight:500}.app-meta{font-size:12px;color:var(--text2);margin-top:2px}
.ibox{border-radius:var(--radius);padding:10px 12px;font-size:12px;margin-bottom:12px}
.ibox-amber{background:rgba(240,165,0,0.08);border:1px solid rgba(240,165,0,0.2);color:var(--amber)}
.ibox-teal{background:rgba(0,200,150,0.07);border:1px solid rgba(0,200,150,0.2);color:var(--teal)}
.ibox-blue{background:rgba(55,138,221,0.08);border:1px solid rgba(55,138,221,0.2);color:#85B7EB}
.ibox-purple{background:rgba(83,74,183,0.1);border:1px solid rgba(83,74,183,0.25);color:#AFA9EC}
.ibox-green{background:rgba(0,200,150,0.07);border:1px solid rgba(0,200,150,0.2);color:var(--green)}
.sbar-wrap{min-width:90px}
.sbar-bg{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:4px}
.sbar-fill{height:4px;border-radius:2px;background:var(--blue)}
.short-pos{background:rgba(83,74,183,0.08);border:1px solid rgba(83,74,183,0.2);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px}
.ticker-bar{display:flex;gap:10px;overflow-x:auto;padding:6px 0;margin-bottom:14px;scrollbar-width:none}
.ticker-item{background:var(--bg3);border-radius:var(--radius);padding:8px 12px;min-width:88px;flex-shrink:0;cursor:pointer;border:1px solid transparent}
.ticker-item:hover{border-color:var(--border2)}
.ticker-item.active-t{border-color:var(--blue)}
.ticker-item.watched{border-color:var(--teal)}
.tsym{font-size:11px;font-weight:500;font-family:var(--mono)}.tprice{font-size:15px;font-weight:500;font-family:var(--mono)}.tchg{font-size:11px}
.lb-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);gap:12px}
.lb-row:last-child{border-bottom:none}
.lb-rank{font-size:18px;font-weight:500;min-width:32px;font-family:var(--mono)}
.r-gold{color:var(--amber)}.r-silver{color:var(--text2)}.r-bronze{color:#993C1D}
.lb-name{flex:1;font-weight:500}.lb-val{font-size:14px;font-weight:500;font-family:var(--mono)}
.wstar{cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;border:none;background:transparent;color:var(--text3)}
.wstar:hover{background:var(--bg3)}.wstar.on{color:var(--amber)}
.reg-tabs{display:flex;border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;width:100%}
.reg-tab{flex:1;font-size:13px;padding:8px;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:var(--font);text-align:center}
.reg-tab.active{background:var(--bg3);color:var(--text);font-weight:500}
.link-btn{background:none;border:none;color:var(--blue);font-size:12px;cursor:pointer;padding:0;font-family:var(--font);text-decoration:underline}
.toast{position:fixed;bottom:20px;right:20px;background:#1c2333;color:var(--text);padding:10px 16px;border-radius:var(--radius);font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;max-width:320px;border:1px solid var(--border2);box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.toast.show{opacity:1}

/* Login */
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);padding:20px}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;width:100%;max-width:400px}
.login-logo{font-family:var(--mono);font-size:22px;font-weight:600;margin-bottom:4px}
.login-logo .jex{color:var(--amber)}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:22px}
.acct-list{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:8px}
.acct-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border)}
.acct-item:last-child{border-bottom:none}
.acct-item:hover{background:var(--bg3)}
.acct-name{font-size:13px;font-weight:500}.acct-email{font-size:11px;color:var(--text2)}
.reset-btn-sm{font-size:11px;color:var(--red);cursor:pointer;padding:3px 8px;border:1px solid rgba(255,77,106,0.3);border-radius:4px;background:transparent;font-family:var(--font)}
.reset-btn-sm:hover{background:rgba(255,77,106,0.08)}
.success-box{background:rgba(0,200,150,0.07);border:1px solid rgba(0,200,150,0.2);border-radius:var(--radius);padding:10px 12px;font-size:12px;color:var(--green);margin-bottom:12px}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
// STORAGE — uses localStorage instead of window.storage
// ═══════════════════════════════════════════════════════════
const STORAGE_KEY='jex-standalone-v1';
const STARTING_CASH=10000;
const CO_CASH=5000;
const SECURITY_QUESTIONS=[
  "What is the name of your first pet?",
  "What city were you born in?",
  "What is your mother's maiden name?",
  "What was the name of your first school?",
  "What is your favourite book?",
  "What was the make of your first car?",
  "What is your oldest sibling's middle name?",
  "What street did you grow up on?"
];

const SESSION_KEY='jex-session-v1';
function loadState(){
  try{const r=localStorage.getItem(STORAGE_KEY);if(r)return JSON.parse(r);}catch(e){}
  return null;
}
function loadSession(){
  try{return localStorage.getItem(SESSION_KEY)||null;}catch(e){return null;}
}
function saveState(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify({
    users:S.users,pendingRegistrations:S.pendingRegistrations,
    companies:S.companies,ipoApplications:S.ipoApplications,
    dilutionApplications:S.dilutionApplications,dividendHistory:S.dividendHistory,
    buybackHistory:S.buybackHistory,orders:S.orders,trades:S.trades,
    nextOrderId:S.nextOrderId,session:S.session
  }));
  if(UI.userId)localStorage.setItem(SESSION_KEY,UI.userId);
  else localStorage.removeItem(SESSION_KEY);
  }catch(e){}
}

// ═══════════════════════════════════════════════════════════
// DEFAULT STATE
// ═══════════════════════════════════════════════════════════
const DEFAULT={
  users:[
    {id:'u1',name:'Alex Chen',role:'student',email:'alex@jted.edu',password:'alex1234',secQ:SECURITY_QUESTIONS[0],secA:'fluffy',cash:STARTING_CASH,holdings:{},shorts:{},watchlist:[],status:'approved'},
    {id:'u2',name:'Sam Patel',role:'student',email:'sam@jted.edu',password:'sam1234',secQ:SECURITY_QUESTIONS[1],secA:'london',cash:STARTING_CASH,holdings:{},shorts:{},watchlist:[],status:'approved'},
    {id:'u3',name:'Jordan Lee',role:'student',email:'jordan@jted.edu',password:'jordan1234',secQ:SECURITY_QUESTIONS[2],secA:'smith',cash:STARTING_CASH,holdings:{},shorts:{},watchlist:[],status:'approved'},
    {id:'u_admin',name:'Admin',role:'admin',email:'admin@jted.edu',password:'admin1234',secQ:SECURITY_QUESTIONS[0],secA:'jex',cash:0,holdings:{},status:'approved'}
  ],
  pendingRegistrations:[],
  companies:[
    {id:'c1',name:'ByteWave',ticker:'BWV',price:45,shares:1000,sharesAvail:800,status:'listed',ownerId:null,description:'Cloud software startup',priceHistory:[{p:42,t:'Open'},{p:43,t:'T1'},{p:44,t:'T2'},{p:45,t:'Now'}],financials:[]},
    {id:'c2',name:'SolarPeak',ticker:'SPK',price:28.5,shares:1500,sharesAvail:1200,status:'listed',ownerId:null,description:'Renewable energy',priceHistory:[{p:27,t:'Open'},{p:28,t:'T1'},{p:28.5,t:'Now'}],financials:[]},
    {id:'c3',name:'NovaMed',ticker:'NVM',price:61,shares:500,sharesAvail:400,status:'listed',ownerId:null,description:'Biotech research',priceHistory:[{p:58,t:'Open'},{p:59,t:'T1'},{p:61,t:'Now'}],financials:[]}
  ],
  ipoApplications:[],dilutionApplications:[],dividendHistory:[],buybackHistory:[],
  orders:[],trades:[],nextOrderId:1,
  session:{status:'open',endsAt:null,label:'Trading session open'}
};

let S=loadState()||JSON.parse(JSON.stringify(DEFAULT));
// UI state (not persisted) — restore userId from session storage
const _savedUserId=loadSession();
let UI={
  userId:_savedUserId&&S.users.find(u=>u.id===_savedUserId)?_savedUserId:null,
  navTab:'market',adminTab:'registrations',appTab:'status',
  companyTab:'stock',portfolioTab:'holdings',loginView:'select',
  pendingLoginId:null,forgotUserId:null,panelTicker:null,panelMode:'buy'
};
let charts={};
let sessionTimer=null;

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
const get=id=>document.getElementById(id);
const fmt=n=>'$'+Number(n).toFixed(2);
const fmtChg=n=>(n>=0?'+':'')+Number(n).toFixed(2)+'%';
const norm=s=>(s||'').trim().toLowerCase();
const validEmail=e=>e&&e.includes('@')&&e.includes('.');
const cu=()=>S.users.find(u=>u.id===UI.userId)||null;
const getUser=id=>S.users.find(u=>u.id===id);
const getCo=t=>S.companies.find(c=>c.ticker===t);
const priceChg=c=>{if(c.priceHistory.length<2)return 0;const f=c.priceHistory[0].p,l=c.priceHistory[c.priceHistory.length-1].p;return f?((l-f)/f*100):0;};
const pv=u=>Object.entries(u.holdings||{}).reduce((s,[t,q])=>{const c=getCo(t);return s+(c?c.price*q:0);},0);
const sPnl=u=>Object.entries(u.shorts||{}).reduce((s,[t,pos])=>{const c=getCo(t);if(!c)return s;return s+Math.round((pos.avgPrice-c.price)*pos.qty*100)/100;},0);
const divRec=u=>S.dividendHistory.reduce((s,d)=>{const p=d.payouts&&d.payouts.find(x=>x.userId===u.id);return s+(p?p.payout:0);},0);
const nw=u=>Math.round((u.cash+pv(u)+sPnl(u))*100)/100;
const isOpen=()=>S.session.status==='open';
const requireOpen=()=>{if(!isOpen()){toast('Trading is '+S.session.status+'. Wait for the session to open.');return false;}return true;};
const shareholders=ticker=>S.users.filter(u=>u.role==='student'&&u.holdings&&(u.holdings[ticker]||0)>0);
const divTotal=(ticker,ps)=>shareholders(ticker).reduce((s,u)=>s+Math.round((u.holdings[ticker]||0)*ps*100)/100,0);
const impactPrice=(co,qty,dir)=>{
  const liq=co.shares*0.05,impact=Math.min((qty/liq)*0.015,0.12);
  return Math.max(0.01,Math.round((dir==='buy'?co.price*(1+impact):co.price*(1-impact))*100)/100);
};
const isWatched=ticker=>{const u=cu();return u&&u.watchlist&&u.watchlist.includes(ticker);};

function toast(msg){const t=get('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

function save(){saveState();}

function destroyCharts(){Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};}

// ═══════════════════════════════════════════════════════════
// SESSION
// ═══════════════════════════════════════════════════════════
function startTimer(mins){
  clearInterval(sessionTimer);
  S.session={status:'open',endsAt:Date.now()+mins*60000,label:'Session — '+mins+'min'};
  save();
  sessionTimer=setInterval(()=>{
    const rem=S.session.endsAt-Date.now();
    if(rem<=0){S.session={status:'closed',endsAt:null,label:'Session ended'};clearInterval(sessionTimer);save();render();toast('Session ended!');return;}
    const el=get('timer-el');if(el){const m=Math.floor(rem/60000),s=Math.floor((rem%60000)/1000);el.textContent=m+':'+(s<10?'0':'')+s;}
  },500);
  render();
}
function setSession(status){
  S.session.status=status;S.session.label=status==='open'?'Session open':status==='paused'?'Session paused':'Session closed';
  if(status!=='open'){clearInterval(sessionTimer);S.session.endsAt=null;}
  save();render();
}

// ═══════════════════════════════════════════════════════════
// REGISTRATION & AUTH
// ═══════════════════════════════════════════════════════════
function registerStudent(name,email,pw,secQ,secA){
  if(!name||name.trim().length<2)return toast('Enter a valid name');
  if(!validEmail(email))return toast('Enter a valid email');
  if(!pw||pw.length<4)return toast('Password must be at least 4 characters');
  if(!secQ)return toast('Select a security question');
  if(!secA||secA.trim().length<2)return toast('Enter a security answer');
  const n=name.trim();
  if(S.users.find(u=>norm(u.name)===norm(n))||S.pendingRegistrations.find(r=>norm(r.name)===norm(n)))return toast('Name already taken');
  S.pendingRegistrations.push({id:'reg'+Date.now(),name:n,email:norm(email),password:pw,secQ,secA:norm(secA),role:'student',ts:new Date().toLocaleTimeString()});
  toast('Registration submitted! Wait for admin approval.');save();UI.loginView='select';render();
}
function registerCompany(name,email,pw,desc,secQ,secA){
  if(!name||name.trim().length<2)return toast('Enter a valid company name');
  if(!validEmail(email))return toast('Enter a valid email');
  if(!pw||pw.length<4)return toast('Password must be at least 4 characters');
  if(!desc||desc.trim().length<5)return toast('Please add a description');
  if(!secQ)return toast('Select a security question');
  if(!secA||secA.trim().length<2)return toast('Enter a security answer');
  const n=name.trim();
  if(S.users.find(u=>norm(u.name)===norm(n))||S.pendingRegistrations.find(r=>norm(r.name)===norm(n)))return toast('Name already taken');
  S.pendingRegistrations.push({id:'reg'+Date.now(),name:n,email:norm(email),password:pw,secQ,secA:norm(secA),role:'company',description:desc.trim(),ts:new Date().toLocaleTimeString()});

function execTrade(buyerId,sellerId,ticker,qty,price){
  const buyer=getUser(buyerId),co=getCo(ticker);if(!buyer||!co)return false;
  if(buyer.cash<qty*price)return toast('Insufficient funds'),false;
  buyer.holdings=buyer.holdings||{};buyer.holdings[ticker]=(buyer.holdings[ticker]||0)+qty;
  buyer.cash=Math.round((buyer.cash-qty*price)*100)/100;
  if(sellerId){const seller=getUser(sellerId);if(seller){seller.holdings=seller.holdings||{};seller.holdings[ticker]=(seller.holdings[ticker]||0)-qty;if(seller.holdings[ticker]<=0)delete seller.holdings[ticker];seller.cash=Math.round((seller.cash+qty*price)*100)/100;}}
  else co.sharesAvail=Math.max(0,co.sharesAvail-qty);
  co.price=price;co.priceHistory=[...co.priceHistory,{p:price,t:new Date().toLocaleTimeString()}];
  S.trades.push({id:S.trades.length+1,ticker,qty,price,buyerId,sellerId:sellerId||'exchange',ts:new Date().toLocaleTimeString()});
  return true;
}
function placeBuy(ticker,qty){
  if(!requireOpen())return;
  const u=cu(),co=getCo(ticker);if(!u||!co)return;
  qty=parseInt(qty);if(isNaN(qty)||qty<=0)return toast('Enter a valid quantity');
  if(co.sharesAvail<qty)return toast('Only '+co.sharesAvail+' shares available');
  const np=impactPrice(co,qty,'buy'),cost=Math.round(np*qty*100)/100;
  if(u.cash<cost)return toast('Insufficient funds (need '+fmt(cost)+')');
  execTrade(u.id,null,ticker,qty,np);toast('Bought '+qty+' × '+ticker+' @ '+fmt(np));save();openPanel(ticker);
}
function placeSell(ticker,qty){
  if(!requireOpen())return;
  const u=cu(),co=getCo(ticker);if(!u||!co)return;
  qty=parseInt(qty);if(isNaN(qty)||qty<=0)return toast('Enter a valid quantity');
  const held=(u.holdings||{})[ticker]||0;if(held<qty)return toast('You only hold '+held+' shares');
  const np=impactPrice(co,qty,'sell');
  u.holdings[ticker]=held-qty;if(u.holdings[ticker]<=0)delete u.holdings[ticker];
  u.cash=Math.round((u.cash+qty*np)*100)/100;co.sharesAvail+=qty;co.price=np;
  co.priceHistory=[...co.priceHistory,{p:np,t:new Date().toLocaleTimeString()}];
  S.trades.push({id:S.trades.length+1,ticker,qty,price:np,buyerId:'exchange',sellerId:u.id,ts:new Date().toLocaleTimeString()});
  toast('Sold '+qty+' × '+ticker+' @ '+fmt(np));save();openPanel(ticker);
}
function placeShort(ticker,qty){
  if(!requireOpen())return;
  const u=cu(),co=getCo(ticker);if(!u||!co)return;
  qty=parseInt(qty);if(isNaN(qty)||qty<=0)return toast('Enter a valid quantity');
  const price=co.price,coll=Math.round(price*qty*1.5*100)/100;
  if(u.cash<coll)return toast('Need '+fmt(coll)+' collateral');
  u.shorts=u.shorts||{};if(!u.shorts[ticker])u.shorts[ticker]={qty:0,avgPrice:0,collateral:0};
  const ex=u.shorts[ticker],tq=ex.qty+qty;
  ex.avgPrice=Math.round(((ex.avgPrice*ex.qty)+(price*qty))/tq*100)/100;
  ex.qty=tq;ex.collateral=Math.round((ex.collateral+coll)*100)/100;
  u.cash=Math.round((u.cash-coll)*100)/100;
  co.price=impactPrice(co,qty,'sell');co.priceHistory=[...co.priceHistory,{p:co.price,t:new Date().toLocaleTimeString()}];
  S.trades.push({id:S.trades.length+1,ticker,qty,price,buyerId:'short',sellerId:u.id,ts:new Date().toLocaleTimeString(),type:'short'});
  toast('Shorted '+qty+' × '+ticker+' @ '+fmt(price));save();openPanel(ticker);
}
function coverShort(ticker,qty){
  if(!requireOpen())return;
  const u=cu(),co=getCo(ticker);if(!u||!co)return;
  qty=parseInt(qty);if(isNaN(qty)||qty<=0)return toast('Enter a valid quantity');
  const short=u.shorts&&u.shorts[ticker];if(!short||short.qty<qty)return toast('You only have '+(short?.qty||0)+' shorted');
  const cp=impactPrice(co,qty,'buy'),pnl=Math.round((short.avgPrice-cp)*qty*100)/100;
  const cb=Math.round((short.collateral*(qty/short.qty))*100)/100;
  u.cash=Math.round((u.cash+cb+pnl)*100)/100;short.qty-=qty;short.collateral=Math.round((short.collateral-cb)*100)/100;
  if(short.qty<=0)delete u.shorts[ticker];
  co.price=cp;co.priceHistory=[...co.priceHistory,{p:cp,t:new Date().toLocaleTimeString()}];
  S.trades.push({id:S.trades.length+1,ticker,qty,price:cp,buyerId:u.id,sellerId:'cover',ts:new Date().toLocaleTimeString(),type:'cover'});
  toast('Covered '+qty+' × '+ticker+' | P&L: '+(pnl>=0?'+':'')+fmt(pnl));save();openPanel(ticker);
}
function toggleWatch(ticker){
  const u=cu();if(!u)return;u.watchlist=u.watchlist||[];
  const i=u.watchlist.indexOf(ticker);
  if(i>=0){u.watchlist.splice(i,1);toast(ticker+' removed from watchlist');}
  else{u.watchlist.push(ticker);toast(ticker+' added to watchlist');}
  save();render();
}
function doBuyback(ticker,qty){
  if(!requireOpen())return;
  const owner=cu(),co=getCo(ticker);if(!owner||!co)return;
  qty=parseInt(qty);if(isNaN(qty)||qty<=0)return toast('Enter valid quantity');
  const sold=co.shares-co.sharesAvail;if(qty>sold)return toast('Only '+sold+' shares in circulation');
  const price=impactPrice(co,qty,'buy'),cost=Math.round(price*qty*100)/100;
  if(owner.cash<cost)return toast('Insufficient funds (need '+fmt(cost)+')');
  owner.cash=Math.round((owner.cash-cost)*100)/100;co.sharesAvail+=qty;co.shares-=qty;
  co.price=price;co.priceHistory=[...co.priceHistory,{p:price,t:'Buyback'}];
  S.buybackHistory.push({id:'bb'+Date.now(),ticker,companyName:co.name,qty,price,total:cost,ts:new Date().toLocaleTimeString()});
  toast('Bought back '+qty+' shares @ '+fmt(price));save();render();
}
function issueDividend(ticker,perShare,note){
  const co=getCo(ticker),owner=cu();if(!co||!owner)return;
  perShare=Math.round(parseFloat(perShare)*100)/100;
  if(isNaN(perShare)||perShare<=0)return toast('Enter a valid dividend per share');
  if(!note||note.trim().length<5)return toast('Please add a note');
  const sh=shareholders(ticker);if(!sh.length)return toast('No shareholders yet');
  const total=divTotal(ticker,perShare);
  if(owner.cash<total)return toast('Insufficient funds (need '+fmt(total)+')');
  if(!confirm('Pay '+fmt(perShare)+'/share? Total: '+fmt(total)))return;
  owner.cash=Math.round((owner.cash-total)*100)/100;
  const payouts=[];
  for(const s of sh){const shares=s.holdings[ticker]||0,payout=Math.round(shares*perShare*100)/100;s.cash=Math.round((s.cash+payout)*100)/100;payouts.push({userId:s.id,name:s.name,shares,payout});}
  S.dividendHistory.push({id:'div'+Date.now(),ticker,companyName:co.name,perShare,total,note:note.trim(),payouts,ts:new Date().toLocaleTimeString()});
  toast(co.name+' paid '+fmt(perShare)+'/share');save();UI.companyTab='dividends';render();
}
function submitIPO(name,ticker,price,shares,desc){
  if(!name||!ticker||!price||!shares)return toast('Fill in all fields');
  ticker=ticker.toUpperCase();
  if(S.companies.find(c=>c.ticker===ticker)||S.ipoApplications.find(a=>a.ticker===ticker))return toast('Ticker already exists');
  S.ipoApplications.push({id:'app'+Date.now(),userId:UI.userId,name,ticker,price:parseFloat(price),shares:parseInt(shares),desc,status:'pending',ts:new Date().toLocaleTimeString()});

function reviewIPO(id,approve){

  else{const o=getUser(app.userId);if(o)o.appStatus='rejected';toast('IPO rejected');}

function submitDilution(ticker,newShares,reason){
  if(!newShares||parseInt(newShares)<=0)return toast('Enter valid share count');
  if(!reason||reason.trim().length<10)return toast('Reason too short');
  const co=getCo(ticker);if(!co)return;
  if(S.dilutionApplications.find(d=>d.ticker===ticker&&d.status==='pending'))return toast('Already pending');
  newShares=parseInt(newShares);
  S.dilutionApplications.push({id:'dil'+Date.now(),ticker,companyName:co.name,currentShares:co.shares,newShares,pctIncrease:Math.round((newShares/co.shares)*100),reason:reason.trim(),status:'pending',userId:UI.userId,ts:new Date().toLocaleTimeString()});
  toast('Dilution application submitted');save();UI.companyTab='dilution';render();
}
function reviewDilution(id,approve){
  const app=S.dilutionApplications.find(d=>d.id===id);if(!app)return;
  app.status=approve?'approved':'rejected';
  if(approve){const co=getCo(app.ticker);if(!co)return;const old=co.shares;co.shares+=app.newShares;co.sharesAvail+=app.newShares;const np=Math.max(0.01,Math.round(co.price*(old/co.shares)*100)/100);co.price=np;co.priceHistory=[...co.priceHistory,{p:np,t:'Dilution'}];toast(app.companyName+': +'+app.newShares+' shares');}
  else toast('Dilution rejected');
  save();render();
}
function postFinancials(ticker,rev,profit,summary){

const isDark=true;
const CGRID='rgba(255,255,255,0.05)',CTEXT='#4a5568';
function buildChart(canvasId,co){
  const canvas=get(canvasId);if(!canvas||!window.Chart)return;
  const pts=co.priceHistory,prices=pts.map(p=>p.p),labels=pts.map((p,i)=>i===pts.length-1?'Now':p.t);
  const isUp=prices[prices.length-1]>=prices[0],lc=isUp?'#00c896':'#ff4d6a';
  charts[canvasId]=new Chart(canvas,{type:'line',data:{labels,datasets:[{data:prices,borderColor:lc,borderWidth:2,pointRadius:pts.length>30?0:3,pointBackgroundColor:lc,fill:false,tension:0.3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmt(ctx.parsed.y)}}},
      scales:{x:{grid:{color:CGRID},ticks:{color:CTEXT,font:{size:11},maxTicksLimit:8,autoSkip:true}},y:{grid:{color:CGRID},ticks:{color:CTEXT,font:{size:11},callback:v=>fmt(v)},beginAtZero:false}}}});
}

function impactPreview(co,qty,dir){

}
function shortPrev(co,qty){if(!qty||qty<=0)return '';const c=Math.round(co.price*qty*1.5*100)/100;return `<div style="font-size:12px;margin-top:6px;padding:6px 10px;background:rgba(83,74,183,0.1);border-radius:var(--radius);color:#AFA9EC">Short ${qty} @ ${fmt(co.price)} | Collateral: <strong>${fmt(c)}</strong></div>`;}

  return `<div class="login-page"><div class="login-card">

    <div class="login-sub">Sign in to your account</div>

    </div>
  </div></div>`;
}

// login action handlers
function doLogin(){loginWith(UI.pendingLoginId,get('login-pw')?.value);}
function doForgot1(){forgotStep1(get('forgot-email')?.value||'');}
function doForgot2(){forgotStep2(get('forgot-ans')?.value||'');}
function doForgot3(){forgotStep3(get('forgot-pw1')?.value||'',get('forgot-pw2')?.value||'');}
function switchRegTab(type){
  document.querySelectorAll('.reg-tab').forEach(t=>t.classList.remove('active'));
  const tab=get('reg-tab-'+type);if(tab)tab.classList.add('active');
  get('reg-student-fields').style.display=type==='student'?'':'none';
  get('reg-company-fields').style.display=type==='company'?'':'none';
}
function doRegister(){
  const active=document.querySelector('.reg-tab.active');
  const type=active?.id==='reg-tab-company'?'company':'student';
  if(type==='student')registerStudent(get('reg-name')?.value,get('reg-email')?.value,get('reg-pw')?.value,get('reg-secq')?.value,get('reg-secq-answer')?.value);
  else registerCompany(get('reg-co-name')?.value,get('reg-co-email')?.value,get('reg-co-pw')?.value,get('reg-co-desc')?.value,get('reg-co-secq')?.value,get('reg-co-secq-answer')?.value);
}

    </div>`;

}
function renderMarket(){
  const listed=S.companies.filter(c=>c.status==='listed'),u=cu();
  return `${renderTickerBar()}
    <div class="card"><div class="section-title">Listed companies</div>

function openPanel(ticker){
  UI.panelTicker=ticker;
  const c=getCo(ticker),u=cu();
  const held=(u.holdings||{})[ticker]||0,chg=priceChg(c),short=u.shorts&&u.shorts[ticker];
  destroyCharts();
  // re-render market so ticker bar updates
  document.getElementById('market-content').innerHTML=renderMarket();
  const panel=get('trade-panel');if(!panel)return;
  const mode=UI.panelMode,fin=c.financials&&c.financials[0];
  panel.innerHTML=`<div class="card" style="border-color:var(--blue)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div><span style="font-weight:500;font-size:15px">${c.name}</span> <span class="badge b-gray" style="font-family:var(--mono)">${ticker}</span>
        <button class="wstar ${isWatched(ticker)?'on':''}" onclick="toggleWatch('${ticker}');openPanel('${ticker}')" style="margin-left:6px">${isWatched(ticker)?'★':'☆'}</button>
      </div>
      <button class="btn btn-sm" onclick="closePanel()">close</button>
    </div>
    <div class="grid4">
      <div class="mcard"><div class="mlabel">Price</div><div class="mval" style="font-family:var(--mono)">${fmt(c.price)}</div></div>
      <div class="mcard"><div class="mlabel">Your cash</div><div class="mval" style="font-family:var(--mono)">${fmt(u.cash)}</div></div>
      <div class="mcard"><div class="mlabel">You hold</div><div class="mval">${held} shares</div></div>
      <div class="mcard"><div class="mlabel">Short position</div><div class="mval ${short?'red':''}">${short?short.qty+' @ '+fmt(short.avgPrice):'—'}</div></div>
    </div>
    <div style="position:relative;height:160px;margin-bottom:10px"><canvas id="panel-chart"></canvas></div>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:10px">
      <span>${c.priceHistory.length} pts | Open: ${fmt(c.priceHistory[0]?.p||c.price)}</span>
      <span class="${chg>=0?'price-up':'price-down'}">${fmtChg(chg)}</span>
    </div>
    ${fin?`<div style="font-size:12px;padding:8px 10px;background:var(--bg3);border-radius:var(--radius);margin-bottom:10px">Latest: Rev <strong>${fmt(fin.revenue)}</strong> | Profit <strong>${fmt(fin.profit)}</strong> — <span style="color:var(--text2)">${fin.summary}</span></div>`:''}
    <hr class="divider">
    <div class="ot-toggle">
      <button class="ot-btn ${mode==='buy'?'ot-buy':''}" onclick="setPanelMode('buy','${ticker}')">Buy</button>
      <button class="ot-btn ${mode==='sell'?'ot-sell':''}" onclick="setPanelMode('sell','${ticker}')">Sell</button>
      <button class="ot-btn ${mode==='short'?'ot-short':''}" onclick="setPanelMode('short','${ticker}')">Short</button>
      ${short?`<button class="ot-btn ${mode==='cover'?'ot-cover':''}" onclick="setPanelMode('cover','${ticker}')">Cover</button>`:''}
    </div>
    ${mode==='buy'?`<p style="font-size:12px;color:var(--text2);margin-bottom:8px">Buy pushes price up. Available: <strong>${c.sharesAvail}</strong> of ${c.shares.toLocaleString()}.</p>
      <div class="row" style="align-items:flex-end"><div class="frow" style="flex:1"><label class="flabel">Quantity</label><input type="number" id="t-qty" value="1" min="1" max="${c.sharesAvail}"></div>
      <div style="padding-bottom:12px"><button class="btn btn-success" onclick="doBuy('${ticker}')">Buy now</button></div></div>
      <div id="t-preview">${impactPreview(c,1,'buy')}</div>`
    :mode==='sell'?`<p style="font-size:12px;color:var(--text2);margin-bottom:8px">Sell pushes price down. You hold: <strong>${held}</strong>.</p>
      ${held>0?`<div class="row" style="align-items:flex-end"><div class="frow" style="flex:1"><label class="flabel">Quantity</label><input type="number" id="t-qty" value="1" min="1" max="${held}"></div>
      <div style="padding-bottom:12px"><button class="btn btn-danger" onclick="doSell('${ticker}')">Sell now</button></div></div>
      <div id="t-preview">${impactPreview(c,1,'sell')}</div>`:`<div class="empty" style="padding:16px">You don't hold any ${ticker}.</div>`}`
    :mode==='short'?`<div class="ibox ibox-purple">Borrow and sell shares expecting price to fall. Requires 1.5× collateral.</div>
      <div class="row" style="align-items:flex-end"><div class="frow" style="flex:1"><label class="flabel">Quantity to short</label><input type="number" id="t-qty" value="1" min="1"></div>
      <div style="padding-bottom:12px"><button class="btn btn-purple" onclick="doShort('${ticker}')">Short sell</button></div></div>
      <div id="t-preview">${shortPrev(c,1)}</div>`
    :short?`<div class="ibox ibox-purple">Buy back borrowed shares to close your position.</div>
      <div style="font-size:13px;margin-bottom:10px">Open: <strong>${short.qty} shares</strong> @ avg ${fmt(short.avgPrice)} | P&L: <span class="${(short.avgPrice-c.price)*short.qty>=0?'price-up':'price-down'}">${fmt((short.avgPrice-c.price)*short.qty)}</span></div>
      <div class="row" style="align-items:flex-end"><div class="frow" style="flex:1"><label class="flabel">Quantity to cover</label><input type="number" id="t-qty" value="${short.qty}" min="1" max="${short.qty}"></div>
      <div style="padding-bottom:12px"><button class="btn btn-warning" onclick="doCover('${ticker}')">Cover short</button></div></div>
      <div id="t-preview">${impactPreview(c,short.qty,'buy')}</div>`:''}
  </div>`;
  const qi=get('t-qty');
  if(qi){qi.addEventListener('input',()=>{const q=parseInt(qi.value)||0,p=get('t-preview');if(!p)return;if(mode==='buy')p.innerHTML=impactPreview(c,q,'buy');else if(mode==='sell')p.innerHTML=impactPreview(c,q,'sell');else if(mode==='short')p.innerHTML=shortPrev(c,q);else if(mode==='cover')p.innerHTML=impactPreview(c,q,'buy');});}
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
  setTimeout(()=>buildChart('panel-chart',c),50);
}
function closePanel(){UI.panelTicker=null;destroyCharts();document.getElementById('market-content').innerHTML=renderMarket();}
function setPanelMode(m,t){UI.panelMode=m;openPanel(t);}
function doBuy(t){placeBuy(t,get('t-qty')?.value);}
function doSell(t){placeSell(t,get('t-qty')?.value);}
function doShort(t){placeShort(t,get('t-qty')?.value);}

function getAZTime(){
  // Arizona never observes DST — always UTC-7
  const now=new Date();
  const az=new Date(now.toLocaleString('en-US',{timeZone:'America/Phoenix'}));
  return az;
}
function fmtAZTime(d){
  return d.toLocaleString('en-US',{timeZone:'America/Phoenix',weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true})+' MST';
}
function scheduleSession(){
  const startH=parseInt(get('sched-start-h')?.value||'8');
  const startM=parseInt(get('sched-start-m')?.value||'0');
  const endH=parseInt(get('sched-end-h')?.value||'15');
  const endM=parseInt(get('sched-end-m')?.value||'0');
  if(isNaN(startH)||isNaN(startM)||isNaN(endH)||isNaN(endM))return toast('Enter valid times');
  const az=getAZTime();
  const startTotalMin=startH*60+startM;
  const endTotalMin=endH*60+endM;
  if(endTotalMin<=startTotalMin)return toast('End time must be after start time');
  const nowTotalMin=az.getHours()*60+az.getMinutes();
  if(nowTotalMin>=endTotalMin)return toast('End time has already passed in Arizona time');
  // If we're before or at start, session opens at start; if between start and end, open now
  if(nowTotalMin<startTotalMin){
    // Schedule open for later — store as a pending schedule
    S.session.scheduledOpen={h:startH,m:startM};
    S.session.scheduledClose={h:endH,m:endM};
    S.session.status='closed';
    S.session.label='Scheduled: opens '+pad(startH)+':'+pad(startM)+' – '+pad(endH)+':'+pad(endM)+' MST';
    S.session.endsAt=null;
    toast('Session scheduled for '+pad(startH)+':'+pad(startM)+' – '+pad(endH)+':'+pad(endM)+' AZ time');
  } else {
    // Open now, close at endTime
    const msUntilEnd=((endH*60+endM)-nowTotalMin)*60*1000-az.getSeconds()*1000;
    S.session.scheduledOpen=null;
    S.session.scheduledClose={h:endH,m:endM};
    S.session.status='open';
    S.session.label='Open until '+pad(endH)+':'+pad(endM)+' MST';
    S.session.endsAt=Date.now()+msUntilEnd;
    toast('Session open until '+pad(endH)+':'+pad(endM)+' AZ time');
  }
  save();render();
}
function pad(n){return n<10?'0'+n:String(n);}
function checkSchedule(){
  if(!S.session.scheduledOpen&&!S.session.scheduledClose)return;
  const az=getAZTime();
  const nowMin=az.getHours()*60+az.getMinutes();
  if(S.session.scheduledOpen){
    const openMin=S.session.scheduledOpen.h*60+S.session.scheduledOpen.m;
    const closeMin=S.session.scheduledClose.h*60+S.session.scheduledClose.m;
    if(nowMin>=openMin&&nowMin<closeMin&&S.session.status!=='open'){
      const msUntilEnd=(closeMin-nowMin)*60*1000-az.getSeconds()*1000;
      S.session.status='open';S.session.label='Open until '+pad(S.session.scheduledClose.h)+':'+pad(S.session.scheduledClose.m)+' MST';
      S.session.endsAt=Date.now()+msUntilEnd;S.session.scheduledOpen=null;
      save();render();toast('Trading session is now open!');
    }
  }
  if(S.session.scheduledClose&&S.session.status==='open'&&S.session.endsAt&&Date.now()>=S.session.endsAt){
    S.session.status='closed';S.session.label='Session ended';S.session.endsAt=null;S.session.scheduledClose=null;
    save();render();toast('Trading session has ended.');
  }
}
// Poll schedule every 15s
setInterval(checkSchedule,15000);

function downloadCSV(){
  const csv=window._jexCSV;if(!csv)return;
  const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='jex_balances.csv';a.click();URL.revokeObjectURL(url);
}
function removeUser(uid){
  const u=getUser(uid);if(!u)return;
  if(!confirm('Remove '+u.name+' from JEX? This will delete their account, holdings, and orders. This cannot be undone.'))return;
  // Remove their orders
  S.orders=S.orders.filter(o=>o.userId!==uid);
  // Remove their trades (keep for history but mark them)
  // Remove their watchlist / holdings from state (already on the user object being deleted)
  // Remove from dividend payouts
  S.dividendHistory.forEach(d=>{d.payouts=d.payouts.filter(p=>p.userId!==uid);});
  // Remove user
  S.users=S.users.filter(u=>u.id!==uid);
  toast(u.name+' removed from JEX');save();render();
}
function removeCompany(uid){
  const u=getUser(uid);if(!u)return;
  const listedCo=S.companies.find(c=>c.ownerId===uid);
  const msg='Remove company account: '+u.name+'?'+(listedCo?'\n\nThis company has a stock listed on the exchange ('+listedCo.ticker+'). The listing will also be delisted and removed. Existing trades will remain in history.':'')+'\n\nThis cannot be undone.';
  if(!confirm(msg))return;
  // Delist the company if listed
  if(listedCo){
    S.companies=S.companies.filter(c=>c.ownerId!==uid);
    // Remove any open orders for that ticker
    S.orders=S.orders.filter(o=>o.ticker!==listedCo.ticker);
    // Remove pending IPO/dilution applications
    S.ipoApplications=S.ipoApplications.filter(a=>a.userId!==uid);
    S.dilutionApplications=S.dilutionApplications.filter(d=>d.userId!==uid);
    S.buybackHistory=S.buybackHistory.filter(b=>b.ticker!==listedCo.ticker);
  }
  S.users=S.users.filter(x=>x.id!==uid);
  toast(u.name+(listedCo?' and '+listedCo.ticker+' delisted':'')+' — removed');save();render();
}
function delistCompany(ticker){
  const co=S.companies.find(c=>c.ticker===ticker);if(!co)return;
  if(!confirm('Delist '+co.name+' ('+ticker+') from the exchange? All open orders for this stock will be cancelled. Trades and price history will remain. This cannot be undone.'))return;
  S.companies=S.companies.filter(c=>c.ticker!==ticker);
  S.orders=S.orders.filter(o=>o.ticker!==ticker);
  S.dilutionApplications=S.dilutionApplications.filter(d=>d.ticker!==ticker);
  S.buybackHistory=S.buybackHistory.filter(b=>b.ticker!==ticker);
  toast(co.name+' delisted from JEX');save();render();
}

function getPageContent(){
  const t=UI.navTab;
  if(t==='market')return`<div id="market-content">${renderMarket()}</div>`;
  if(t==='portfolio')return renderPortfolio();
  if(t==='leaderboard')return renderLeaderboard();
  if(t==='orders')return renderOrders();
  if(t==='trades')return renderTrades(cu()?.role==='admin');
  if(t==='apply')return renderApply();
  if(t==='mystock')return renderMyStock();
  if(t==='admin')return renderAdmin();
  if(t==='settings')return renderSettings();
  return '';
}

function render(){
  destroyCharts();
  const app=document.getElementById('app');
  if(!UI.userId){app.innerHTML=renderLogin();return;}
  const u=cu();if(!u){UI.userId=null;app.innerHTML=renderLogin();return;}

  app.innerHTML=`
    ${renderTopbar()}
    ${renderBanner()}
    ${renderNav()}
    <div class="content">${getPageContent()}</div>
  `;

  // restart timer display if session running
  if(S.session.endsAt&&!sessionTimer){
    sessionTimer=setInterval(()=>{
      const rem=S.session.endsAt-Date.now();
      if(rem<=0){S.session={status:'closed',endsAt:null,label:'Session ended'};clearInterval(sessionTimer);sessionTimer=null;save();render();toast('Session ended!');return;}
      const el=get('timer-el');if(el){const m=Math.floor(rem/60000),s=Math.floor((rem%60000)/1000);el.textContent=m+':'+(s<10?'0':'')+s;}
      const al=get('admin-timer-txt');if(al)al.textContent=Math.max(0,Math.round(rem/1000))+'s';
    },500);
  }

  // Build charts after paint
  setTimeout(()=>{
    if(UI.navTab==='mystock'&&UI.companyTab==='stock'){
      const co=S.companies.find(c=>c.ownerId===UI.userId);if(co)buildChart('co-chart',co);
    }
  },60);
}

function setTab(t){UI.navTab=t;UI.panelTicker=null;destroyCharts();render();}
function logout(){UI.userId=null;UI.navTab='market';UI.loginView='select';UI.panelTicker=null;destroyCharts();try{localStorage.removeItem(SESSION_KEY);}catch(e){}render();}

render();
</script>
</body>
</html>
