<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JEX — JTED Stock Exchange</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#161b27;--bg3:#1c2333;--border:#1e2d47;--border2:#253450;
  --text:#e8e6e1;--text2:#8896a8;--text3:#4a5568;
  --amber:#f0a500;--green:#00c896;--red:#ff4d6a;--blue:#378ADD;--blue2:#185FA5;
  --purple:#534AB7;--teal:#1D9E75;
  --radius:8px;--radius-lg:12px;
  --font:'DM Sans',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace;
}
body{font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);min-height:100vh}
#app{display:flex;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:40}
.logo{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:10px}
.logo .jex{color:var(--amber)}.logo .sep{width:1px;height:16px;background:var(--border)}.logo .full{font-family:var(--font);font-size:12px;font-weight:300;color:var(--text2)}
.user-pill{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500}
.av-s{background:rgba(55,138,221,0.2);color:#85B7EB}.av-c{background:rgba(240,165,0,0.15);color:var(--amber)}.av-a{background:rgba(83,74,183,0.2);color:#AFA9EC}
.logout-btn{font-size:12px;cursor:pointer;padding:3px 8px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--text2);font-family:var(--font)}
.logout-btn:hover{background:var(--bg3)}
.session-banner{display:flex;align-items:center;justify-content:space-between;padding:7px 20px;font-size:12px;border-bottom:1px solid var(--border)}
.s-open{background:rgba(0,200,150,0.08);color:var(--green)}.s-closed{background:rgba(255,77,106,0.08);color:var(--red)}.s-paused{background:rgba(240,165,0,0.08);color:var(--amber)}
.timer{font-family:var(--mono);font-size:16px;font-weight:500;margin-left:8px}
.nav{display:flex;gap:2px;padding:6px 20px;border-bottom:1px solid var(--border);background:var(--bg2);flex-wrap:wrap}
.nav-btn{font-size:13px;padding:5px 12px;border-radius:var(--radius);cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:var(--font)}
.nav-btn:hover{background:var(--bg3)}.nav-btn.active{background:var(--bg);color:var(--text);font-weight:500;border:1px solid var(--border)}
.content{flex:1;padding:20px;overflow:auto;max-width:1200px;margin:0 auto;width:100%}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:14px}
.section-title{font-size:15px;font-weight:500;margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:14px}
.mcard{background:var(--bg3);border-radius:var(--radius);padding:12px 14px}
.mlabel{font-size:11px;color:var(--text2);margin-bottom:4px}.mval{font-size:22px;font-weight:500}
.mval.green{color:var(--green)}.mval.red{color:var(--red)}.mval.amber{color:var(--amber)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-weight:500;font-size:11px;color:var(--text2);padding:6px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid rgba(30,45,71,0.5);vertical-align:middle}
tr:last-child td{border-bottom:none}tr:hover td{background:var(--bg3)}
th.r,td.r{text-align:right}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px}
.b-green{background:rgba(0,200,150,0.12);color:var(--green)}.b-red{background:rgba(255,77,106,0.12);color:var(--red)}
.b-amber{background:rgba(240,165,0,0.12);color:var(--amber)}.b-blue{background:rgba(55,138,221,0.15);color:#85B7EB}
.b-gray{background:rgba(136,150,168,0.12);color:var(--text2)}.b-purple{background:rgba(83,74,183,0.15);color:#AFA9EC}
.b-teal{background:rgba(0,200,150,0.1);color:var(--teal)}.b-coral{background:rgba(255,77,106,0.1);color:#FF8099}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;font-family:var(--font);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(55,138,221,0.15)}
.frow{margin-bottom:12px}.flabel{font-size:12px;color:var(--text2);margin-bottom:5px;display:block}
.btn{padding:7px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text);font-family:var(--font);transition:background 0.15s}
.btn:hover{background:var(--bg3)}.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-primary:hover{background:var(--blue2)}
.btn-success{background:var(--teal);color:#fff;border-color:var(--teal)}.btn-success:hover{background:#0F6E56}
.btn-danger{background:var(--red);color:#fff;border-color:var(--red)}.btn-danger:hover{background:#cc2240}
.btn-warning{background:#BA7517;color:#fff;border-color:#BA7517}.btn-warning:hover{background:#854F0B}
.btn-purple{background:var(--purple);color:#fff;border-color:var(--purple)}.btn-purple:hover{background:#3C3489}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-row{display:flex;gap:6px;flex-wrap:wrap}.row{display:flex;gap:10px;align-items:flex-start}
.ot-toggle{display:flex;border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;width:fit-content;margin-bottom:14px}
.ot-btn{font-size:13px;padding:6px 18px;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:var(--font)}
.ot-buy{background:var(--teal);color:#fff}.ot-sell{background:var(--red);color:#fff}.ot-short{background:var(--purple);color:#fff}.ot-cover{background:#BA7517;color:#fff}
.price-up{color:var(--green)}.price-down{color:var(--red)}
.empty{text-align:center;padding:32px;color:var(--text2);font-size:13px}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.tab-row{display:flex;gap:2px;margin-bottom:14px;flex-wrap:wrap}
.tab{font-size:13px;padding:5px 12px;cursor:pointer;border-radius:var(--radius);color:var(--text2);border:none;background:transparent;font-family:var(--font)}
.tab:hover{background:var(--bg3)}.tab.active{background:var(--bg3);color:var(--text);font-weight:500}
.app-row{display:flex;align-items:flex-start;justify-content:space-between;padding:12px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;gap:12px}
.app-info{flex:1}.app-name{font-size:13px;font-weight:500}.app-meta{font-size:12px;color:var(--text2);margin-top:2px}
.ibox{border-radius:var(--radius);padding:10px 12px;font-size:12px;margin-bottom:12px}
.ibox-amber{background:rgba(240,165,0,0.08);border:1px solid rgba(240,165,0,0.2);color:var(--amber)}
.ibox-teal{background:rgba(0,200,150,0.07);border:1px solid rgba(0,200,150,0.2);color:var(--teal)}
.ibox-blue{background:rgba(55,138,221,0.08);border:1px solid rgba(55,138,221,0.2);color:#85B7EB}
.ibox-purple{background:rgba(83,74,183,0.1);border:1px solid rgba(83,74,183,0.25);color:#AFA9EC}
.ibox-green{background:rgba(0,200,150,0.07);border:1px solid rgba(0,200,150,0.2);color:var(--green)}
.ibox-red{background:rgba(255,77,106,0.08);border:1px solid rgba(255,77,106,0.2);color:var(--red)}
.sbar-wrap{min-width:90px}.sbar-bg{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:4px}.sbar-fill{height:4px;border-radius:2px;background:var(--blue)}
.short-pos{background:rgba(83,74,183,0.08);border:1px solid rgba(83,74,183,0.2);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px}
.ticker-bar{display:flex;gap:10px;overflow-x:auto;padding:6px 0;margin-bottom:14px;scrollbar-width:none}
.ticker-item{background:var(--bg3);border-radius:var(--radius);padding:8px 12px;min-width:88px;flex-shrink:0;cursor:pointer;border:1px solid transparent}
.ticker-item:hover{border-color:var(--border2)}.ticker-item.active-t{border-color:var(--blue)}.ticker-item.watched{border-color:var(--teal)}
.tsym{font-size:11px;font-weight:500;font-family:var(--mono)}.tprice{font-size:15px;font-weight:500;font-family:var(--mono)}.tchg{font-size:11px}
.lb-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);gap:12px}
.lb-row:last-child{border-bottom:none}
.lb-rank{font-size:18px;font-weight:500;min-width:32px;font-family:var(--mono)}
.r-gold{color:var(--amber)}.r-silver{color:var(--text2)}.r-bronze{color:#993C1D}
.lb-name{flex:1;font-weight:500}.lb-val{font-size:14px;font-weight:500;font-family:var(--mono)}
.wstar{cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;border:none;background:transparent;color:var(--text3)}
.wstar:hover{background:var(--bg3)}.wstar.on{color:var(--amber)}
.reg-tabs{display:flex;border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;width:100%}
.reg-tab{flex:1;font-size:13px;padding:8px;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:var(--font);text-align:center}
.reg-tab.active{background:var(--bg3);color:var(--text);font-weight:500}
.link-btn{background:none;border:none;color:var(--blue);font-size:12px;cursor:pointer;padding:0;font-family:var(--font);text-decoration:underline}
.toast{position:fixed;bottom:20px;right:20px;background:#1c2333;color:var(--text);padding:10px 16px;border-radius:var(--radius);font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;max-width:320px;border:1px solid var(--border2);box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.toast.show{opacity:1}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--amber);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);padding:20px}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;width:100%;max-width:400px}
.login-logo{font-family:var(--mono);font-size:22px;font-weight:600;margin-bottom:4px}
.login-logo .jex{color:var(--amber)}.login-sub{font-size:13px;color:var(--text2);margin-bottom:22px}
.acct-list{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:8px}
.acct-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border)}
.acct-item:last-child{border-bottom:none}.acct-item:hover{background:var(--bg3)}
.acct-name{font-size:13px;font-weight:500}.acct-email{font-size:11px;color:var(--text2)}
.reset-btn-sm{font-size:11px;color:var(--red);cursor:pointer;padding:3px 8px;border:1px solid rgba(255,77,106,0.3);border-radius:4px;background:transparent;font-family:var(--font)}
.success-box{background:rgba(0,200,150,0.07);border:1px solid rgba(0,200,150,0.2);border-radius:var(--radius);padding:10px 12px;font-size:12px;color:var(--green);margin-bottom:12px}
.config-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:var(--bg)}
.config-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;width:100%;max-width:520px}
</style>
</head>
<body>
<div id="app"><div class="loading-screen"><div class="spinner"></div><div style="color:var(--text2);font-size:13px">Connecting to JEX...</div></div></div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
// SUPABASE CONFIG — paste your values here after setup
// ═══════════════════════════════════════════════════════════
const SUPABASE_URL = 'https://hahxemgfkorglaoywybq.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_-moLk6DXyj8L41Ope-RAXw_3YPkyv_8';
const SESSION_KEY = 'jex-session-v2';

// ── Supabase REST API helper ──────────────────────────────────
const sb = {
  headers: {'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY},
  url: (table, query='') => SUPABASE_URL + '/rest/v1/' + table + (query ? '?'+query : ''),
  async get(table, query='') {
    const r = await fetch(this.url(table, query), {headers:{...this.headers,'Accept':'application/json'}});
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async post(table, data) {
    const r = await fetch(this.url(table), {method:'POST',headers:{...this.headers,'Prefer':'return=representation'},body:JSON.stringify(data)});
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async patch(table, query, data) {
    const r = await fetch(this.url(table, query), {method:'PATCH',headers:{...this.headers,'Prefer':'return=representation'},body:JSON.stringify(data)});
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async delete(table, query) {
    const r = await fetch(this.url(table, query), {method:'DELETE',headers:this.headers});
    if(!r.ok) throw new Error(await r.text());
  },
  async upsert(table, data) {
    const r = await fetch(this.url(table), {method:'POST',headers:{...this.headers,'Prefer':'return=representation,resolution=merge-duplicates'},body:JSON.stringify(data)});
    if(!r.ok) throw new Error(await r.text());
    return r.json();
  }
};

const isConfigured = () => SUPABASE_URL !== 'YOUR_SUPABASE_URL' && SUPABASE_ANON_KEY !== 'YOUR_SUPABASE_ANON_KEY';

// ═══════════════════════════════════════════════════════════
// IN-MEMORY STATE (loaded from Supabase)
// ═══════════════════════════════════════════════════════════
let DB = { users:[], pending:[], companies:[], ipoApps:[], dilApps:[], trades:[], dividends:[], buybacks:[], session:{id:1,status:'open',label:'Trading session open',ends_at:null,scheduled_open:null,scheduled_close:null,starting_cash:10000} };
let UI = { userId:null, navTab:'market', adminTab:'registrations', appTab:'status', companyTab:'stock', portfolioTab:'holdings', loginView:'select', pendingLoginId:null, forgotUserId:null, panelTicker:null, panelMode:'buy' };
let charts = {};
let sessionTimer = null;

// ═══════════════════════════════════════════════════════════
// LOAD ALL DATA
// ═══════════════════════════════════════════════════════════
async function loadAll() {
  const [users, pending, companies, ipoApps, dilApps, trades, dividends, buybacks, session] = await Promise.all([
    sb.get('jex_users', 'order=created_at.asc'),
    sb.get('jex_pending', 'order=created_at.asc'),
    sb.get('jex_companies', 'order=created_at.asc'),
    sb.get('jex_ipo_applications', 'order=created_at.asc'),
    sb.get('jex_dilution_applications', 'order=created_at.asc'),
    sb.get('jex_trades', 'order=id.asc'),
    sb.get('jex_dividends', 'order=created_at.asc'),
    sb.get('jex_buybacks', 'order=created_at.asc'),
    sb.get('jex_session', 'id=eq.1')
  ]);
  DB.users = users;
  DB.pending = pending;
  DB.companies = companies;
  DB.ipoApps = ipoApps;
  DB.dilApps = dilApps;
  DB.trades = trades;
  DB.dividends = dividends;
  DB.buybacks = buybacks;
  DB.session = session[0] || DB.session;
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
const get = id => document.getElementById(id);
const fmt = n => '$'+Number(n).toFixed(2);
const fmtChg = n => (n>=0?'+':'')+Number(n).toFixed(2)+'%';
const norm = s => (s||'').trim().toLowerCase();
const validEmail = e => e && e.includes('@') && e.includes('.');
const cu = () => DB.users.find(u => u.id === UI.userId) || null;
const getUser = id => DB.users.find(u => u.id === id);
const getCo = t => DB.companies.find(c => c.ticker === t);
const uid = () => 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
const ts = () => new Date().toLocaleTimeString();
const priceChg = c => { if(!c.price_history||c.price_history.length<2) return 0; const f=c.price_history[0].p, l=c.price_history[c.price_history.length-1].p; return f?((l-f)/f*100):0; };
const holdings = u => u.holdings || {};
const shorts = u => u.shorts || {};
const watchlist = u => u.watchlist || [];
const pv = u => Object.entries(holdings(u)).reduce((s,[t,q])=>{const c=getCo(t);return s+(c?c.price*q:0);},0);
const sPnl = u => Object.entries(shorts(u)).reduce((s,[t,pos])=>{const c=getCo(t);if(!c)return s;return s+Math.round((pos.avgPrice-c.price)*pos.qty*100)/100;},0);
const divRec = u => DB.dividends.reduce((s,d)=>{const p=(d.payouts||[]).find(x=>x.userId===u.id);return s+(p?p.payout:0);},0);
const nw = u => Math.round((u.cash+pv(u)+sPnl(u))*100)/100;
const isOpen = () => DB.session.status === 'open';
const requireOpen = () => { if(!isOpen()){toast('Trading is '+DB.session.status+'. Wait for the session to open.');return false;}return true; };
const shareholders = ticker => DB.users.filter(u=>u.role==='student'&&(holdings(u)[ticker]||0)>0);
const divTotal = (ticker,ps) => shareholders(ticker).reduce((s,u)=>s+Math.round(((holdings(u)[ticker])||0)*ps*100)/100,0);
const impactPrice = (co,qty,dir) => { const liq=co.shares*0.05,impact=Math.min((qty/liq)*0.015,0.12); return Math.max(0.01,Math.round((dir==='buy'?co.price*(1+impact):co.price*(1-impact))*100)/100); };
const isWatched = ticker => { const u=cu(); return u&&watchlist(u).includes(ticker); };
const sharesBar = co => { const pct=co.shares>0?Math.round((co.shares_avail/co.shares)*100):0; return `<div class="sbar-wrap"><div style="font-size:12px;font-weight:500;font-family:var(--mono)">${co.shares_avail.toLocaleString()} <span style="font-weight:400;color:var(--text2)">/ ${co.shares.toLocaleString()}</span></div><div style="font-size:11px;color:var(--text3);margin-top:1px">${pct}% available</div><div class="sbar-bg"><div class="sbar-fill" style="width:${pct}%"></div></div></div>`; };

function toast(msg){const t=get('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3200);}
function destroyCharts(){Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};}

// ═══════════════════════════════════════════════════════════
// SESSION
// ═══════════════════════════════════════════════════════════
function pad(n){return n<10?'0'+n:String(n);}
function getAZTime(){return new Date(new Date().toLocaleString('en-US',{timeZone:'America/Phoenix'}));}
function fmtAZTime(d){return d.toLocaleString('en-US',{timeZone:'America/Phoenix',weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true})+' MST';}

async function saveSession(data){
  Object.assign(DB.session, data);
  await sb.patch('jex_session','id=eq.1', data);
}
async function setSession(status){
  const label=status==='open'?'Session open':status==='paused'?'Session paused':'Session closed';
  clearInterval(sessionTimer);sessionTimer=null;
  await saveSession({status,label,ends_at:null,scheduled_open:null,scheduled_close:null});
  render();
}
async function startTimer(mins){
  clearInterval(sessionTimer);sessionTimer=null;
  const endsAt=Date.now()+mins*60000;
  await saveSession({status:'open',label:'Session — '+mins+'min',ends_at:endsAt,scheduled_open:null,scheduled_close:null});
  sessionTimer=setInterval(tickTimer,500);render();
}
function tickTimer(){
  if(!DB.session.ends_at)return;
  const rem=DB.session.ends_at-Date.now();
  if(rem<=0){saveSession({status:'closed',label:'Session ended',ends_at:null}).then(()=>{clearInterval(sessionTimer);sessionTimer=null;render();toast('Session ended!');});return;}
  const el=get('timer-el');if(el){const m=Math.floor(rem/60000),s=Math.floor((rem%60000)/1000);el.textContent=m+':'+(s<10?'0':'')+s;}
  const al=get('admin-timer-txt');if(al)al.textContent=Math.max(0,Math.round(rem/1000))+'s';
}
async function scheduleSession(){
  const sh=parseInt(get('sched-start-h')?.value||'8'),sm2=parseInt(get('sched-start-m')?.value||'0');
  const eh=parseInt(get('sched-end-h')?.value||'15'),em=parseInt(get('sched-end-m')?.value||'0');
  if([sh,sm2,eh,em].some(isNaN))return toast('Enter valid times');
  const startMin=sh*60+sm2,endMin=eh*60+em;
  if(endMin<=startMin)return toast('End time must be after start time');
  const az=getAZTime(),nowMin=az.getHours()*60+az.getMinutes();
  if(nowMin>=endMin)return toast('End time has already passed in Arizona time');
  if(nowMin<startMin){
    await saveSession({status:'closed',label:'Scheduled: opens '+pad(sh)+':'+pad(sm2)+' – '+pad(eh)+':'+pad(em)+' MST',ends_at:null,scheduled_open:{h:sh,m:sm2},scheduled_close:{h:eh,m:em}});
    toast('Session scheduled for '+pad(sh)+':'+pad(sm2)+' – '+pad(eh)+':'+pad(em)+' AZ time');
  } else {
    const msUntilEnd=(endMin-nowMin)*60*1000-az.getSeconds()*1000;
    await saveSession({status:'open',label:'Open until '+pad(eh)+':'+pad(em)+' MST',ends_at:Date.now()+msUntilEnd,scheduled_open:null,scheduled_close:{h:eh,m:em}});
    sessionTimer=setInterval(tickTimer,500);
    toast('Session open until '+pad(eh)+':'+pad(em)+' AZ time');
  }
  render();
}
async function clearSchedule(){
  await saveSession({scheduled_open:null,scheduled_close:null,status:'closed',label:'Session closed',ends_at:null});
  toast('Schedule cleared');render();
}
function checkSchedule(){
  if(!DB.session.scheduled_open&&!DB.session.scheduled_close)return;
  const az=getAZTime(),nowMin=az.getHours()*60+az.getMinutes();
  if(DB.session.scheduled_open){
    const openMin=DB.session.scheduled_open.h*60+DB.session.scheduled_open.m;
    const closeMin=DB.session.scheduled_close.h*60+DB.session.scheduled_close.m;
    if(nowMin>=openMin&&nowMin<closeMin&&DB.session.status!=='open'){
      const msUntilEnd=(closeMin-nowMin)*60*1000-az.getSeconds()*1000;
      saveSession({status:'open',label:'Open until '+pad(DB.session.scheduled_close.h)+':'+pad(DB.session.scheduled_close.m)+' MST',ends_at:Date.now()+msUntilEnd,scheduled_open:null}).then(()=>{sessionTimer=setInterval(tickTimer,500);render();toast('Trading session is now open!');});
    }
  }
  if(DB.session.scheduled_close&&DB.session.status==='open'&&DB.session.ends_at&&Date.now()>=DB.session.ends_at){
    saveSession({status:'closed',label:'Session ended',ends_at:null,scheduled_close:null}).then(()=>{clearInterval(sessionTimer);sessionTimer=null;render();toast('Session ended.');});
  }
}
setInterval(()=>{checkSchedule();if(DB.session.ends_at&&DB.session.status==='open'&&!sessionTimer)sessionTimer=setInterval(tickTimer,500);},15000);

async function recordTrade(ticker,qty,price,buyerId,sellerId,type='market'){
  const rec={ticker,qty,price,buyer_id:buyerId,seller_id:sellerId,type,ts:ts()};
  const result=await sb.post('jex_trades',rec);
  if(result&&result[0])DB.trades.push(result[0]);
}

async function execTrade(buyerId,sellerId,ticker,qty,price){
  const buyer=getUser(buyerId),co=getCo(ticker);if(!buyer||!co)return false;
  if(buyer.cash<qty*price){toast('Insufficient funds');return false;}
  const bHoldings={...holdings(buyer)};bHoldings[ticker]=(bHoldings[ticker]||0)+qty;
  const newBuyerCash=Math.round((buyer.cash-qty*price)*100)/100;
  await updateUser(buyerId,{cash:newBuyerCash,holdings:bHoldings});
  if(sellerId&&sellerId!=='exchange'){
    const seller=getUser(sellerId);if(seller){
      const sHoldings={...holdings(seller)};sHoldings[ticker]=(sHoldings[ticker]||0)-qty;if(sHoldings[ticker]<=0)delete sHoldings[ticker];
      await updateUser(sellerId,{cash:Math.round((seller.cash+qty*price)*100)/100,holdings:sHoldings});
    }
  } else {
    await updateCo(ticker,{shares_avail:Math.max(0,co.shares_avail-qty)});
  }
  const newHistory=[...co.price_history,{p:price,t:ts()}];
  await updateCo(ticker,{price,price_history:newHistory});
  await recordTrade(ticker,qty,price,buyerId,sellerId||'exchange');
  return true;
}

async function placeBuy(ticker,qty){
  if(!requireOpen())return;
  const u=cu(),co=getCo(ticker);if(!u||!co)return;
  qty=parseInt(qty);if(isNaN(qty)||qty<=0)return toast('Enter a valid quantity');
  if(co.shares_avail<qty)return toast('Only '+co.shares_avail+' shares available');
  const np=impactPrice(co,qty,'buy'),cost=Math.round(np*qty*100)/100;
  if(u.cash<cost)return toast('Insufficient funds (need '+fmt(cost)+')');
  const ok=await execTrade(u.id,'exchange',ticker,qty,np);
  if(ok){toast('Bought '+qty+' × '+ticker+' @ '+fmt(np));openPanel(ticker);}
}
async function placeSell(ticker,qty){
  if(!requireOpen())return;
  const u=cu(),co=getCo(ticker);if(!u||!co)return;
  qty=parseInt(qty);if(isNaN(qty)||qty<=0)return toast('Enter a valid quantity');
  const held=(holdings(u)[ticker])||0;if(held<qty)return toast('You only hold '+held+' shares');
  const np=impactPrice(co,qty,'sell');
  const newH={...holdings(u)};newH[ticker]=held-qty;if(newH[ticker]<=0)delete newH[ticker];
  await updateUser(u.id,{cash:Math.round((u.cash+qty*np)*100)/100,holdings:newH});
  const newHistory=[...co.price_history,{p:np,t:ts()}];
  await updateCo(ticker,{price:np,shares_avail:co.shares_avail+qty,price_history:newHistory});
  await recordTrade(ticker,qty,np,'exchange',u.id);
  toast('Sold '+qty+' × '+ticker+' @ '+fmt(np));openPanel(ticker);
}
async function placeShort(ticker,qty){
  if(!requireOpen())return;
  const u=cu(),co=getCo(ticker);if(!u||!co)return;
  qty=parseInt(qty);if(isNaN(qty)||qty<=0)return toast('Enter a valid quantity');
  const price=co.price,coll=Math.round(price*qty*1.5*100)/100;
  if(u.cash<coll)return toast('Need '+fmt(coll)+' collateral');
  const sh={...shorts(u)};if(!sh[ticker])sh[ticker]={qty:0,avgPrice:0,collateral:0};
  const ex=sh[ticker],tq=ex.qty+qty;
  sh[ticker]={qty:tq,avgPrice:Math.round(((ex.avgPrice*ex.qty)+(price*qty))/tq*100)/100,collateral:Math.round((ex.collateral+coll)*100)/100};
  await updateUser(u.id,{cash:Math.round((u.cash-coll)*100)/100,shorts:sh});
  const np=impactPrice(co,qty,'sell');
  const newHistory=[...co.price_history,{p:np,t:ts()}];
  await updateCo(ticker,{price:np,price_history:newHistory});
  await recordTrade(ticker,qty,price,'short',u.id,'short');
  toast('Shorted '+qty+' × '+ticker+' @ '+fmt(price));openPanel(ticker);
}
async function coverShort(ticker,qty){
  if(!requireOpen())return;
  const u=cu(),co=getCo(ticker);if(!u||!co)return;
  qty=parseInt(qty);if(isNaN(qty)||qty<=0)return toast('Enter a valid quantity');
  const sh={...shorts(u)},short=sh[ticker];if(!short||short.qty<qty)return toast('You only have '+(short?.qty||0)+' shorted');
  const cp=impactPrice(co,qty,'buy'),pnl=Math.round((short.avgPrice-cp)*qty*100)/100;
  const cb=Math.round((short.collateral*(qty/short.qty))*100)/100;
  sh[ticker]={...short,qty:short.qty-qty,collateral:Math.round((short.collateral-cb)*100)/100};
  if(sh[ticker].qty<=0)delete sh[ticker];
  await updateUser(u.id,{cash:Math.round((u.cash+cb+pnl)*100)/100,shorts:sh});
  const newHistory=[...co.price_history,{p:cp,t:ts()}];
  await updateCo(ticker,{price:cp,price_history:newHistory});
  await recordTrade(ticker,qty,cp,u.id,'cover','cover');
  toast('Covered '+qty+' × '+ticker+' | P&L: '+(pnl>=0?'+':'')+fmt(pnl));openPanel(ticker);
}

}
async function issueDividend(ticker,perShare,note){

function buildChart(canvasId,co){
  const canvas=get(canvasId);if(!canvas||!window.Chart)return;
  const pts=co.price_history||[],prices=pts.map(p=>p.p),labels=pts.map((p,i)=>i===pts.length-1?'Now':p.t);
  const isUp=prices.length>0&&prices[prices.length-1]>=prices[0],lc=isUp?'#00c896':'#ff4d6a';
  charts[canvasId]=new Chart(canvas,{type:'line',data:{labels,datasets:[{data:prices,borderColor:lc,borderWidth:2,pointRadius:pts.length>30?0:3,pointBackgroundColor:lc,fill:false,tension:0.3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmt(ctx.parsed.y)}}},
      scales:{x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#4a5568',font:{size:11},maxTicksLimit:8,autoSkip:true}},y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#4a5568',font:{size:11},callback:v=>fmt(v)},beginAtZero:false}}}});
}

// ═══════════════════════════════════════════════════════════
const SECURITY_QUESTIONS=['What is the name of your first pet?','What city were you born in?','What is your mother\'s maiden name?','What was the name of your first school?','What is your favourite book?','What was the make of your first car?','What is your oldest sibling\'s middle name?','What street did you grow up on?'];
function secQSelect(prefix){return `<select id="${prefix}-secq"><option value="">— Select a question —</option>${SECURITY_QUESTIONS.map(q=>`<option value="${q}">${q}</option>`).join('')}</select>`;}
function impactPreview(co,qty,dir){if(!qty||qty<=0)return'';const np=impactPrice(co,qty,dir),delta=np-co.price,pct=((delta/co.price)*100).toFixed(2),cls=dir==='buy'?'price-up':'price-down';return `<div style="font-size:12px;margin-top:6px;padding:6px 10px;background:var(--bg3);border-radius:var(--radius)">Fill: <strong>${fmt(np)}</strong> <span class="${cls}">${delta>=0?'+':''}${fmt(delta)} (${delta>=0?'+':''}${pct}%)</span> &nbsp;|&nbsp; Total: <strong>${fmt(np*qty)}</strong></div>`;}
function shortPrev(co,qty){if(!qty||qty<=0)return'';const c=Math.round(co.price*qty*1.5*100)/100;return `<div style="font-size:12px;margin-top:6px;padding:6px 10px;background:rgba(83,74,183,0.1);border-radius:var(--radius);color:#AFA9EC">Short ${qty} @ ${fmt(co.price)} | Collateral: <strong>${fmt(c)}</strong></div>`;}
function dilPreview(co,ns){if(!ns||ns<=0)return'';const ta=co.shares+ns,np=Math.max(0.01,Math.round(co.price*(co.shares/ta)*100)/100);return `<div style="font-size:12px;padding:10px;background:var(--bg3);border-radius:var(--radius);margin-top:6px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px"><div><div style="color:var(--text2);margin-bottom:2px">Total after</div><div style="font-weight:500">${ta.toLocaleString()}</div></div><div><div style="color:var(--text2);margin-bottom:2px">Increase</div><div style="font-weight:500;color:var(--amber)">+${Math.round((ns/co.shares)*100)}%</div></div><div><div style="color:var(--text2);margin-bottom:2px">Est. price</div><div style="font-weight:500;color:var(--red)">${fmt(np)}</div></div></div>`;}

function renderTickerBar(){return `<div class="ticker-bar">${DB.companies.filter(c=>c.status==='listed').map(c=>{const chg=priceChg(c),w=isWatched(c.ticker);return `<div class="ticker-item ${UI.panelTicker===c.ticker?'active-t':''} ${w?'watched':''}" onclick="openPanel('${c.ticker}')"><div class="tsym">${c.ticker}${w?' ★':''}</div><div class="tprice">${fmt(c.price)}</div><div class="tchg ${chg>=0?'price-up':'price-down'}">${fmtChg(chg)}</div></div>`;}).join('')}</div>`;}
function renderMarket(){const listed=DB.companies.filter(c=>c.status==='listed'),u=cu();return `${renderTickerBar()}<div class="card"><div class="section-title">Listed companies</div><table><thead><tr><th>Company</th><th>Ticker</th><th>Price</th><th>Change</th><th>Shares</th>${u.role==='student'?'<th>Watch</th><th></th>':''}</tr></thead><tbody>${listed.map(c=>{const chg=priceChg(c),fin=c.financials&&c.financials[0];return `<tr><td><span style="font-weight:500">${c.name}</span><br><span style="font-size:11px;color:var(--text2)">${c.description}</span>${fin?`<br><span style="font-size:11px;color:var(--text3)">Rev ${fmt(fin.revenue)} | Profit ${fmt(fin.profit)}</span>`:''}</td><td><span class="badge b-gray" style="font-family:var(--mono)">${c.ticker}</span></td><td style="font-weight:500;font-family:var(--mono)">${fmt(c.price)}</td><td class="${chg>=0?'price-up':'price-down'}">${fmtChg(chg)}</td><td>${sharesBar(c)}</td>${u.role==='student'?`<td><button class="wstar ${isWatched(c.ticker)?'on':''}" onclick="toggleWatch('${c.ticker}')">${isWatched(c.ticker)?'★':'☆'}</button></td><td><button class="btn btn-sm btn-primary" onclick="openPanel('${c.ticker}')">Trade</button></td>`:''}</tr>`;}).join('')}${!listed.length?`<tr><td colspan="7"><div class="empty">No listed companies yet</div></td></tr>`:''}</tbody></table></div><div id="trade-panel"></div>`;}

function openPanel(ticker){
  UI.panelTicker=ticker;
  const c=getCo(ticker),u=cu();const held=(holdings(u)[ticker])||0,chg=priceChg(c),short=(shorts(u))[ticker];
  destroyCharts();
  document.getElementById('market-content').innerHTML=renderMarket();
  const panel=get('trade-panel');if(!panel)return;
  const mode=UI.panelMode,fin=c.financials&&c.financials[0];
  panel.innerHTML=`<div class="card" style="border-color:var(--blue)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div><span style="font-weight:500;font-size:15px">${c.name}</span> <span class="badge b-gray" style="font-family:var(--mono)">${ticker}</span>
        <button class="wstar ${isWatched(ticker)?'on':''}" onclick="toggleWatch('${ticker}').then(()=>openPanel('${ticker}'))" style="margin-left:6px">${isWatched(ticker)?'★':'☆'}</button></div>
      <button class="btn btn-sm" onclick="closePanel()">close</button>
    </div>
    <div class="grid4"><div class="mcard"><div class="mlabel">Price</div><div class="mval" style="font-family:var(--mono)">${fmt(c.price)}</div></div><div class="mcard"><div class="mlabel">Your cash</div><div class="mval" style="font-family:var(--mono)">${fmt(u.cash)}</div></div><div class="mcard"><div class="mlabel">You hold</div><div class="mval">${held} shares</div></div><div class="mcard"><div class="mlabel">Short position</div><div class="mval ${short?'red':''}">${short?short.qty+' @ '+fmt(short.avgPrice):'—'}</div></div></div>
    <div style="position:relative;height:160px;margin-bottom:10px"><canvas id="panel-chart"></canvas></div>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:10px"><span>${(c.price_history||[]).length} pts | Open: ${fmt((c.price_history||[])[0]?.p||c.price)}</span><span class="${chg>=0?'price-up':'price-down'}">${fmtChg(chg)}</span></div>
    ${fin?`<div style="font-size:12px;padding:8px 10px;background:var(--bg3);border-radius:var(--radius);margin-bottom:10px">Latest: Rev <strong>${fmt(fin.revenue)}</strong> | Profit <strong>${fmt(fin.profit)}</strong> — <span style="color:var(--text2)">${fin.summary}</span></div>`:''}
    <hr class="divider">
    <div class="ot-toggle">
      <button class="ot-btn ${mode==='buy'?'ot-buy':''}" onclick="UI.panelMode='buy';openPanel('${ticker}')">Buy</button>
      <button class="ot-btn ${mode==='sell'?'ot-sell':''}" onclick="UI.panelMode='sell';openPanel('${ticker}')">Sell</button>
      <button class="ot-btn ${mode==='short'?'ot-short':''}" onclick="UI.panelMode='short';openPanel('${ticker}')">Short</button>
      ${short?`<button class="ot-btn ${mode==='cover'?'ot-cover':''}" onclick="UI.panelMode='cover';openPanel('${ticker}')">Cover</button>`:''}
    </div>
    ${mode==='buy'?`<p style="font-size:12px;color:var(--text2);margin-bottom:8px">Buy pushes price up. Available: <strong>${c.shares_avail}</strong> of ${c.shares.toLocaleString()}.</p>
      <div class="row" style="align-items:flex-end"><div class="frow" style="flex:1"><label class="flabel">Quantity</label><input type="number" id="t-qty" value="1" min="1" max="${c.shares_avail}"></div>
      <div style="padding-bottom:12px"><button class="btn btn-success" onclick="placeBuy('${ticker}',get('t-qty')?.value)">Buy now</button></div></div>
      <div id="t-preview">${impactPreview(c,1,'buy')}</div>`
    :mode==='sell'?`<p style="font-size:12px;color:var(--text2);margin-bottom:8px">Sell pushes price down. You hold: <strong>${held}</strong>.</p>
      ${held>0?`<div class="row" style="align-items:flex-end"><div class="frow" style="flex:1"><label class="flabel">Quantity</label><input type="number" id="t-qty" value="1" min="1" max="${held}"></div>

      <div id="t-preview">${impactPreview(c,1,'sell')}</div>`:`<div class="empty" style="padding:16px">You don't hold any ${ticker}.</div>`}`
    :mode==='short'?`<div class="ibox ibox-purple">Borrow and sell shares expecting price to fall. Requires 1.5× collateral.</div>
      <div class="row" style="align-items:flex-end"><div class="frow" style="flex:1"><label class="flabel">Quantity to short</label><input type="number" id="t-qty" value="1" min="1"></div>
      <div style="padding-bottom:12px"><button class="btn btn-purple" onclick="placeShort('${ticker}',get('t-qty')?.value)">Short sell</button></div></div>
      <div id="t-preview">${shortPrev(c,1)}</div>`
    :short?`<div class="ibox ibox-purple">Buy back borrowed shares to close your position.</div>
      <div style="font-size:13px;margin-bottom:10px">Open: <strong>${short.qty} shares</strong> @ avg ${fmt(short.avgPrice)} | P&L: <span class="${(short.avgPrice-c.price)*short.qty>=0?'price-up':'price-down'}">${fmt((short.avgPrice-c.price)*short.qty)}</span></div>
      <div class="row" style="align-items:flex-end"><div class="frow" style="flex:1"><label class="flabel">Quantity to cover</label><input type="number" id="t-qty" value="${short.qty}" min="1" max="${short.qty}"></div>
      <div style="padding-bottom:12px"><button class="btn btn-warning" onclick="coverShort('${ticker}',get('t-qty')?.value)">Cover short</button></div></div>
      <div id="t-preview">${impactPreview(c,short.qty,'buy')}</div>`:''}
  </div>`;
  const qi=get('t-qty');if(qi){qi.addEventListener('input',()=>{const q=parseInt(qi.value)||0,p=get('t-preview');if(!p)return;if(mode==='buy')p.innerHTML=impactPreview(c,q,'buy');else if(mode==='sell')p.innerHTML=impactPreview(c,q,'sell');else if(mode==='short')p.innerHTML=shortPrev(c,q);else if(mode==='cover')p.innerHTML=impactPreview(c,q,'buy');});}
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
  setTimeout(()=>buildChart('panel-chart',c),50);
}

function renderLeaderboard(){

function renderApply(){
  const myApp=DB.ipoApps.find(a=>a.user_id===UI.userId);
  return `<div class="tab-row"><button class="tab ${UI.appTab==='status'?'active':''}" onclick="UI.appTab='status';render()">Status</button><button class="tab ${UI.appTab==='apply'?'active':''}" onclick="UI.appTab='apply';render()">${myApp&&myApp.status!=='rejected'?'View':'New application'}</button></div>
  ${UI.appTab==='status'?renderAppStatus(myApp):renderAppForm(myApp)}`;
}
function renderAppStatus(app){
  if(!app)return`<div class="card"><div class="empty">No application yet.<br><br><button class="btn btn-primary" onclick="UI.appTab='apply';render()">Start application</button></div></div>`;
  const sm={pending:'b-amber',approved:'b-green',rejected:'b-red'};
  const co=app.status==='approved'?DB.companies.find(c=>c.ticker===app.ticker):null;
  return`<div class="card"><div class="section-title">${app.name} (${app.ticker})</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><span class="badge ${sm[app.status]||'b-gray'}">${app.status}</span><span style="font-size:12px;color:var(--text2)">${app.ts}</span></div>
    <div class="grid2"><div class="mcard"><div class="mlabel">IPO price</div><div class="mval" style="font-family:var(--mono)">${fmt(app.price)}</div></div><div class="mcard"><div class="mlabel">Shares issued</div><div class="mval">${app.shares.toLocaleString()}</div></div></div>
    ${app.status==='approved'&&co?`<hr class="divider"><div class="grid3"><div class="mcard"><div class="mlabel">Price</div><div class="mval" style="font-family:var(--mono)">${fmt(co.price)}</div></div><div class="mcard"><div class="mlabel">Available</div><div class="mval">${co.shares_avail.toLocaleString()}</div></div><div class="mcard"><div class="mlabel">Market cap</div><div class="mval" style="font-family:var(--mono)">${fmt(co.price*co.shares)}</div></div></div>`:''}
    ${app.status==='rejected'?`<button class="btn btn-primary" onclick="reapply()">New application</button>`:''}
  </div>`;
}
async function reapply(){const idx=DB.ipoApps.findIndex(a=>a.user_id===UI.userId);if(idx>=0){await sb.patch('jex_ipo_applications','id=eq.'+DB.ipoApps[idx].id,{status:'withdrawn'});DB.ipoApps.splice(idx,1);}await updateUser(UI.userId,{app_status:'none'});UI.appTab='apply';render();}
function renderAppForm(app){
  if(app&&app.status==='pending')return`<div class="card"><div class="empty">Application under review.</div></div>`;
  if(app&&app.status==='approved')return`<div class="card"><div class="empty">Your company is already listed!</div></div>`;
  return`<div class="card"><div class="section-title">IPO application</div>
    <div class="row"><div class="frow" style="flex:1"><label class="flabel">Company name</label><input type="text" id="ipo-name" placeholder="Acme Corp"></div><div class="frow" style="flex:1"><label class="flabel">Ticker (3-4 letters)</label><input type="text" id="ipo-ticker" placeholder="ACM" maxlength="4" style="text-transform:uppercase"></div></div>
    <div class="row"><div class="frow" style="flex:1"><label class="flabel">IPO price ($)</label><input type="number" id="ipo-price" placeholder="25.00" min="0.01" step="0.01"></div><div class="frow" style="flex:1"><label class="flabel">Total shares</label><input type="number" id="ipo-shares" placeholder="1000" min="1"></div></div>
    <div class="frow"><label class="flabel">Description</label><textarea id="ipo-desc" rows="2" placeholder="Describe your business..."></textarea></div>
    <button class="btn btn-primary" onclick="submitIPO(get('ipo-name')?.value,get('ipo-ticker')?.value,get('ipo-price')?.value,get('ipo-shares')?.value,get('ipo-desc')?.value)">Submit</button></div>`;
}

function renderDivTab(co,myDivs){
  const sh=shareholders(co.ticker),owner=cu();
  return`<div class="card"><div class="section-title">Pay a dividend</div>
    <div class="ibox ibox-teal">Paid immediately from company cash to all shareholders, proportional to holdings.</div>
    <div class="grid3"><div class="mcard"><div class="mlabel">Company cash</div><div class="mval" style="font-family:var(--mono)">${fmt(owner.cash)}</div></div><div class="mcard"><div class="mlabel">Shareholders</div><div class="mval">${sh.length}</div></div><div class="mcard"><div class="mlabel">In circulation</div><div class="mval">${(co.shares-co.shares_avail).toLocaleString()}</div></div></div>
    ${sh.length?`<div class="frow"><label class="flabel">Dividend per share ($)</label><input type="number" id="div-ps" placeholder="e.g. 0.50" min="0.01" step="0.01" oninput="updateDivPrev('${co.ticker}')"></div><div id="div-prev"></div>

  </div>${myDivs.length?`<div class="card"><div class="section-title">History</div><table><thead><tr><th>Time</th><th>Per share</th><th>Total</th><th>Recipients</th><th>Note</th></tr></thead><tbody>${myDivs.map(d=>`<tr><td style="color:var(--text2)">${d.ts}</td><td style="font-family:var(--mono)">${fmt(d.per_share)}</td><td style="color:var(--green);font-family:var(--mono)">${fmt(d.total)}</td><td>${(d.payouts||[]).length}</td><td style="font-size:12px;color:var(--text2)">${d.note}</td></tr>`).join('')}</tbody></table></div>`:''}`;

function updateDivPrev(ticker){const co=getCo(ticker);if(!co)return;const ps=parseFloat(get('div-ps')?.value)||0,p=get('div-prev');if(!p)return;if(ps<=0){p.innerHTML='';return;}const sh=shareholders(ticker),total=divTotal(ticker,ps),owner=cu(),ok=owner.cash>=total;p.innerHTML=`<div style="font-size:12px;padding:10px;background:var(--bg3);border-radius:var(--radius);margin-top:6px"><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:6px"><div><div style="color:var(--text2);margin-bottom:2px">Shareholders</div><div style="font-weight:500">${sh.length}</div></div><div><div style="color:var(--text2);margin-bottom:2px">Total</div><div style="color:var(--green);font-family:var(--mono)">${fmt(total)}</div></div><div><div style="color:var(--text2);margin-bottom:2px">After</div><div style="font-family:var(--mono);color:${ok?'var(--text)':'var(--red)'}">${fmt(owner.cash-total)}</div></div></div>${!ok?`<div style="color:var(--red);font-weight:500">Insufficient funds</div>`:''}</div>`;}

function renderBBTab(co,myBBs){

  return`<div class="card"><div class="section-title">Share buyback</div>
    <div class="grid3"><div class="mcard"><div class="mlabel">Company cash</div><div class="mval" style="font-family:var(--mono)">${fmt(owner.cash)}</div></div><div class="mcard"><div class="mlabel">In circulation</div><div class="mval">${sold.toLocaleString()}</div></div><div class="mcard"><div class="mlabel">Current price</div><div class="mval" style="font-family:var(--mono)">${fmt(co.price)}</div></div></div>
    ${sold>0?`<div class="row" style="align-items:flex-end"><div class="frow" style="flex:1"><label class="flabel">Shares to buy back</label><input type="number" id="bb-qty" placeholder="50" min="1" max="${sold}" oninput="updateBBPrev('${co.ticker}')"></div><div style="padding-bottom:12px"><button class="btn btn-primary" onclick="doBuyback('${co.ticker}',get('bb-qty')?.value)">Buy back</button></div></div><div id="bb-prev"></div>`:'<div class="empty">No shares in circulation.</div>'}

function getPageContent(){
  const t=UI.navTab;
  if(t==='market')return`<div id="market-content">${renderMarket()}</div>`;
  if(t==='portfolio')return renderPortfolio();
  if(t==='leaderboard')return renderLeaderboard();
  if(t==='trades')return renderTrades(cu()?.role==='admin');
  if(t==='apply')return renderApply();
  if(t==='mystock')return renderMyStock();
  if(t==='admin')return renderAdmin();
  if(t==='settings')return renderSettings();
  return '';
}
function render(){
  destroyCharts();
  const app=document.getElementById('app');
  if(!UI.userId){app.innerHTML=renderLogin();return;}
  const u=cu();if(!u){UI.userId=null;app.innerHTML=renderLogin();return;}
  app.innerHTML=`${renderTopbar()}${renderBanner()}${renderNav()}<div class="content">${getPageContent()}</div>`;
  if(DB.session.ends_at&&DB.session.status==='open'&&!sessionTimer)sessionTimer=setInterval(tickTimer,500);
  setTimeout(()=>{if(UI.navTab==='mystock'&&UI.companyTab==='stock'){const co=DB.companies.find(c=>c.owner_id===UI.userId);if(co)buildChart('co-chart',co);}},60);
}

async function boot(){
  if(!isConfigured()){
    document.getElementById('app').innerHTML=renderConfig();
    return;
  }
  try{
    await loadAll();
    // Restore session
    const savedId=localStorage.getItem(SESSION_KEY);
    if(savedId&&DB.users.find(u=>u.id===savedId)){
      UI.userId=savedId;
      const u=DB.users.find(u=>u.id===savedId);
      UI.navTab=u?.role==='admin'?'admin':u?.role==='company'?'apply':'market';
    }
    // Resume timer if needed
    if(DB.session.ends_at&&DB.session.status==='open'){sessionTimer=setInterval(tickTimer,500);}
    render();
  }catch(err){
    document.getElementById('app').innerHTML=`<div class="config-page"><div class="config-card">
      <div style="font-family:var(--mono);font-size:20px;font-weight:600;margin-bottom:12px;color:var(--red)">Connection failed</div>
      <div class="ibox ibox-red" style="margin-bottom:16px">Could not connect to Supabase.<br><br><strong>Error:</strong> ${err.message}</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:12px">Check that your Supabase URL and anon key are correct in the index.html file.</div>
      <button class="btn btn-primary" onclick="boot()">Retry</button>
    </div></div>`;
  }
}
boot();
</script>
</body>
</html>
