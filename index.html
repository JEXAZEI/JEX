<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230f1117'/><text x='16' y='23' font-family='monospace' font-size='20' font-weight='700' fill='%23f0a500' text-anchor='middle'>J</text></svg>">
<title>JEX — JTED Stock Exchange</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#161b27;--bg3:#1c2333;--border:#1e2d47;--border2:#253450;
  --text:#e8e6e1;--text2:#8896a8;--text3:#4a5568;
  --amber:#f0a500;--green:#00c896;--red:#ff4d6a;--blue:#378ADD;--blue2:#185FA5;
  --purple:#534AB7;--teal:#1D9E75;--chair:#c9a227;--pres:#7c6dfa;
  --radius:8px;--radius-lg:12px;
  --font:'DM Sans',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace;
}
body.light-mode{
  --bg:#f4f6fa;--bg2:#ffffff;--bg3:#eef1f7;--border:#d1d9e6;--border2:#bcc8db;
  --text:#1a2233;--text2:#4a5a72;--text3:#8896a8;
}
body{font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);min-height:100vh}
#app{display:flex;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:40}
.logo{font-family:var(--mono);font-size:16px;font-weight:500;display:flex;align-items:center;gap:10px}
.logo .jex{color:var(--amber)}.logo .sep{width:1px;height:16px;background:var(--border)}.logo .full{font-family:var(--font);font-size:12px;font-weight:300;color:var(--text2)}
.user-pill{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500}
.av-s{background:rgba(55,138,221,0.2);color:#85B7EB}.av-c{background:rgba(240,165,0,0.15);color:var(--amber)}
.av-ch{background:rgba(201,162,39,0.2);color:var(--chair)}.av-pr{background:rgba(124,109,250,0.2);color:var(--pres)}
.av-sec{background:rgba(0,200,150,0.15);color:#00c896}.av-tre{background:rgba(255,77,106,0.15);color:#ff4d6a}.av-co{background:rgba(139,92,246,0.15);color:#8b5cf6}
.logout-btn{font-size:12px;cursor:pointer;padding:3px 8px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--text2);font-family:var(--font)}
.theme-btn{font-size:14px;cursor:pointer;padding:3px 7px;border:1px solid var(--border);border-radius:4px;background:transparent;line-height:1}
.pw-wrap{position:relative}.pw-wrap input{padding-right:36px}
.pw-eye{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:15px;color:var(--text2);padding:0;line-height:1}
.copy-ticker{cursor:pointer;user-select:none}
.copy-ticker:active{opacity:0.6}
.logout-btn:hover{background:var(--bg3)}
.session-banner{display:flex;align-items:center;justify-content:space-between;padding:7px 20px;font-size:12px;border-bottom:1px solid var(--border)}
.s-open{background:rgba(0,200,150,0.08);color:var(--green)}.s-closed{background:rgba(255,77,106,0.08);color:var(--red)}.s-paused{background:rgba(240,165,0,0.08);color:var(--amber)}
.timer{font-family:var(--mono);font-size:16px;font-weight:500;margin-left:8px}
.nav{display:flex;gap:2px;padding:6px 20px;border-bottom:1px solid var(--border);background:var(--bg2);flex-wrap:wrap}
.nav-btn{font-size:13px;padding:5px 12px;border-radius:var(--radius);cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:var(--font)}
.nav-btn:hover{background:var(--bg3)}.nav-btn.active{background:var(--bg);color:var(--text);font-weight:500;border:1px solid var(--border)}
.content{flex:1;padding:20px;overflow:auto;max-width:1200px;margin:0 auto;width:100%}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:14px}
.section-title{font-size:15px;font-weight:500;margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:14px}
.mcard{background:var(--bg3);border-radius:var(--radius);padding:12px 14px}
.mlabel{font-size:11px;color:var(--text2);margin-bottom:4px}.mval{font-size:22px;font-weight:500}
.mval.green{color:var(--green)}.mval.red{color:var(--red)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-weight:500;font-size:11px;color:var(--text2);padding:6px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid rgba(30,45,71,0.5);vertical-align:middle}
tr:last-child td{border-bottom:none}tr:hover td{background:var(--bg3)}
th.r,td.r{text-align:right}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px}
.b-green{background:rgba(0,200,150,0.12);color:var(--green)}.b-red{background:rgba(255,77,106,0.12);color:var(--red)}
.b-amber{background:rgba(240,165,0,0.12);color:var(--amber)}.b-blue{background:rgba(55,138,221,0.15);color:#85B7EB}
.b-gray{background:rgba(136,150,168,0.12);color:var(--text2)}.b-purple{background:rgba(83,74,183,0.15);color:#AFA9EC}
.b-teal{background:rgba(0,200,150,0.1);color:var(--teal)}.b-coral{background:rgba(255,77,106,0.1);color:#FF8099}
.b-chair{background:rgba(201,162,39,0.15);color:var(--chair)}.b-pres{background:rgba(124,109,250,0.15);color:var(--pres)}
.b-sec{background:rgba(0,200,150,0.12);color:#00c896}.b-tre{background:rgba(255,77,106,0.12);color:#ff4d6a}.b-co{background:rgba(139,92,246,0.12);color:#8b5cf6}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;font-family:var(--font);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(55,138,221,0.15)}
.frow{margin-bottom:12px}.flabel{font-size:12px;color:var(--text2);margin-bottom:5px;display:block}
.btn{padding:7px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text);font-family:var(--font);transition:background 0.15s}
.btn:hover{background:var(--bg3)}.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-primary:hover{background:var(--blue2)}
.btn-success{background:var(--teal);color:#fff;border-color:var(--teal)}.btn-success:hover{background:#0F6E56}
.btn-danger{background:var(--red);color:#fff;border-color:var(--red)}.btn-danger:hover{background:#cc2240}
.btn-warning{background:#BA7517;color:#fff;border-color:#BA7517}.btn-warning:hover{background:#854F0B}
.btn-purple{background:var(--purple);color:#fff;border-color:var(--purple)}.btn-purple:hover{background:#3C3489}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-row{display:flex;gap:6px;flex-wrap:wrap}.row{display:flex;gap:10px;align-items:flex-start}
.ot-toggle{display:flex;border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;width:fit-content;margin-bottom:14px}
.ot-btn{font-size:13px;padding:6px 18px;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:var(--font)}
.ot-buy{background:var(--teal);color:#fff}.ot-sell{background:var(--red);color:#fff}.ot-short{background:var(--purple);color:#fff}.ot-cover{background:#BA7517;color:#fff}
.price-up{color:var(--green)}.price-down{color:var(--red)}
  @keyframes progress{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}
.empty{text-align:center;padding:32px;color:var(--text2);font-size:13px}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.tab-row{display:flex;gap:2px;margin-bottom:14px;flex-wrap:wrap}
.tab{font-size:13px;padding:5px 12px;cursor:pointer;border-radius:var(--radius);color:var(--text2);border:none;background:transparent;font-family:var(--font)}
.tab:hover{background:var(--bg3)}.tab.active{background:var(--bg3);color:var(--text);font-weight:500}
.app-row{display:flex;align-items:flex-start;justify-content:space-between;padding:12px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;gap:12px}
.app-info{flex:1}.app-name{font-size:13px;font-weight:500}.app-meta{font-size:12px;color:var(--text2);margin-top:2px}
.ibox{border-radius:var(--radius);padding:10px 12px;font-size:12px;margin-bottom:12px}
.ibox-amber{background:rgba(240,165,0,0.08);border:1px solid rgba(240,165,0,0.2);color:var(--amber)}
.ibox-teal{background:rgba(0,200,150,0.07);border:1px solid rgba(0,200,150,0.2);color:var(--teal)}
.ibox-blue{background:rgba(55,138,221,0.08);border:1px solid rgba(55,138,221,0.2);color:#85B7EB}
.ibox-purple{background:rgba(83,74,183,0.1);border:1px solid rgba(83,74,183,0.25);color:#AFA9EC}
.ibox-green{background:rgba(0,200,150,0.07);border:1px solid rgba(0,200,150,0.2);color:var(--green)}
.ibox-red{background:rgba(255,77,106,0.08);border:1px solid rgba(255,77,106,0.2);color:var(--red)}
.sbar-wrap{min-width:90px}.sbar-bg{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:4px}.sbar-fill{height:4px;border-radius:2px;background:var(--blue)}
.short-pos{background:rgba(83,74,183,0.08);border:1px solid rgba(83,74,183,0.2);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px}
.ticker-bar{display:flex;gap:10px;overflow-x:auto;padding:6px 0;margin-bottom:14px;scrollbar-width:none}
.ticker-item{background:var(--bg3);border-radius:var(--radius);padding:8px 12px;min-width:88px;flex-shrink:0;cursor:pointer;border:1px solid transparent}
.ticker-item:hover{border-color:var(--border2)}.ticker-item.active-t{border-color:var(--blue)}.ticker-item.watched{border-color:var(--teal)}
.tsym{font-size:11px;font-weight:500;font-family:var(--mono)}.tprice{font-size:15px;font-weight:500;font-family:var(--mono)}.tchg{font-size:11px}
.lb-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);gap:12px}
.lb-row:last-child{border-bottom:none}
.lb-rank{font-size:18px;font-weight:500;min-width:32px;font-family:var(--mono)}
.r-gold{color:var(--amber)}.r-silver{color:var(--text2)}.r-bronze{color:#993C1D}
.lb-name{flex:1;font-weight:500}.lb-val{font-size:14px;font-weight:500;font-family:var(--mono)}
.wstar{cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;border:none;background:transparent;color:var(--text3)}
.wstar:hover{background:var(--bg3)}.wstar.on{color:var(--amber)}
.reg-tabs{display:flex;border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;width:100%}
.reg-tab{flex:1;font-size:13px;padding:8px;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:var(--font);text-align:center}
.reg-tab.active{background:var(--bg3);color:var(--text);font-weight:500}
.link-btn{background:none;border:none;color:var(--blue);font-size:12px;cursor:pointer;padding:0;font-family:var(--font);text-decoration:underline}
.toast{position:fixed;bottom:20px;right:20px;background:#1c2333;color:var(--text);padding:10px 16px;border-radius:var(--radius);font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;max-width:320px;border:1px solid var(--border2);box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.toast.show{opacity:1}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--amber);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);padding:20px}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;width:100%;max-width:400px}
.login-logo{font-family:var(--mono);font-size:22px;font-weight:600;margin-bottom:4px}
.login-logo .jex{color:var(--amber)}.login-sub{font-size:13px;color:var(--text2);margin-bottom:22px}
.acct-list{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:8px}
.acct-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border)}
.acct-item:last-child{border-bottom:none}.acct-item:hover{background:var(--bg3)}
.acct-name{font-size:13px;font-weight:500}.acct-email{font-size:11px;color:var(--text2)}
.success-box{background:rgba(0,200,150,0.07);border:1px solid rgba(0,200,150,0.2);border-radius:var(--radius);padding:10px 12px;font-size:12px;color:var(--green);margin-bottom:12px}
.config-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:var(--bg)}
.config-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;width:100%;max-width:520px}
/* Sparkline */
.sparkline-cell{width:100px;height:36px;display:inline-block}
/* News */
.news-item{border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;background:var(--bg2)}
.news-item:hover{border-color:var(--border2)}
.news-headline{font-size:14px;font-weight:500;margin-bottom:4px}
.news-body{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:8px}
.news-meta{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--text3)}

/* ═══════════════════════════════════════════════
   MOBILE RESPONSIVE — max-width: 640px
═══════════════════════════════════════════════ */
/* ════════════════════════════════════════════
   RESPONSIVE / MOBILE — complete overhaul
   ════════════════════════════════════════════ */

/* ── Tablet (641–900px) ─────────────────────── */
@media(max-width:900px){
  .grid4{grid-template-columns:1fr 1fr}
  .sparkline-cell,.sbar-wrap{display:none}
}

/* ── Mobile (≤640px) ────────────────────────── */
@media(max-width:640px){
  /* ── Base layout ── */
  body{font-size:14px}
  .content{padding:10px;max-width:100%;box-sizing:border-box}

  /* ── Topbar ── */
  .topbar{padding:8px 12px;gap:8px}
  .logo .full{display:none}
  .logo .jex{font-size:18px}
  .user-pill{gap:6px;padding:4px 8px}
  .user-pill span:not(.badge){display:none}
  .user-pill .avatar{width:28px;height:28px;font-size:11px}
  .logout-btn{padding:3px 8px;font-size:11px}

  /* ── Nav ── */
  .nav{padding:4px 8px;gap:2px;flex-wrap:nowrap;overflow-x:auto;
    scrollbar-width:none;-ms-overflow-style:none;-webkit-overflow-scrolling:touch}
  .nav::-webkit-scrollbar{display:none}
  .nav-btn{font-size:11px;padding:5px 9px;white-space:nowrap;flex-shrink:0}

  /* ── Admin tab row ── */
  .tab-row{flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;
    -webkit-overflow-scrolling:touch;padding-bottom:2px;gap:3px}
  .tab-row::-webkit-scrollbar{display:none}
  .tab{white-space:nowrap;flex-shrink:0;font-size:11px;padding:5px 9px}

  /* ── Session banner ── */
  .session-banner{padding:5px 12px;font-size:11px}
  .session-banner > div:last-child{display:none}
  .timer{font-size:12px}

  /* ── Cards ── */
  .card{padding:12px;border-radius:10px;margin-bottom:10px}
  .section-title{font-size:13px;margin-bottom:10px}

  /* ── Grids ── */
  .grid4{grid-template-columns:1fr 1fr;gap:8px}
  .grid3{grid-template-columns:1fr 1fr;gap:8px}
  .grid2{grid-template-columns:1fr;gap:8px}
  .mcard{padding:10px}
  .mval{font-size:17px}
  .mlabel{font-size:11px}

  /* ── Tables ── */
  table{font-size:12px;width:100%}
  .card table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
  th,td{padding:6px 7px;white-space:nowrap}

  /* ── Market table — strip non-essential cols ── */
  .sparkline-cell,.sbar-wrap{display:none}
  th:nth-child(5),td:nth-child(5),
  th:nth-child(6),td:nth-child(6){display:none}

  /* ── Ticker bar ── */
  .ticker-bar{gap:6px;padding:6px 10px}
  .ticker-item{min-width:64px;padding:5px 7px;border-radius:8px}
  .tsym{font-size:11px}
  .tprice{font-size:12px}
  .tchg{font-size:10px}

  /* ── Forms ── */
  .frow{margin-bottom:10px}
  .flabel{font-size:12px;margin-bottom:4px}
  input,select,textarea{font-size:14px;padding:8px 10px;border-radius:8px}
  .row{flex-direction:column;gap:6px}
  .row > .frow{width:100%}
  .row > div[style*="padding-bottom"]{padding-bottom:0!important;margin-top:6px}
  .btn-row{flex-wrap:wrap;gap:6px}

  /* ── Buttons ── */
  .btn{font-size:13px;padding:8px 14px;border-radius:8px}
  .btn-sm{font-size:11px;padding:4px 9px}

  /* ── App rows ── */
  .app-row{flex-direction:column;align-items:flex-start;gap:8px;padding:10px 0}
  .app-row .app-name{font-size:13px}
  .app-row .app-meta{font-size:11px}
  .app-row .btn-row,.app-row > .btn{align-self:flex-start}

  /* ── Trade mode toggle ── */
  .ot-toggle{border-radius:10px;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none}
  .ot-toggle::-webkit-scrollbar{display:none}
  .ot-btn{flex:1;min-width:60px;font-size:12px;padding:8px 6px;text-align:center}

  /* ── Order book — stack bids/asks vertically ── */
  div[style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr!important;gap:10px}

  /* ── Admin allocation grid ── */
  div[style*="grid-template-columns:1fr 1fr 1fr 1fr"]{grid-template-columns:1fr 1fr!important}

  /* ── Company page header ── */
  .content > div[style*="display:flex"][style*="gap:12px"]{flex-wrap:wrap;gap:8px}

  /* ── Leaderboard ── */
  .lb-row{padding:8px 10px;gap:8px}
  .lb-rank{font-size:14px;min-width:22px}
  .lb-val{font-size:12px}
  .lb-name{font-size:13px}

  /* ── Login ── */
  .login-page{padding:16px}
  .login-card{padding:20px;border-radius:14px}
  .login-logo{margin-bottom:12px}
  .acct-item{padding:10px 12px;gap:10px}
  .acct-name{font-size:13px}
  .acct-email{font-size:11px}
  .avatar{width:34px;height:34px;font-size:12px}

  /* ── Notifications ── */
  div[style*="display:flex;align-items:flex-start;gap:10px"]{gap:8px}

  /* ── Chart interval buttons ── */
  div[id^="ibar-"]{gap:2px;margin-bottom:4px}
  div[id^="ibar-"] button{padding:2px 6px;font-size:10px}

  /* ── Badges ── */
  .badge{font-size:10px;padding:1px 5px}

  /* ── Toast ── */
  .toast{bottom:12px;right:10px;left:10px;max-width:none;text-align:center;border-radius:10px}

  /* ── Share class structure table ── */
  div[style*="grid-template-columns:2fr 1fr 1fr 1fr 1fr"]{
    grid-template-columns:1fr 1fr!important;gap:6px}

  /* ── News items ── */
  .news-item{padding:10px 0}
  .news-headline{font-size:13px}
  .news-body{font-size:12px}
  .news-meta{font-size:11px;flex-wrap:wrap;gap:4px}

  /* ── Halted tickers ── */
  .halted-ticker{opacity:0.75}

function subscribeRealtime(){
  if(!SUPABASE_URL||SUPABASE_URL==='YOUR_SUPABASE_URL')return;
  // Unsubscribe from any existing channels
  _realtimeChannels.forEach(ch=>{try{ch.unsubscribe();}catch(e){}});

  const wsUrl=SUPABASE_URL.replace('https://','wss://').replace('http://','ws://');

  // Subscribe to key tables via postgres_changes
  const tables=['jex_companies','jex_trades','jex_announcements','jex_notifications',
    'jex_halts','jex_session','jex_limit_orders','jex_news','jex_votes'];
  // Build a single channel for all tables
  const channelName='jex-realtime-'+Math.random().toString(36).slice(2);
  const eventsUrl=SUPABASE_URL+'/realtime/v1/websocket?vsn=1.0.0&apikey='+SUPABASE_ANON_KEY;
  
  try{
    const ws=new WebSocket(eventsUrl);
    _realtimeChannels.push({unsubscribe:()=>ws.close()});
    let heartbeatInterval;
    
    ws.onopen=()=>{
      // Join channel
      ws.send(JSON.stringify({topic:'realtime:*',event:'phx_join',payload:{config:{broadcast:{self:false},presence:{key:''},postgres_changes:tables.map(t=>({event:'*',schema:'public',table:t}))}},ref:'1'}));

      },30000);
      console.log('JEX Realtime connected');
    };
    
    ws.onmessage=e=>{
      try{
        const msg=JSON.parse(e.data);
        if(msg.event==='postgres_changes'||msg.event==='INSERT'||msg.event==='UPDATE'||msg.event==='DELETE'){
          const {table,new:newRow,old:oldRow,eventType}=msg.payload?.data||msg.payload||{};
          handleRealtimeUpdate(table,eventType||msg.event,newRow,oldRow);
        }
      }catch(err){}
    };
    
    ws.onerror=()=>{ clearInterval(heartbeatInterval); };
    ws.onclose=()=>{ 
      clearInterval(heartbeatInterval);
      // Reconnect after 5s if still logged in
      if(UI.userId)setTimeout(subscribeRealtime,5000);
    };
  }catch(e){
    console.warn('Realtime unavailable, falling back to polling:',e.message);
  }
}

function handleRealtimeUpdate(table,event,newRow,oldRow){
  if(!UI.userId)return;
  const wasRendering=false;
  switch(table){
    case 'jex_companies':
      if(newRow){const idx=DB.companies.findIndex(c=>c.id===newRow.id);if(idx>=0)Object.assign(DB.companies[idx],newRow);else if(event==='INSERT')DB.companies.push(newRow);}
      break;
    case 'jex_trades':
      if(newRow&&!DB.trades.find(t=>t.id===newRow.id))DB.trades.unshift(newRow);
      break;
    case 'jex_announcements':
      if(newRow&&event==='INSERT'){if(!DB.announcements.find(a=>a.id===newRow.id))DB.announcements.unshift(newRow);}
      else if(event==='DELETE'&&oldRow)DB.announcements=DB.announcements.filter(a=>a.id!==oldRow.id);
      break;
    case 'jex_notifications':
      if(newRow&&newRow.user_id===UI.userId&&!DB.notifications.find(n=>n.id===newRow.id)){
        DB.notifications.unshift(newRow);
        // Show a brief toast for new notifications
        // Only toast for important notifications (dividends, halts, squeeze alerts)

      if(!newRow.read&&importantTypes.includes(newRow.type))toast(newRow.message.slice(0,80));
      }
      break;
    case 'jex_halts':
      if(event==='INSERT'&&newRow&&!DB.halts.find(h=>h.ticker===newRow.ticker))DB.halts.push(newRow);
      else if(event==='DELETE'&&oldRow)DB.halts=DB.halts.filter(h=>h.ticker!==oldRow.ticker);
      break;
    case 'jex_session':
      if(newRow)Object.assign(DB.session,newRow);
      break;
    case 'jex_limit_orders':
      if(newRow){const idx=DB.limitOrders.findIndex(o=>o.id===newRow.id);if(idx>=0)Object.assign(DB.limitOrders[idx],newRow);else if(event==='INSERT')DB.limitOrders.push(newRow);}
      break;
    case 'jex_news':
      if(newRow&&event==='INSERT'&&!DB.news.find(n=>n.id===newRow.id))DB.news.unshift(newRow);
      else if(event==='DELETE'&&oldRow)DB.news=DB.news.filter(n=>n.id!==oldRow.id);
      break;
    case 'jex_votes':
      if(newRow){const idx=DB.votes.findIndex(v=>v.id===newRow.id);if(idx>=0)Object.assign(DB.votes[idx],newRow);else if(event==='INSERT')DB.votes.unshift(newRow);}
      break;
  }
  // Debounced re-render
  if(!userIsFillingForm()){
    clearTimeout(window._rtRenderTimer);
    window._rtRenderTimer=setTimeout(()=>render(),150);
  }
}

// ── OHLCV (Open/High/Low/Close/Volume) computation ───────
function computeOHLCV(priceHistory,trades,ticker,periodMs=5*60*1000){
  if(!priceHistory||priceHistory.length<2)return[];
  // Accept both ISO timestamps and plain price points
  const pts=priceHistory.filter(p=>p.t&&(p.t.includes('T')||p.t.includes('-')));
  if(pts.length<2){
    // Fallback: treat all points as evenly spaced
    const prices=priceHistory.map(p=>p.p);
    if(prices.length<2)return[];
    const synth=[{t:new Date(Date.now()-prices.length*periodMs).toISOString(),o:prices[0],h:Math.max(...prices),l:Math.min(...prices),c:prices[prices.length-1],v:0}];
    return synth;
  }
  const tickerTrades=(trades||[]).filter(t=>t.ticker===ticker&&t.ts&&t.ts.includes('T')||t.ts&&t.ts.length>10);
  const start=new Date(pts[0].t).getTime();
  const end=new Date(pts[pts.length-1].t).getTime();
  const candles=[];
  for(let t=start;t<end;t+=periodMs){
    const ptsInPeriod=pts.filter(p=>{const pt=new Date(p.t).getTime();return pt>=t&&pt<t+periodMs;});
    if(!ptsInPeriod.length)continue;
    const prices=ptsInPeriod.map(p=>p.p);
    const vol=tickerTrades.filter(tr=>{const tt=new Date(tr.ts).getTime();return tt>=t&&tt<t+periodMs;}).reduce((s,tr)=>s+tr.qty,0);
    candles.push({
      t:new Date(t).toISOString(),
      o:ptsInPeriod[0].p,
      h:Math.max(...prices),
      l:Math.min(...prices),
      c:ptsInPeriod[ptsInPeriod.length-1].p,
      v:vol
    });
  }
  return candles;
}

  if(!candles||candles.length<2){buildChart(canvasId,co);return;} // fallback to line

  // Floating bar approach: each bar is [low, high] with open/close as separate overlay
  const labels=candles.map(c=>{
    try{return new Date(c.t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
    catch(e){return c.t||'';}
  });
  const wickData=candles.map(c=>([c.l,c.h]));
  const bodyData=candles.map(c=>([Math.min(c.o,c.c),Math.max(c.o,c.c)]));
  const bodyColors=candles.map(c=>c.c>=c.o?'rgba(0,200,150,0.85)':'rgba(255,77,106,0.85)');

          }
        ]

      options:{
        responsive:true,
        maintainAspectRatio:false,

          legend:{display:false},

              label:ctx=>{
                const c=candles[ctx.dataIndex];
                if(!c)return '';
                return ['O: '+fmt(c.o),'H: '+fmt(c.h),'L: '+fmt(c.l),'C: '+fmt(c.c),'Vol: '+c.v];
              },
              title:ctx=>ctx[0]?.label||''
            }
          }
        },
        scales:{
          x:{
            grid:{color:'rgba(136,150,168,0.07)'},
            ticks:{color:'#4a5568',font:{size:10},maxTicksLimit:8,autoSkip:true}
          },
          y:{
            grid:{color:'rgba(136,150,168,0.07)'},
            ticks:{color:'#4a5568',font:{size:10},callback:v=>fmt(v)},
            beginAtZero:false
          }
        }
      }
    });
  }catch(e){console.warn('buildCandleChart error:',e);buildChart(canvasId,co);}
} // full timestamp for price history

const _orderTimestamps={};
function checkRateLimit(userId){
  const limit=DB.session.order_rate_limit||10; // orders per minute
  const now=Date.now();
  if(!_orderTimestamps[userId])_orderTimestamps[userId]=[];
  // Remove timestamps older than 1 minute
  _orderTimestamps[userId]=_orderTimestamps[userId].filter(t=>now-t<60000);
  if(_orderTimestamps[userId].length>=limit){
    toast('Rate limit: max '+limit+' orders per minute. Wait a moment.');
    return false;
  }
  _orderTimestamps[userId].push(now);
  return true;
}
const requireOpen=(ticker=null)=>{
  if(!isOpen()){toast('Trading is '+DB.session.status+'. Wait for the session to open.');return false;}
  if(ticker&&isHalted(ticker)){toast(ticker+' trading is currently halted.');return false;}
  return true;
};
function checkPriceBand(ticker,orderPrice){
  const bandPct=DB.session.price_band_pct||30;
  const openPrices=DB.session.session_open_prices||{};
  const openPrice=openPrices[ticker];
  if(!openPrice)return true; // no band if no session-open price recorded
  const upperBand=Math.round(openPrice*(1+bandPct/100)*100)/100;
  const lowerBand=Math.round(openPrice*(1-bandPct/100)*100)/100;
  if(orderPrice>upperBand||orderPrice<lowerBand){
    toast('Order rejected — outside price band. Allowed range: '+fmt(lowerBand)+' – '+fmt(upperBand)+' (±'+bandPct+'% from session open '+fmt(openPrice)+')');
    return false;
  }
  return true;
}
function getPreMarketPrice(ticker){
  // Estimate price from queued after-hours orders
  const ahOrders=DB.limitOrders.filter(o=>o.status==='after_hours'&&o.ticker===ticker);
  if(!ahOrders.length)return null;
  const buys=ahOrders.filter(o=>o.side==='buy').sort((a,b)=>b.limit_price-a.limit_price);
  const sells=ahOrders.filter(o=>o.side==='sell').sort((a,b)=>a.limit_price-b.limit_price);
  const bestBid=buys[0]?.limit_price||null;
  const bestAsk=sells[0]?.limit_price||null;
  if(bestBid&&bestAsk&&bestBid>=bestAsk)return Math.round((bestBid+bestAsk)/2*100)/100;
  if(bestBid&&bestAsk)return Math.round((bestBid+bestAsk)/2*100)/100;
  return bestBid||bestAsk||null;
}

async function saveSnapshot(label){

async function restoreSnapshot(activityId){
  if(!confirm('Restore this snapshot? All current holdings, prices, and cash will be overwritten.'))return;
  const rec=DB.activity.find(a=>a.id===activityId);if(!rec)return toast('Snapshot not found');
  let snap;
  try{snap=JSON.parse(rec.description);}catch{return toast('Snapshot data is corrupted');}
  const data=snap.data;
  toast('Restoring snapshot...');
  // Restore users (cash and holdings)
  for(const u of(data.users||[])){
    const local=getUser(u.id);
    if(local){
      await updateUser(u.id,{cash:u.cash,holdings:u.holdings||{},shorts:u.shorts||{}});
    }
  }
  // Restore company prices and shares_avail
  for(const c of(data.companies||[])){
    const local=getCo(c.ticker);
    if(local){
      await updateCo(c.ticker,{price:c.price,shares_avail:c.shares_avail,price_history:c.price_history||[]});
    }
  }
  // Clear active orders and stop-loss
  await sb.del('jex_limit_orders',"status=in.(open,after_hours)");
  DB.limitOrders=DB.limitOrders.filter(o=>o.status!=='open'&&o.status!=='after_hours');
  await sb.del('jex_stop_loss',"status=eq.active");
  DB.stopLossOrders=[];
  await logActivity('snapshot','Snapshot restored: '+snap.label,{userId:cu()?.id,userName:cu()?.name});
  await loadAll();
  toast('✓ Snapshot restored: '+snap.label);
}

async function generateSessionRecap(u){
  const students=DB.users.filter(s=>s.role==='student'&&s.status==='approved');
  const listed=DB.companies.filter(c=>c.status==='listed');
  // Find biggest mover
  const movers=listed.map(c=>({ticker:c.ticker,name:c.name,chg:priceChg(c)})).sort((a,b)=>Math.abs(b.chg)-Math.abs(a.chg));
  const bigMover=movers[0];
  // Today's trades
  const today=new Date().toLocaleDateString();
  const todayTrades=DB.trades.filter(t=>t.ts&&t.ts.includes(today));
  const totalVol=todayTrades.reduce((s,t)=>s+t.price*t.qty,0);
  const bigTrade=todayTrades.length?todayTrades.reduce((a,b)=>b.price*b.qty>a.price*a.qty?b:a):null;
  // Leaderboard snapshot
  const ranked=students.map(s=>({name:s.name,nw:nw(s)})).sort((a,b)=>b.nw-a.nw);
  // Build recap announcement
  const recapBody=[
    '📊 Session recap — '+new Date().toLocaleDateString(),
    '',
    '🏆 Leaderboard leader: '+( ranked[0]?.name||'—')+' ('+fmt(ranked[0]?.nw||0)+')',
    '📈 Biggest mover: '+(bigMover?bigMover.ticker+' '+(bigMover.chg>=0?'+':'')+bigMover.chg.toFixed(1)+'%':'—'),
    '📋 Total trades: '+todayTrades.length+' ('+fmt(totalVol)+' volume)',
    bigTrade?'💰 Biggest trade: '+bigTrade.qty+'×'+bigTrade.ticker+' @ '+fmt(bigTrade.price)+' ('+fmt(bigTrade.price*bigTrade.qty)+')':'',
    '',
    'Next session: TBD',
  ].filter(Boolean).join('\n');
  const rec={id:uid(),title:'Session recap — '+new Date().toLocaleDateString(),body:recapBody,type:'official_notice',author_id:u?.id,author_name:u?.name||'System',ts:ts()};
  await sb.post('jex_minutes',rec);
  DB.minutes=DB.minutes||[];
  DB.minutes.unshift(rec);
}

async function setSession(status){
  const label=status==='open'?'Session open':status==='paused'?'Session paused':'Session closed';
  clearInterval(sessionTimer);sessionTimer=null;
  await saveSession({status,label,ends_at:null,scheduled_open:null,scheduled_close:null});
  const u=cu();
  let description='Session '+status+(u?' by '+u.name:'');
  if(status==='closed'&&_sessionOpenedAt){
    const mins=Math.round((Date.now()-_sessionOpenedAt)/60000);
    description+=' — ran for '+mins+' minute'+(mins!==1?'s':'');
    _sessionOpenedAt=null;
  }
  if(status==='open')_sessionOpenedAt=Date.now();
  await logActivity('session',description,{userId:u?.id,userName:u?.name});
  if(status==='open'){await pushNotificationToAll('session','🟢 Trading session is now open!');activateAfterHoursOrders();recordSessionOpenPrices();}
  if(status==='closed'){
    await pushNotificationToAll('session','🔴 Trading session has closed.');
    // Expire day orders
    const dayOrders=DB.limitOrders.filter(o=>o.status==='open'&&o.order_type==='day');
    for(const o of dayOrders){
      await sb.patch('jex_limit_orders','id=eq.'+o.id,{status:'expired'});

      await pushNotification(o.user_id,'limit_fill','📋 Day order expired at session close: '+o.qty+'×'+o.ticker+' @ '+fmt(o.limit_price),o.ticker);
    }
    if(dayOrders.length)toast(dayOrders.length+' day order'+(dayOrders.length!==1?'s':'')+' expired at session close');

    await generateSessionRecap(u);
  }
  render();
}

// ── Auto-refresh: pull latest data every 20 seconds ──────
let _lastRefresh=0;
function userIsFillingForm(){
  // Check if any input, textarea, or select has focus or has content typed in it
  const active=document.activeElement;
  if(active&&['INPUT','TEXTAREA','SELECT'].includes(active.tagName))return true;
  // Also skip if on a form-heavy tab
  const formTabs=['apply','register','settings'];
  if(formTabs.includes(UI.navTab))return true;
  if(UI.loginView==='register')return true;
  // Check for any filled-in inputs (user has started typing something)
  const inputs=document.querySelectorAll('input[type="text"],input[type="number"],input[type="email"],input[type="password"],textarea');
  for(const inp of inputs){if(inp.value&&inp.value.trim().length>0)return true;}
  return false;
}
async function autoRefresh(){
  if(!UI.userId)return; // not logged in
  if(userIsFillingForm())return; // don't interrupt forms
  const now=Date.now();
  if(now-_lastRefresh<18000)return; // debounce
  _lastRefresh=now;
  try{
    // Only reload lightweight tables that change frequently
    const [newNotifs,newSession,newCompanies,newTrades,newLimitOrders,newMembers,newAllocs,newFlags,newMinutes,newDivApprovals]=await Promise.all([
      sb.get('jex_notifications','user_id=eq.'+UI.userId+'&order=created_at.desc&limit=50'),
      sb.get('jex_session','id=eq.1'),
      sb.get('jex_companies','order=created_at.asc'),
      sb.get('jex_trades','order=id.desc&limit=100'),
      sb.get('jex_limit_orders','order=created_at.asc'),
      sb.get('jex_company_members','order=created_at.asc'),
      sb.get('jex_founder_allocations','order=created_at.desc'),
      sb.get('jex_flags','order=created_at.desc'),
    sb.get('jex_stop_loss','status=eq.active&order=created_at.asc'),
      sb.get('jex_minutes','order=created_at.desc&limit=50'),
      sb.get('jex_dividend_approvals','order=created_at.desc&limit=100'),
    ]);
    const prevUnread=DB.notifications.filter(n=>n.user_id===UI.userId&&!n.read).length;
    DB.notifications=newNotifs;
    DB.session=newSession[0]||DB.session;
    DB.companies=newCompanies;
    DB.companyMembers=newMembers;
    DB.founderAllocations=newAllocs;
    DB.flags=newFlags;
    DB.minutes=newMinutes;
    DB.divApprovals=newDivApprovals;
    // Merge new trades (avoid duplicates)
    const existingIds=new Set(DB.trades.map(t=>t.id));
    newTrades.forEach(t=>{if(!existingIds.has(t.id))DB.trades.unshift(t);});
    DB.limitOrders=newLimitOrders;
    // Update session timer if needed
    if(DB.session.ends_at&&DB.session.status==='open'&&!sessionTimer)sessionTimer=setInterval(tickTimer,500);
    // Re-render if notifications changed or always update market data silently
    const newUnread=DB.notifications.filter(n=>n.user_id===UI.userId&&!n.read).length;
    // Always re-render to show fresh prices, but don't interrupt forms
    if(!userIsFillingForm()){
      render();
    } else if(newUnread!==prevUnread) {
      // At minimum update the bell badge
      const tb=document.querySelector('.user-pill');if(tb)tb.outerHTML=renderTopbar();
    }
  }catch(e){/* silent fail */}
}

document.addEventListener('keydown',function(e){

  if(['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName))return;
  if(e.metaKey||e.ctrlKey||e.altKey)return;

async function logActivity(type,description,extras={}){
  try{

    const prevHash=prev?prev.entry_hash||prev.id:'genesis';
    const rec={id:uid(),type,description,ticker:extras.ticker||null,user_id:extras.userId||null,user_name:extras.userName||null,amount:extras.amount||null,ts:ts(),prev_hash:prevHash};

async function requestFounderAllocation(ticker,studentId,shares,reason){
  if(!ticker)return toast('Select a share class');
  if(!studentId)return toast('Select a founder');
  const stock=getCo(ticker);if(!stock)return toast('Share class "'+ticker+'" not found — is the company listed?');
  const student=getUser(studentId);if(!student)return toast('Student not found');
  shares=parseInt(shares);
  if(isNaN(shares)||shares<=0)return toast('Enter a valid share count');
  if(shares>stock.shares_avail)return toast('Only '+stock.shares_avail+' shares available in '+ticker);
  // Check for duplicate pending
  if(DB.founderAllocations.find(a=>a.ticker===ticker&&a.student_id===studentId&&a.status==='pending'))
    return toast('Already a pending allocation for '+student.name+' in '+ticker);
  const meta=getClassMeta(ticker);
  const classLabel=meta?'Class '+meta.class:'base';
  // Use parent company name not share class name
  const parentTicker=meta?meta.parent_ticker:ticker;
  const parentCo=getCo(parentTicker);
  const companyName=parentCo?parentCo.name:stock.name;
  const rec={id:uid(),ticker,company_name:companyName,student_id:studentId,student_name:student.name,shares,status:'pending',reason:(reason||'').trim(),ts:ts()};
  try{
    const result=await sb.post('jex_founder_allocations',rec);
    DB.founderAllocations.push(rec);
    await logActivity('founder_alloc',companyName+' requested '+shares+' '+classLabel+' founder shares for '+student.name,{ticker});
    toast('✓ Allocation request submitted: '+shares+'×'+ticker+' for '+student.name);
    render();
  }catch(err){
    console.error('Founder alloc error:',err);
    toast('Error submitting request: '+err.message);
  }
}
async function reviewFounderAllocation(id,approve){
  const a=DB.founderAllocations.find(x=>x.id===id);if(!a)return;
  if(approve){
    const co=getCo(a.ticker);
    // Reload student fresh from DB to get latest holdings
    let studentArr=await sb.get('jex_users','id=eq.'+a.student_id);
    const student=studentArr&&studentArr[0];
    if(!co){toast('Company stock not found for ticker '+a.ticker);return;}
    if(!student){toast('Student not found: '+a.student_name);return;}
    if(co.shares_avail<a.shares){toast('Insufficient shares — only '+co.shares_avail+' available in '+a.ticker);return;}
    // Build updated holdings
    const currentHoldings=typeof student.holdings==='object'&&student.holdings?student.holdings:{};
    const newHoldings={...currentHoldings};
    newHoldings[a.ticker]=(parseInt(newHoldings[a.ticker])||0)+a.shares;
    // Write to DB
    await sb.patch('jex_users','id=eq.'+a.student_id,{holdings:newHoldings});
    // Update local DB user
    const localStudent=getUser(a.student_id);
    if(localStudent)localStudent.holdings=newHoldings;
    // Reduce available shares
    await updateCo(a.ticker,{shares_avail:co.shares_avail-a.shares});
    // Mark approved
    await sb.patch('jex_founder_allocations','id=eq.'+id,{status:'approved'});
    a.status='approved';
    await pushNotification(a.student_id,'founder_alloc','🎁 '+a.shares+' founder shares of '+a.company_name+' ('+a.ticker+') have been added to your portfolio!',a.ticker);
    await logActivity('founder_alloc',a.student_name+' granted '+a.shares+' founder shares of '+a.company_name,{ticker:a.ticker,amount:a.shares});
    toast('✓ '+a.student_name+' granted '+a.shares+'×'+a.ticker+' — portfolio updated');
  } else {
    await sb.patch('jex_founder_allocations','id=eq.'+id,{status:'rejected'});
    a.status='rejected';
    await pushNotification(a.student_id,'founder_alloc','❌ Your founder share request for '+a.shares+'×'+a.ticker+' in '+a.company_name+' was rejected.');
    toast('Allocation rejected');
  }
  render();
}

// STOCK PRICE ADJUSTMENT (Chairman)
// ═══════════════════════════════════════════════
async function adjustStockPrice(ticker,pct,reason){
  if(!ticker)return toast('Select a ticker');
  pct=parseFloat(pct);
  if(isNaN(pct)||pct===0)return toast('Enter a non-zero percentage');
  if(Math.abs(pct)>100)return toast('Max adjustment is ±100%');
  const co=getCo(ticker);if(!co)return;
  const u=cu();
  const oldPrice=co.price;
  const newPrice=Math.max(0.01,Math.round(oldPrice*(1+pct/100)*100)/100);
  const label=pct>=0?'Boost +'+pct+'%':'Drop '+pct+'%';
  const newHistory=[...co.price_history,{p:newPrice,t:label}];
  await updateCo(ticker,{price:newPrice,price_history:newHistory});
  // Store in price adjustments log
  const rec={id:uid(),ticker,company_name:co.name,pct,old_price:oldPrice,new_price:newPrice,reason:(reason||'').trim(),applied_by:u.name,ts:ts()};
  try{await sb.post('jex_price_adjustments',rec);if(!DB.priceAdjustments)DB.priceAdjustments=[];DB.priceAdjustments.unshift(rec);}catch(e){}
  const msg=(pct>=0?'📈':'📉')+' '+co.name+' ('+ticker+') price '+(pct>=0?'boosted by +':'cut by ')+Math.abs(pct)+'%'+(reason?' — '+reason.trim():'');
  await pushNotificationToHolders(ticker,'price_adj',msg);
  await pushNotificationToAll('price_adj',msg);
  await logActivity('price_adj',msg,{ticker,userId:u.id,userName:u.name,amount:newPrice-oldPrice});
  toast(ticker+' '+(pct>=0?'boosted':'cut')+' by '+Math.abs(pct)+'% → '+fmt(newPrice));render();
}

// Sharpe ratio: (avg session return - risk free) / stddev of returns
// Uses NW history snapshots for the student
function calcSharpe(userId){
  const snaps=DB.nwHistory.filter(n=>n.user_id===userId).sort((a,b)=>a.ts>b.ts?1:-1);
  if(snaps.length<3)return null;
  const returns=[];
  for(let i=1;i<snaps.length;i++){
    const prev=snaps[i-1].nw,curr=snaps[i].nw;
    if(prev>0)returns.push((curr-prev)/prev);
  }
  if(returns.length<2)return null;
  const avg=returns.reduce((s,r)=>s+r,0)/returns.length;
  const variance=returns.reduce((s,r)=>s+Math.pow(r-avg,2),0)/returns.length;
  const stddev=Math.sqrt(variance);
  if(stddev===0)return null;
  // Annualised-ish: risk-free=0 for classroom context
  return Math.round((avg/stddev)*100)/100;
}

// Portfolio beta vs exchange index (market-cap weighted)
function calcBeta(userId){
  const u=getUser(userId);if(!u)return null;
  const listed=DB.companies.filter(c=>c.status==='listed');
  if(!listed.length)return null;
  // Build market returns from company price histories
  const mktPrices=listed.map(c=>c.price_history||[]);
  if(!mktPrices.length)return null;
  // Simplified: beta = correlation of portfolio value to total market cap change
  const mySnaps=DB.nwHistory.filter(n=>n.user_id===userId).sort((a,b)=>a.ts>b.ts?1:-1).slice(-20);
  if(mySnaps.length<4)return null;
  const myRet=[];for(let i=1;i<mySnaps.length;i++){const p=mySnaps[i-1].nw,c=mySnaps[i].nw;myRet.push(p>0?(c-p)/p:0);}
  // Market return proxy: avg of all company price changes
  const mktRet=listed.map(co=>{
    const h=co.price_history||[];if(h.length<2)return 0;
    return(h[h.length-1].p-h[0].p)/h[0].p;
  });
  const avgMktRet=mktRet.reduce((s,r)=>s+r,0)/Math.max(mktRet.length,1);
  const avgMyRet=myRet.reduce((s,r)=>s+r,0)/Math.max(myRet.length,1);
  if(Math.abs(avgMktRet)<0.0001)return 1;
  return Math.round((avgMyRet/avgMktRet)*100)/100;
}

// Value at Risk (95% confidence, 1-session horizon)
// Based on historical portfolio price moves
function calcVaR(userId){
  const u=getUser(userId);if(!u)return null;
  const mySnaps=DB.nwHistory.filter(n=>n.user_id===userId).sort((a,b)=>a.ts>b.ts?1:-1).slice(-30);
  if(mySnaps.length<5)return null;
  const losses=[];
  for(let i=1;i<mySnaps.length;i++){
    const change=mySnaps[i].nw-mySnaps[i-1].nw;
    if(change<0)losses.push(Math.abs(change));
  }
  if(!losses.length)return 0;
  losses.sort((a,b)=>b-a);
  const idx=Math.floor(losses.length*0.05);
  return Math.round(losses[idx]||losses[0]);
}

// P&L Attribution: break down gains by source
function calcPnLAttribution(userId){
  const u=getUser(userId);if(!u)return null;
  const myTrades=DB.trades.filter(t=>t.buyer_id===userId||t.seller_id===userId);
  let tradePnL=0,divPnL=0,shortPnL=0,unrealised=0;
  // Dividends
  DB.dividends.forEach(d=>{
    const p=(d.payouts||[]).find(x=>x.userId===userId);
    if(p)divPnL+=p.payout;
  });
  // Trade P&L (realised sells minus cost basis)
  const bought={},boughtVal={};
  myTrades.forEach(t=>{
    if(t.buyer_id===userId){bought[t.ticker]=(bought[t.ticker]||0)+t.qty;boughtVal[t.ticker]=(boughtVal[t.ticker]||0)+t.qty*t.price;}
    else{const avgCost=boughtVal[t.ticker]&&bought[t.ticker]?boughtVal[t.ticker]/bought[t.ticker]:t.price;tradePnL+=t.qty*(t.price-avgCost);}
  });
  // Unrealised
  Object.entries(holdings(u)).forEach(([ticker,qty])=>{
    const co=getCo(ticker);if(!co||!qty)return;
    const avgCost=boughtVal[ticker]&&bought[ticker]?boughtVal[ticker]/bought[ticker]:co.price;
    unrealised+=qty*(co.price-avgCost);
  });
  // Short P&L
  const sh=shorts(u)||{};
  Object.entries(sh).forEach(([ticker,pos])=>{
    const co=getCo(ticker);if(!co||!pos)return;
    shortPnL+=(pos.avgPrice-co.price)*pos.qty;
  });
  return{
    trade:Math.round(tradePnL*100)/100,
    dividend:Math.round(divPnL*100)/100,
    short:Math.round(shortPnL*100)/100,
    unrealised:Math.round(unrealised*100)/100,
    total:Math.round((tradePnL+divPnL+shortPnL+unrealised)*100)/100
  };
}

// Company health score (0-100)
function calcHealthScore(co){
  if(!co||co.status!=='listed')return null;
  let score=50;
  // Price stability (less volatile = better, up to +20)
  const h=co.price_history||[];
  if(h.length>=2){
    const prices=h.slice(-10).map(p=>p.p);
    const avg=prices.reduce((s,p)=>s+p,0)/prices.length;
    const vola=prices.reduce((s,p)=>s+Math.abs(p-avg)/avg,0)/prices.length;
    score+=Math.max(-20,Math.min(20,Math.round((0.1-vola)*200)));
  }
  // Cash position (more cash = healthier, up to +15)
  const owner=getUser(co.owner_id);
  if(owner){
    const cashRatio=owner.cash/(co.price*co.shares||1);
    score+=Math.min(15,Math.round(cashRatio*30));
  }
  // Short interest penalty (high short = risky, up to -15)
  const totalShorted=DB.users.filter(u=>u.role==='student').reduce((s,u)=>{
    const sh=u.shorts||{};return s+(sh[co.ticker]?.qty||0);
  },0);
  const shortPct=co.shares>0?totalShorted/co.shares:0;
  score-=Math.min(15,Math.round(shortPct*100));
  // Dividend consistency (+10 if paid dividends)
  const divs=DB.dividends.filter(d=>d.ticker===co.ticker);
  if(divs.length>=2)score+=10;
  else if(divs.length===1)score+=5;

  return Math.max(0,Math.min(100,Math.round(score)));
}

// Short squeeze detection
function checkShortSqueezes(){
  if(!isOpen())return;
  DB.companies.filter(c=>c.status==='listed').forEach(co=>{
    const totalShorted=DB.users.filter(u=>u.role==='student').reduce((s,u)=>{
      return s+(u.shorts&&u.shorts[co.ticker]?u.shorts[co.ticker].qty:0);
    },0);
    const shortPct=co.shares>0?totalShorted/co.shares:0;
    if(shortPct<0.15)return; // not enough short interest
    const priceChgPct=priceChg(co)/100;
    if(priceChgPct>0.1){ // price up 10%+ with high short interest
      const key='squeeze_'+co.ticker+'_'+new Date().toDateString();
      if(localStorage.getItem(key))return; // already notified today
      localStorage.setItem(key,'1');
      pushNotificationToAll('halt','🔥 Short squeeze alert: '+co.name+' ('+co.ticker+') is up '+Math.round(priceChgPct*100)+'% with '+Math.round(shortPct*100)+'% short interest. Short sellers may be forced to cover.');
    }
  });
}

async function placeStopLoss(ticker,triggerPrice){
  const u=cu(),co=getCo(ticker);if(!u||!co)return;
  triggerPrice=parseFloat(triggerPrice);
  if(isNaN(triggerPrice)||triggerPrice<=0)return toast('Enter a valid trigger price');
  if(triggerPrice>=co.price)return toast('Stop-loss must be below current price ('+fmt(co.price)+')');
  const held=(holdings(u)[ticker])||0;
  if(held<=0)return toast('You don&#39;t hold any '+ticker+' shares');
  // Cancel existing stop-loss for this ticker
  const existing=DB.stopLossOrders.find(s=>s.user_id===u.id&&s.ticker===ticker&&s.status==='active');
  if(existing){
    await sb.patch('jex_stop_loss','id=eq.'+existing.id,{status:'cancelled'});
    existing.status='cancelled';
  }
  const rec={id:uid(),user_id:u.id,ticker,trigger_price:triggerPrice,shares:held,status:'active',ts:ts()};
  await sb.post('jex_stop_loss',rec);
  DB.stopLossOrders.push(rec);
  toast('Stop-loss set: sell '+held+'×'+ticker+' if price drops to '+fmt(triggerPrice));render();
}
function doPlaceStopLoss(ticker){
  placeStopLoss(ticker,document.getElementById('sl-price-'+ticker)?.value);
}
async function cancelStopLoss(id){
  await sb.patch('jex_stop_loss','id=eq.'+id,{status:'cancelled'});
  const s=DB.stopLossOrders.find(x=>x.id===id);if(s)s.status='cancelled';
  toast('Stop-loss cancelled');render();
}
async function checkStopLossOrders(){
  if(!isOpen())return;
  const active=DB.stopLossOrders.filter(s=>s.status==='active');
  for(const sl of active){
    const co=getCo(sl.ticker);if(!co)continue;
    if(co.price>sl.trigger_price)continue; // not triggered
    const u=getUser(sl.user_id);if(!u)continue;
    const held=(holdings(u)[sl.ticker])||0;
    if(held<=0){
      await sb.patch('jex_stop_loss','id=eq.'+sl.id,{status:'cancelled'});
      sl.status='cancelled';continue;
    }
    const sellQty=Math.min(held,sl.shares);
    const np=impactPrice(co,sellQty,'sell');
    const nH={...holdings(u)};nH[sl.ticker]=held-sellQty;if(nH[sl.ticker]<=0)delete nH[sl.ticker];
    await updateUser(u.id,{cash:Math.round((u.cash+sellQty*np)*100)/100,holdings:nH});
    await updateCo(sl.ticker,{price:np,shares_avail:co.shares_avail+sellQty,price_history:[...co.price_history,{p:np,t:isoNow()}]});
    await recordTrade(sl.ticker,sellQty,np,'exchange',u.id,'stop_loss');
    await sb.patch('jex_stop_loss','id=eq.'+sl.id,{status:'triggered'});
    sl.status='triggered';
    await pushNotification(u.id,'stop_loss','🛑 Stop-loss triggered: sold '+sellQty+'×'+sl.ticker+' @ '+fmt(np)+' (trigger: '+fmt(sl.trigger_price)+')',sl.ticker);
    await logActivity('stop_loss',u.name+' stop-loss triggered on '+sl.ticker+' @ '+fmt(np),{ticker:sl.ticker,userId:u.id,userName:u.name,amount:sellQty*np});
    toast('Stop-loss triggered for '+u.name+': sold '+sellQty+'×'+sl.ticker+' @ '+fmt(np));
  }
}

// CIRCUIT BREAKERS
// ═══════════════════════════════════════════════
async function checkCircuitBreakers(){
  if(!isOpen())return;
  const threshold=DB.session.circuit_breaker_pct||20;
  const openPrices=DB.session.session_open_prices||{};
  for(const co of DB.companies){
    if(isHalted(co.ticker))continue;
    const openPrice=openPrices[co.ticker];
    if(!openPrice)continue;
    const pctMove=Math.abs((co.price-openPrice)/openPrice*100);
    if(pctMove>=threshold){
      const reason='Circuit breaker: '+co.ticker+' moved '+Math.round(pctMove)+'% from session open (threshold: '+threshold+'%)';
      await haltStock(co.ticker,reason);
      toast('⚡ Circuit breaker triggered on '+co.ticker+' — trading halted');
      // Auto-resume after 5 minutes
      setTimeout(async()=>{
        if(isHalted(co.ticker))await resumeStock(co.ticker);
      },5*60*1000);
    }
  }
}

async function haltStock(ticker,reason){
  if(!ticker)return toast('Select a ticker');
  if(!reason||reason.trim().length<3)return toast('Enter a reason');
  if(isHalted(ticker))return toast(ticker+' is already halted');
  const u=cu();
  const rec={ticker,reason:reason.trim(),halted_by:u.name,ts:ts()};
  await sb.post('jex_halts',rec);
  DB.halts.push(rec);
  await logActivity('halt',ticker+' trading halted — '+reason.trim(),{ticker,userId:u.id,userName:u.name});
  // Notify all students who hold this stock
  await pushNotificationToHolders(ticker,'halt','⚠️ Trading halted on '+ticker+': '+reason.trim());
  await pushNotificationToAll('halt','⚠️ '+ticker+' trading has been halted: '+reason.trim());
  toast(ticker+' halted');render();
}

}

function getOrderBook(ticker){
  const open=DB.limitOrders.filter(o=>o.status==='open'&&o.ticker===ticker);
  const bids=open.filter(o=>o.side==='buy').sort((a,b)=>b.limit_price-a.limit_price||new Date(a.created_at)-new Date(b.created_at));
  const asks=open.filter(o=>o.side==='sell').sort((a,b)=>a.limit_price-b.limit_price||new Date(a.created_at)-new Date(b.created_at));
  const bestBid=bids[0]?.limit_price||null;
  const bestAsk=asks[0]?.limit_price||null;
  const spread=bestBid&&bestAsk?Math.round((bestAsk-bestBid)*100)/100:null;
  return{bids,asks,bestBid,bestAsk,spread};
}

// ── Place a limit order ───────────────────────────────────
async function placeLimitOrder(ticker,side,qty,limitPrice){
  if(!requireOpen(ticker))return;
  const u=cu(),co=getCo(ticker);if(!u||!co)return;
  qty=parseInt(qty);limitPrice=parseFloat(limitPrice);
  if(isNaN(qty)||qty<=0)return toast('Enter a valid quantity');
  if(isNaN(limitPrice)||limitPrice<=0)return toast('Enter a valid limit price');
  // Price band check (only during live session)
  if(isOpen()&&!checkPriceBand(ticker,limitPrice))return;
  // After-hours: queue for session open
  if(!isOpen()){
    if(side==='buy'){const maxCost=Math.round(limitPrice*qty*100)/100;if(u.cash<maxCost)return toast('Insufficient funds (need '+fmt(maxCost)+' at limit price)');}
    else{const held=(holdings(u)[ticker])||0;if(held<qty)return toast('You only hold '+held+' shares');}
    const order={id:uid(),user_id:u.id,ticker,side,qty,limit_price:limitPrice,status:'after_hours',ts:ts()};
    await sb.post('jex_limit_orders',order);
    DB.limitOrders.push(order);
    toast('After-hours order queued: '+qty+'×'+ticker+' @ '+fmt(limitPrice)+' — activates when session opens');
    render();return;
  }
  if(side==='buy'){
    const maxCost=Math.round(limitPrice*qty*100)/100;
    if(u.cash<maxCost)return toast('Insufficient funds (need '+fmt(maxCost)+' at limit price)');
  } else {
    const held=(holdings(u)[ticker])||0;
    if(held<qty)return toast('You only hold '+held+' shares');
  }
  // Try to match against existing order book first
  const remaining=await matchAgainstBook(ticker,side,qty,limitPrice,u);
  if(remaining<=0){toast('Limit order fully filled from order book!');render();return;}
  // If anything left over, check if it would fill against JEX pool
  const co2=getCo(ticker);
  const fillsVsPool=(side==='buy'&&co2.price<=limitPrice)||(side==='sell'&&co2.price>=limitPrice);
  if(fillsVsPool&&remaining>0){
    if(side==='buy')await placeBuy(ticker,remaining);
    else await placeSell(ticker,remaining);
    if(remaining<qty)toast((qty-remaining)+' filled from book, '+remaining+' filled vs JEX pool');
    else toast(remaining+' × '+ticker+' filled immediately vs JEX pool @ '+fmt(co2.price));
    render();return;
  }
  // Queue remainder in order book
  const orderTypeEl=document.getElementById('limit-order-type');
  const orderType=(orderTypeEl?.value||'gtc').toLowerCase();
  const icebergQtyEl=document.getElementById('limit-iceberg-qty');
  const icebergQty=orderType==='iceberg'&&icebergQtyEl?Math.max(1,parseInt(icebergQtyEl.value)||Math.ceil(remaining/4)):null;
  // Fill-or-Kill: must be fully filled NOW or cancelled entirely
  if(orderType==='fok'){
    if(remaining>0){
      toast('Fill-or-Kill cancelled — could only fill '+(qty-remaining)+' of '+qty+' shares');
      return;
    }
  }
  if(remaining>0){
  const order={id:uid(),user_id:u.id,ticker,side,qty:remaining,limit_price:limitPrice,status:'open',order_type:orderType,iceberg_visible:icebergQty,ts:ts()};
    await sb.post('jex_limit_orders',order);
    DB.limitOrders.push(order);
    await logActivity('limit_order',u.name+' placed limit '+side+' '+remaining+'×'+ticker+' @ '+fmt(limitPrice),{ticker,userId:u.id,userName:u.name,amount:limitPrice});
    const msg=remaining<qty?'Partial fill: '+(qty-remaining)+' matched, '+remaining+' queued @ '+fmt(limitPrice):'Limit '+side+': '+remaining+'×'+ticker+' @ '+fmt(limitPrice)+' — waiting for match';
    toast(msg);
  }
  render();
}

// ── Match an incoming order against the existing book ─────
async function matchAgainstBook(ticker,side,qty,price,taker){
  const book=getOrderBook(ticker);
  const matches=side==='buy'?book.asks.filter(o=>o.limit_price<=price&&o.user_id!==taker.id):book.bids.filter(o=>o.limit_price>=price&&o.user_id!==taker.id);
  let remaining=qty;
  for(const maker of matches){
    if(remaining<=0)break;
    const fillQty=Math.min(remaining,maker.qty);
    const fillPrice=maker.limit_price; // maker's price wins (price improvement for taker)
    const makerUser=getUser(maker.user_id);if(!makerUser)continue;
    const co=getCo(ticker);if(!co)continue;
    if(side==='buy'){
      // Taker buys from maker (maker is seller)
      const cost=Math.round(fillPrice*fillQty*100)/100;
      if(taker.cash<cost)break;
      const tH={...holdings(taker)};tH[ticker]=(tH[ticker]||0)+fillQty;
      await updateUser(taker.id,{cash:Math.round((taker.cash-cost)*100)/100,holdings:tH});
      const mH={...holdings(makerUser)};mH[ticker]=(mH[ticker]||0)-fillQty;if(mH[ticker]<=0)delete mH[ticker];
      await updateUser(makerUser.id,{cash:Math.round((makerUser.cash+cost)*100)/100,holdings:mH});
    } else {
      // Taker sells to maker (maker is buyer)
      const proceeds=Math.round(fillPrice*fillQty*100)/100;
      if(makerUser.cash<proceeds)continue;
      const tH={...holdings(taker)};tH[ticker]=(tH[ticker]||0)-fillQty;if(tH[ticker]<=0)delete tH[ticker];
      await updateUser(taker.id,{cash:Math.round((taker.cash+proceeds)*100)/100,holdings:tH});
      const mH={...holdings(makerUser)};mH[ticker]=(mH[ticker]||0)+fillQty;
      await updateUser(makerUser.id,{cash:Math.round((makerUser.cash-proceeds)*100)/100,holdings:mH});
    }
    // Update maker order (partial or full fill)
    const newQty=maker.qty-fillQty;
    if(newQty<=0){
      await sb.patch('jex_limit_orders','id=eq.'+maker.id,{status:'filled',filled_price:fillPrice,filled_at:ts()});
      maker.status='filled';maker.filled_price=fillPrice;
    } else {
      await sb.patch('jex_limit_orders','id=eq.'+maker.id,{qty:newQty});
      maker.qty=newQty;
    }
    // Update price chart
    const newHistory=[...co.price_history,{p:fillPrice,t:isoNow()}];
    await updateCo(ticker,{price:fillPrice,price_history:newHistory});
    await recordTrade(ticker,fillQty,fillPrice,side==='buy'?taker.id:makerUser.id,side==='buy'?makerUser.id:taker.id,'book_match');
    await logActivity('limit_fill',taker.name+' matched '+fillQty+'×'+ticker+' @ '+fmt(fillPrice)+' with '+makerUser.name,{ticker,userId:taker.id,userName:taker.name,amount:fillPrice});
    toast(fillQty+'×'+ticker+' matched with '+makerUser.name+' @ '+fmt(fillPrice)+'!');
    remaining-=fillQty;
  }
  return remaining;
}

// ── Periodic check: match crossed orders & fill vs pool ───
async function checkLimitOrders(){
  if(!isOpen())return;
  const openOrders=DB.limitOrders.filter(o=>o.status==='open');
  if(!openOrders.length)return;
  // Group by ticker and check for crosses
  const tickers=[...new Set(openOrders.map(o=>o.ticker))];
  for(const ticker of tickers){
    const book=getOrderBook(ticker);
    // Match any crossed orders (bid >= ask)
    if(book.bestBid&&book.bestAsk&&book.bestBid>=book.bestAsk){
      const bid=book.bids[0],ask=book.asks[0];
      const buyer=getUser(bid.user_id),seller=getUser(ask.user_id);
      if(!buyer||!seller||buyer.id===seller.id)continue;
      const fillQty=Math.min(bid.qty,ask.qty);
      const fillPrice=ask.limit_price; // ask price (earlier order wins)
      const co=getCo(ticker);if(!co)continue;
      const cost=Math.round(fillPrice*fillQty*100)/100;
      if(buyer.cash<cost)continue;
      const held=(holdings(seller)[ticker])||0;if(held<fillQty)continue;
      // Execute
      const bH={...holdings(buyer)};bH[ticker]=(bH[ticker]||0)+fillQty;
      await updateUser(buyer.id,{cash:Math.round((buyer.cash-cost)*100)/100,holdings:bH});
      const sH={...holdings(seller)};sH[ticker]=held-fillQty;if(sH[ticker]<=0)delete sH[ticker];
      await updateUser(seller.id,{cash:Math.round((seller.cash+cost)*100)/100,holdings:sH});
      // Update orders
      const bQty=bid.qty-fillQty,sQty=ask.qty-fillQty;
      if(bQty<=0){await sb.patch('jex_limit_orders','id=eq.'+bid.id,{status:'filled',filled_price:fillPrice,filled_at:ts()});bid.status='filled';}
      else{await sb.patch('jex_limit_orders','id=eq.'+bid.id,{qty:bQty});bid.qty=bQty;}
      if(sQty<=0){await sb.patch('jex_limit_orders','id=eq.'+ask.id,{status:'filled',filled_price:fillPrice,filled_at:ts()});ask.status='filled';}
      else{await sb.patch('jex_limit_orders','id=eq.'+ask.id,{qty:sQty});ask.qty=sQty;}
      // Update price
      const newHistory=[...co.price_history,{p:fillPrice,t:isoNow()}];
      await updateCo(ticker,{price:fillPrice,price_history:newHistory});
      await recordTrade(ticker,fillQty,fillPrice,buyer.id,seller.id,'book_match');
      await logActivity('limit_fill',buyer.name+' ↔ '+seller.name+': '+fillQty+'×'+ticker+' @ '+fmt(fillPrice),{ticker,amount:fillPrice});
      toast(fillQty+'×'+ticker+' matched: '+buyer.name+' bought from '+seller.name+' @ '+fmt(fillPrice));
    }
    // Also fill limit orders that are now within JEX pool price
    for(const o of openOrders.filter(ord=>ord.ticker===ticker)){
      const co=getCo(ticker);if(!co)continue;
      const u=getUser(o.user_id);if(!u)continue;
      const shouldFill=(o.side==='buy'&&co.price<=o.limit_price)||(o.side==='sell'&&co.price>=o.limit_price);
      if(!shouldFill)continue;
      if(o.side==='buy'){
        if(co.shares_avail<o.qty)continue;
        const np=impactPrice(co,o.qty,'buy'),cost=Math.round(np*o.qty*100)/100;
        if(u.cash<cost)continue;
        const bH={...holdings(u)};bH[o.ticker]=(bH[o.ticker]||0)+o.qty;
        await updateUser(u.id,{cash:Math.round((u.cash-cost)*100)/100,holdings:bH});
        await updateCo(ticker,{price:np,shares_avail:Math.max(0,co.shares_avail-o.qty),price_history:[...co.price_history,{p:np,t:isoNow()}]});
        await creditCompanyCash(ticker,Math.round(np*o.qty*100)/100);
        await recordTrade(ticker,o.qty,np,u.id,'exchange','limit_buy');
      } else {
        const held=(holdings(u)[ticker])||0;if(held<o.qty)continue;
        const np=impactPrice(co,o.qty,'sell');
        const nH={...holdings(u)};nH[ticker]=held-o.qty;if(nH[ticker]<=0)delete nH[ticker];
        await updateUser(u.id,{cash:Math.round((u.cash+o.qty*np)*100)/100,holdings:nH});
        await updateCo(ticker,{price:np,shares_avail:co.shares_avail+o.qty,price_history:[...co.price_history,{p:np,t:isoNow()}]});
        await recordTrade(ticker,o.qty,np,'exchange',u.id,'limit_sell');
      }
      await sb.patch('jex_limit_orders','id=eq.'+o.id,{status:'filled',filled_price:getCo(ticker)?.price,filled_at:ts()});
      o.status='filled';o.filled_price=getCo(ticker)?.price;
      await logActivity('limit_fill',u.name+"'s limit "+o.side+" "+o.qty+"×"+ticker+" filled vs JEX pool @ "+fmt(o.filled_price),{ticker,userId:u.id,userName:u.name,amount:o.filled_price});
      await pushNotification(u.id,'limit_fill','⚡ Limit '+o.side+' filled: '+o.qty+'×'+ticker+' @ '+fmt(o.filled_price),ticker);
      toast(u.name+"'s limit order filled: "+o.qty+"×"+ticker+" @ "+fmt(o.filled_price));
    }
  }
}

async function updateUser(uid2,data){const u=getUser(uid2);if(!u)return;Object.assign(u,data);await sb.patch('jex_users','id=eq.'+uid2,data);}
async function updateCo(ticker,data){const co=getCo(ticker);if(!co)return;Object.assign(co,data);await sb.patch('jex_companies','ticker=eq.'+ticker,data);}
async function recordTrade(ticker,qty,price,buyerId,sellerId,type='market'){
  const rec={ticker,qty,price,buyer_id:buyerId,seller_id:sellerId,type,ts:ts()};
  const result=await sb.post('jex_trades',rec);
  if(result&&result[0])DB.trades.push(result[0]);
  // Snapshot NW for buyers/sellers and check alerts/breakers
  if(buyerId&&buyerId!=='exchange'&&buyerId!=='short')snapshotNW(buyerId);
  if(sellerId&&sellerId!=='exchange'&&sellerId!=='cover')snapshotNW(sellerId);
  checkPriceAlerts();
  checkCircuitBreakers();
  pushBalances();
  // Refresh buyer and seller in DB.users so shareholder lists stay current
  [buyerId,sellerId].forEach(async uid2=>{
    if(!uid2||['exchange','short','cover'].includes(uid2))return;
    try{const fresh=await sb.get('jex_users','id=eq.'+uid2);
    if(fresh&&fresh[0]){const local=getUser(uid2);if(local)Object.assign(local,fresh[0]);}}catch(e){}
  });
  pushToSheets('trades',{trades:[{ticker,qty,price,type,ts:ts(),
    buyer:['exchange','short'].includes(buyerId)?'JEX':getUser(buyerId)?.name||buyerId,
    seller:['exchange','cover'].includes(sellerId)?'JEX':getUser(sellerId)?.name||sellerId}]});
}

async function placeBuy(ticker,qty){
  if(!requireOpen(ticker))return;const u=cu(),co=getCo(ticker);if(!u||!co)return;
  if(!checkRateLimit(u.id))return;
  if(u.role==='company'&&co.owner_id===u.id)return toast("You can't buy your own company's stock — use Buyback instead.");
  qty=parseInt(qty);if(isNaN(qty)||qty<=0)return toast('Enter a valid quantity');
  if(co.shares_avail<qty)return toast('Only '+co.shares_avail+' shares available');
  const np=impactPrice(co,qty,'buy'),cost=Math.round(np*qty*100)/100;
  if(!checkPriceBand(ticker,np))return;
  if(u.cash<cost)return toast('Insufficient funds (need '+fmt(cost)+')');
  const bH={...holdings(u)};bH[ticker]=(bH[ticker]||0)+qty;
  await updateUser(u.id,{cash:Math.round((u.cash-cost)*100)/100,holdings:bH});
  const newH=[...co.price_history,{p:np,t:isoNow()}];

async function coverShort(ticker,qty){
  if(!requireOpen(ticker))return;const u=cu(),co=getCo(ticker);if(!u||!co)return;
  qty=parseInt(qty);if(isNaN(qty)||qty<=0)return toast('Enter a valid quantity');

  const cp=impactPrice(co,qty,'buy'),pnl=Math.round((short.avgPrice-cp)*qty*100)/100;

  await updateCo(ticker,{price:cp,price_history:[...co.price_history,{p:cp,t:isoNow()}]});

}

// Chart interval state
const chartIntervals={};
function setChartType(chartId,type,ticker){
  UI['chartType_'+chartId]=type;
  const co=getCo(ticker);
  if(!co)return;
  destroyChart(chartId);
  const interval=chartIntervals[chartId]||'max';
  chartIntervals[chartId]=interval;
  // Update interval bar to reflect active state
  const barEl=document.getElementById('ibar-'+chartId);
  if(barEl)barEl.innerHTML=buildIntervalButtons(chartId,co);
  setTimeout(()=>{
    if(type==='candle')buildCandleChart(chartId,co);
    else buildChart(chartId,co);
  },20);
}
function setChartInterval(canvasId,interval,co){
  if(interval)chartIntervals[canvasId]=interval;
  // Destroy just this chart
  if(charts[canvasId])try{charts[canvasId].destroy();delete charts[canvasId];}catch(e){}
  // Update interval bar buttons in-place without full re-render
  const barId='ibar-'+canvasId;
  const bar=document.getElementById(barId);
  if(bar)bar.innerHTML=buildIntervalButtons(canvasId,co);
  // Build line or candle chart depending on type
  const chartType=UI['chartType_'+canvasId]||'line';
  setTimeout(()=>{
    if(chartType==='candle')buildCandleChart(canvasId,co);
    else buildChart(canvasId,co);
  },20);
}
function buildIntervalButtons(canvasId,co){
  const intervals=[['1d','1D'],['5d','5D'],['1m','1M'],['max','Max']];
  const current=chartIntervals[canvasId]||'max';
  return intervals.map(([val,label])=>`<button style="font-size:11px;padding:2px 8px;border-radius:4px;cursor:pointer;border:1px solid ${current===val?'var(--blue)':'var(--border2)'};background:${current===val?'var(--blue)':'transparent'};color:${current===val?'white':'var(--text2)'};font-family:var(--font)" onclick="setChartInterval('${canvasId}','${val}',getCo('${co.ticker}'))">${label}</button>`).join('');
}
function filterByInterval(pts,interval){
  if(!pts||!pts.length)return pts;
  if(interval==='max')return pts;
  const now=Date.now();
  const ms={'1d':86400000,'5d':5*86400000,'1m':30*86400000}[interval];
  if(!ms)return pts;
  const cutoff=now-ms;
  // Filter by real timestamp if available, else fall back to slicing
  const withRealTs=pts.filter(p=>p.t&&p.t.includes('T')&&p.t.includes('Z'));
  if(withRealTs.length>0){
    const filtered=pts.filter(p=>{
      if(!p.t||!p.t.includes('T'))return false;
      try{return new Date(p.t).getTime()>=cutoff;}catch(e){return false;}
    });
    return filtered.length>0?filtered:pts; // return all if nothing in range
  }
  // Fallback: slice from end
  const counts={'1d':Math.min(pts.length,30),'5d':Math.min(pts.length,150),'1m':Math.min(pts.length,500)};
  return pts.slice(-counts[interval]);
}
function buildChartIntervalBar(canvasId,co){
  return '<div id="ibar-'+canvasId+'" style="display:flex;gap:2px;margin-bottom:6px">'+buildIntervalButtons(canvasId,co)+'</div>';
}
function fmtChartLabel(t,interval){
  if(!t)return '';
  // ISO timestamp
  if(t.includes('T')&&t.includes('Z')){
    const d=new Date(t);
    if(interval==='1d')return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    if(interval==='5d')return d.toLocaleDateString([],{weekday:'short',hour:'2-digit',minute:'2-digit'});
    if(interval==='1m')return d.toLocaleDateString([],{month:'short',day:'numeric'});
    return d.toLocaleDateString([],{month:'short',day:'numeric'});
  }
  return t; // fallback for old string labels
}
function destroyChart(canvasId){
  if(charts[canvasId]){
    try{charts[canvasId].destroy();}catch(e){}
    delete charts[canvasId];
  }
  // Also check Chart.js registry
  const canvas=get(canvasId);
  if(canvas&&window.Chart){
    const existing=Chart.getChart(canvas);
    if(existing)try{existing.destroy();}catch(e){}
  }
}
function buildChart(canvasId,co){
  destroyChart(canvasId);
  const canvas=get(canvasId);if(!canvas||!window.Chart)return;
  const interval=chartIntervals[canvasId]||'max';
  const allPts=co.price_history||[];
  const pts=filterByInterval(allPts,interval);
  if(!pts.length)return;
  const prices=pts.map(p=>p.p);
  const labels=pts.map((p,i)=>i===pts.length-1?'Now':fmtChartLabel(p.t,interval));
  const isUp=prices.length>0&&prices[prices.length-1]>=prices[0];
  const lc=isUp?'#00c896':'#ff4d6a';
  const fillColor=isUp?'rgba(0,200,150,0.06)':'rgba(255,77,106,0.06)';
  try{
    charts[canvasId]=new Chart(canvas,{
      type:'line',
      data:{labels,datasets:[{
        data:prices,borderColor:lc,borderWidth:2,
        pointRadius:pts.length>50?0:pts.length>20?1:3,
        pointBackgroundColor:lc,
        fill:true,backgroundColor:fillColor,tension:0.3
      }]},
      options:{
        responsive:true,maintainAspectRatio:false,
        animation:{duration:200},
        plugins:{legend:{display:false},tooltip:{callbacks:{
          label:ctx=>fmt(ctx.parsed.y),
          title:ctx=>ctx[0]?.label||''
        }}},
        scales:{
          x:{grid:{color:'rgba(136,150,168,0.07)'},ticks:{color:'#4a5568',font:{size:10},maxTicksLimit:6,autoSkip:true}},
          y:{grid:{color:'rgba(136,150,168,0.07)'},ticks:{color:'#4a5568',font:{size:10},callback:v=>fmt(v)},beginAtZero:false}
        }
      }
    });
  }catch(e){console.warn('buildChart error:',e);}
}
function impactPreview(co,qty,dir){if(!qty||qty<=0)return'';const np=impactPrice(co,qty,dir),delta=np-co.price,pct=((delta/co.price)*100).toFixed(2),cls=dir==='buy'?'price-up':'price-down';return `<div style="font-size:12px;margin-top:6px;padding:6px 10px;background:var(--bg3);border-radius:var(--radius)">Fill: <strong>${fmt(np)}</strong> <span class="${cls}">${delta>=0?'+':''}${fmt(delta)} (${delta>=0?'+':''}${pct}%)</span> &nbsp;|&nbsp; Total: <strong>${fmt(np*qty)}</strong></div>`;}
function shortPrev(co,qty){if(!qty||qty<=0)return'';const c=Math.round(co.price*qty*1.5*100)/100;return `<div style="font-size:12px;margin-top:6px;padding:6px 10px;background:rgba(83,74,183,0.1);border-radius:var(--radius);color:#AFA9EC">Short ${qty} @ ${fmt(co.price)} | Collateral: <strong>${fmt(c)}</strong></div>`;}
function dilPreview(co,ns){if(!ns||ns<=0)return'';const ta=co.shares+ns,np=Math.max(0.01,Math.round(co.price*(co.shares/ta)*100)/100);return `<div style="font-size:12px;padding:10px;background:var(--bg3);border-radius:var(--radius);margin-top:6px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px"><div><div style="color:var(--text2);margin-bottom:2px">Total after</div><div style="font-weight:500">${ta.toLocaleString()}</div></div><div><div style="color:var(--text2);margin-bottom:2px">Increase</div><div style="font-weight:500;color:var(--amber)">+${Math.round((ns/co.shares)*100)}%</div></div><div><div style="color:var(--text2);margin-bottom:2px">Est. price</div><div style="font-weight:500;color:var(--red)">${fmt(np)}</div></div></div>`;}
