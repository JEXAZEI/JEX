<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>JEX — JTED Stock Exchange</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#161b27;--bg3:#1c2333;--border:#1e2d47;--border2:#253450;
  --text:#e8e6e1;--text2:#8896a8;--text3:#4a5568;
  --amber:#f0a500;--green:#00c896;--red:#ff4d6a;--blue:#378ADD;--blue2:#185FA5;
  --purple:#534AB7;--teal:#1D9E75;--chair:#c9a227;--pres:#7c6dfa;
  --radius:8px;--radius-lg:12px;
  --font:'DM Sans',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace;
}
body{font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);min-height:100vh}
#app{display:flex;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:40}
.logo{font-family:var(--mono);font-size:16px;font-weight:500;display:flex;align-items:center;gap:10px}
.logo .jex{color:var(--amber)}.logo .sep{width:1px;height:16px;background:var(--border)}.logo .full{font-family:var(--font);font-size:12px;font-weight:300;color:var(--text2)}
.user-pill{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500}
.av-s{background:rgba(55,138,221,0.2);color:#85B7EB}.av-c{background:rgba(240,165,0,0.15);color:var(--amber)}
.av-ch{background:rgba(201,162,39,0.2);color:var(--chair)}.av-pr{background:rgba(124,109,250,0.2);color:var(--pres)}
.logout-btn{font-size:12px;cursor:pointer;padding:3px 8px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--text2);font-family:var(--font)}
.logout-btn:hover{background:var(--bg3)}
.session-banner{display:flex;align-items:center;justify-content:space-between;padding:7px 20px;font-size:12px;border-bottom:1px solid var(--border)}
.s-open{background:rgba(0,200,150,0.08);color:var(--green)}.s-closed{background:rgba(255,77,106,0.08);color:var(--red)}.s-paused{background:rgba(240,165,0,0.08);color:var(--amber)}
.timer{font-family:var(--mono);font-size:16px;font-weight:500;margin-left:8px}
.nav{display:flex;gap:2px;padding:6px 20px;border-bottom:1px solid var(--border);background:var(--bg2);flex-wrap:wrap}
.nav-btn{font-size:13px;padding:5px 12px;border-radius:var(--radius);cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:var(--font)}
.nav-btn:hover{background:var(--bg3)}.nav-btn.active{background:var(--bg);color:var(--text);font-weight:500;border:1px solid var(--border)}
.content{flex:1;padding:20px;overflow:auto;max-width:1200px;margin:0 auto;width:100%}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:14px}
.section-title{font-size:15px;font-weight:500;margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:14px}
.mcard{background:var(--bg3);border-radius:var(--radius);padding:12px 14px}
.mlabel{font-size:11px;color:var(--text2);margin-bottom:4px}.mval{font-size:22px;font-weight:500}
.mval.green{color:var(--green)}.mval.red{color:var(--red)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-weight:500;font-size:11px;color:var(--text2);padding:6px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid rgba(30,45,71,0.5);vertical-align:middle}
tr:last-child td{border-bottom:none}tr:hover td{background:var(--bg3)}
th.r,td.r{text-align:right}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px}
.b-green{background:rgba(0,200,150,0.12);color:var(--green)}.b-red{background:rgba(255,77,106,0.12);color:var(--red)}
.b-amber{background:rgba(240,165,0,0.12);color:var(--amber)}.b-blue{background:rgba(55,138,221,0.15);color:#85B7EB}
.b-gray{background:rgba(136,150,168,0.12);color:var(--text2)}.b-purple{background:rgba(83,74,183,0.15);color:#AFA9EC}
.b-teal{background:rgba(0,200,150,0.1);color:var(--teal)}.b-coral{background:rgba(255,77,106,0.1);color:#FF8099}
.b-chair{background:rgba(201,162,39,0.15);color:var(--chair)}.b-pres{background:rgba(124,109,250,0.15);color:var(--pres)}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;font-family:var(--font);outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(55,138,221,0.15)}
.frow{margin-bottom:12px}.flabel{font-size:12px;color:var(--text2);margin-bottom:5px;display:block}
.btn{padding:7px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text);font-family:var(--font);transition:background 0.15s}
.btn:hover{background:var(--bg3)}.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-primary:hover{background:var(--blue2)}
.btn-success{background:var(--teal);color:#fff;border-color:var(--teal)}.btn-success:hover{background:#0F6E56}
.btn-danger{background:var(--red);color:#fff;border-color:var(--red)}.btn-danger:hover{background:#cc2240}
.btn-warning{background:#BA7517;color:#fff;border-color:#BA7517}.btn-warning:hover{background:#854F0B}
.btn-purple{background:var(--purple);color:#fff;border-color:var(--purple)}.btn-purple:hover{background:#3C3489}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-row{display:flex;gap:6px;flex-wrap:wrap}.row{display:flex;gap:10px;align-items:flex-start}
.ot-toggle{display:flex;border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;width:fit-content;margin-bottom:14px}
.ot-btn{font-size:13px;padding:6px 18px;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:var(--font)}
.ot-buy{background:var(--teal);color:#fff}.ot-sell{background:var(--red);color:#fff}.ot-short{background:var(--purple);color:#fff}.ot-cover{background:#BA7517;color:#fff}
.price-up{color:var(--green)}.price-down{color:var(--red)}
.empty{text-align:center;padding:32px;color:var(--text2);font-size:13px}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.tab-row{display:flex;gap:2px;margin-bottom:14px;flex-wrap:wrap}
.tab{font-size:13px;padding:5px 12px;cursor:pointer;border-radius:var(--radius);color:var(--text2);border:none;background:transparent;font-family:var(--font)}
.tab:hover{background:var(--bg3)}.tab.active{background:var(--bg3);color:var(--text);font-weight:500}
.app-row{display:flex;align-items:flex-start;justify-content:space-between;padding:12px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;gap:12px}
.app-info{flex:1}.app-name{font-size:13px;font-weight:500}.app-meta{font-size:12px;color:var(--text2);margin-top:2px}
.ibox{border-radius:var(--radius);padding:10px 12px;font-size:12px;margin-bottom:12px}
.ibox-amber{background:rgba(240,165,0,0.08);border:1px solid rgba(240,165,0,0.2);color:var(--amber)}
.ibox-teal{background:rgba(0,200,150,0.07);border:1px solid rgba(0,200,150,0.2);color:var(--teal)}
.ibox-blue{background:rgba(55,138,221,0.08);border:1px solid rgba(55,138,221,0.2);color:#85B7EB}
.ibox-purple{background:rgba(83,74,183,0.1);border:1px solid rgba(83,74,183,0.25);color:#AFA9EC}
.ibox-green{background:rgba(0,200,150,0.07);border:1px solid rgba(0,200,150,0.2);color:var(--green)}
.ibox-red{background:rgba(255,77,106,0.08);border:1px solid rgba(255,77,106,0.2);color:var(--red)}
.sbar-wrap{min-width:90px}.sbar-bg{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:4px}.sbar-fill{height:4px;border-radius:2px;background:var(--blue)}
.short-pos{background:rgba(83,74,183,0.08);border:1px solid rgba(83,74,183,0.2);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px}
.ticker-bar{display:flex;gap:10px;overflow-x:auto;padding:6px 0;margin-bottom:14px;scrollbar-width:none}
.ticker-item{background:var(--bg3);border-radius:var(--radius);padding:8px 12px;min-width:88px;flex-shrink:0;cursor:pointer;border:1px solid transparent}
.ticker-item:hover{border-color:var(--border2)}.ticker-item.active-t{border-color:var(--blue)}.ticker-item.watched{border-color:var(--teal)}
.tsym{font-size:11px;font-weight:500;font-family:var(--mono)}.tprice{font-size:15px;font-weight:500;font-family:var(--mono)}.tchg{font-size:11px}
.lb-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);gap:12px}
.lb-row:last-child{border-bottom:none}
.lb-rank{font-size:18px;font-weight:500;min-width:32px;font-family:var(--mono)}
.r-gold{color:var(--amber)}.r-silver{color:var(--text2)}.r-bronze{color:#993C1D}
.lb-name{flex:1;font-weight:500}.lb-val{font-size:14px;font-weight:500;font-family:var(--mono)}
.wstar{cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;border:none;background:transparent;color:var(--text3)}
.wstar:hover{background:var(--bg3)}.wstar.on{color:var(--amber)}
.reg-tabs{display:flex;border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;width:100%}
.reg-tab{flex:1;font-size:13px;padding:8px;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:var(--font);text-align:center}
.reg-tab.active{background:var(--bg3);color:var(--text);font-weight:500}
.link-btn{background:none;border:none;color:var(--blue);font-size:12px;cursor:pointer;padding:0;font-family:var(--font);text-decoration:underline}
.toast{position:fixed;bottom:20px;right:20px;background:#1c2333;color:var(--text);padding:10px 16px;border-radius:var(--radius);font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;max-width:320px;border:1px solid var(--border2);box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.toast.show{opacity:1}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--amber);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);padding:20px}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;width:100%;max-width:400px}
.login-logo{font-family:var(--mono);font-size:22px;font-weight:600;margin-bottom:4px}
.login-logo .jex{color:var(--amber)}.login-sub{font-size:13px;color:var(--text2);margin-bottom:22px}
.acct-list{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:8px}
.acct-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border)}
.acct-item:last-child{border-bottom:none}.acct-item:hover{background:var(--bg3)}
.acct-name{font-size:13px;font-weight:500}.acct-email{font-size:11px;color:var(--text2)}
.success-box{background:rgba(0,200,150,0.07);border:1px solid rgba(0,200,150,0.2);border-radius:var(--radius);padding:10px 12px;font-size:12px;color:var(--green);margin-bottom:12px}
.config-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:var(--bg)}
.config-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;width:100%;max-width:520px}
/* Sparkline */
.sparkline-cell{width:100px;height:36px;display:inline-block}
/* News */
.news-item{border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;background:var(--bg2)}
.news-item:hover{border-color:var(--border2)}
.news-headline{font-size:14px;font-weight:500;margin-bottom:4px}
.news-body{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:8px}
.news-meta{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--text3)}
.news-ticker{font-family:var(--mono);font-size:11px;padding:1px 6px;border-radius:3px;background:rgba(240,165,0,0.1);color:var(--amber)}
</style>
</head>
<body>
<div id="app"><div class="loading-screen"><div class="spinner"></div><div style="color:var(--text2);font-size:13px">Connecting to JEX...</div></div></div>
<div class="toast" id="toast"></div>
<script>
// ═══════════════════════════════════════════════
// CONFIG — paste your Supabase values here
// ═══════════════════════════════════════════════
const SUPABASE_URL = 'https://hahxemgfkorglaoywybq.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_-moLk6DXyj8L41Ope-RAXw_3YPkyv_8';
const SESSION_KEY = 'jex-session-v3';

const sb = {
  h: {'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY},
  url:(t,q='')=>SUPABASE_URL+'/rest/v1/'+t+(q?'?'+q:''),
  async get(t,q=''){const r=await fetch(this.url(t,q),{headers:{...this.h,'Accept':'application/json'}});if(!r.ok)throw new Error(await r.text());return r.json();},
  async post(t,d){const r=await fetch(this.url(t),{method:'POST',headers:{...this.h,'Prefer':'return=representation'},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json();},
  async patch(t,q,d){const r=await fetch(this.url(t,q),{method:'PATCH',headers:{...this.h,'Prefer':'return=representation'},body:JSON.stringify(d)});if(!r.ok)throw new Error(await r.text());return r.json();},
  async del(t,q){const r=await fetch(this.url(t,q),{method:'DELETE',headers:this.h});if(!r.ok)throw new Error(await r.text());}
};
const isConfigured=()=>SUPABASE_URL!=='YOUR_SUPABASE_URL'&&SUPABASE_ANON_KEY!=='YOUR_SUPABASE_ANON_KEY';

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let DB={users:[],pending:[],companies:[],news:[],ipoApps:[],dilApps:[],trades:[],dividends:[],buybacks:[],
  announcements:[],limitOrders:[],activity:[],shareClasses:[],classApps:[],votes:[],ballots:[],
  session:{id:1,status:'closed',label:'Session closed',ends_at:null,scheduled_open:null,scheduled_close:null,starting_cash:10000}};
let UI={userId:null,navTab:'market',adminTab:'registrations',appTab:'status',companyTab:'stock',portfolioTab:'holdings',loginView:'select',pendingLoginId:null,forgotUserId:null,panelTicker:null,panelMode:'buy'};
let charts={},sessionTimer=null;

async function loadAll(){
  const [users,pending,companies,news,ipoApps,dilApps,trades,dividends,buybacks,session,announcements,limitOrders,activity,shareClasses,classApps,votes,ballots]=await Promise.all([
    sb.get('jex_users','order=created_at.asc'),sb.get('jex_pending','order=created_at.asc'),
    sb.get('jex_companies','order=created_at.asc'),sb.get('jex_news','order=created_at.desc'),
    sb.get('jex_ipo_applications','order=created_at.asc'),sb.get('jex_dilution_applications','order=created_at.asc'),
    sb.get('jex_trades','order=id.asc'),sb.get('jex_dividends','order=created_at.asc'),
    sb.get('jex_buybacks','order=created_at.asc'),sb.get('jex_session','id=eq.1'),
    sb.get('jex_announcements','order=created_at.desc'),
    sb.get('jex_limit_orders','order=created_at.asc'),
    sb.get('jex_activity','order=created_at.desc&limit=200'),
    sb.get('jex_share_classes','order=created_at.asc'),
    sb.get('jex_class_applications','order=created_at.asc'),
    sb.get('jex_votes','order=created_at.desc'),
    sb.get('jex_vote_ballots','order=created_at.asc')
  ]);
  DB={users,pending,companies,news,ipoApps,dilApps,trades,dividends,buybacks,
    session:session[0]||DB.session,announcements,limitOrders,activity,
    shareClasses,classApps,votes,ballots};
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
const get=id=>document.getElementById(id);
const fmt=n=>'$'+Number(n).toFixed(2);
const fmtChg=n=>(n>=0?'+':'')+Number(n).toFixed(2)+'%';
const norm=s=>(s||'').trim().toLowerCase();
const validEmail=e=>e&&e.includes('@')&&e.includes('.');
const cu=()=>DB.users.find(u=>u.id===UI.userId)||null;
const getUser=id=>DB.users.find(u=>u.id===id);
const getCo=t=>DB.companies.find(c=>c.ticker===t);
const uid=()=>'id_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
const ts=()=>new Date().toLocaleTimeString();
const priceChg=c=>{if(!c.price_history||c.price_history.length<2)return 0;const f=c.price_history[0].p,l=c.price_history[c.price_history.length-1].p;return f?((l-f)/f*100):0;};
const holdings=u=>u.holdings||{};const shorts=u=>u.shorts||{};const watchlist=u=>u.watchlist||[];
const pv=u=>Object.entries(holdings(u)).reduce((s,[t,q])=>{const c=getCo(t);return s+(c?c.price*q:0);},0);
const sPnl=u=>Object.entries(shorts(u)).reduce((s,[t,pos])=>{const c=getCo(t);if(!c)return s;return s+Math.round((pos.avgPrice-c.price)*pos.qty*100)/100;},0);
const divRec=u=>DB.dividends.reduce((s,d)=>{const p=(d.payouts||[]).find(x=>x.userId===u.id);return s+(p?p.payout:0);},0);
const nw=u=>Math.round((u.cash+pv(u)+sPnl(u))*100)/100;
const isAdmin=u=>(u?.role==='chairman'||u?.role==='president');
const isChairman=u=>u?.role==='chairman';
const isOpen=()=>DB.session.status==='open';
const requireOpen=()=>{if(!isOpen()){toast('Trading is '+DB.session.status+'. Wait for the session to open.');return false;}return true;};
const shareholders=ticker=>DB.users.filter(u=>u.role==='student'&&(holdings(u)[ticker]||0)>0);
const divTotal=(ticker,ps)=>shareholders(ticker).reduce((s,u)=>s+Math.round(((holdings(u)[ticker])||0)*ps*100)/100,0);
const impactPrice=(co,qty,dir)=>{const liq=co.shares*0.05,impact=Math.min((qty/liq)*0.015,0.12);return Math.max(0.01,Math.round((dir==='buy'?co.price*(1+impact):co.price*(1-impact))*100)/100);};
const isWatched=ticker=>{const u=cu();return u&&watchlist(u).includes(ticker);};
const sharesBar=co=>{const pct=co.shares>0?Math.round((co.shares_avail/co.shares)*100):0;return `<div class="sbar-wrap"><div style="font-size:12px;font-weight:500;font-family:var(--mono)">${co.shares_avail.toLocaleString()} <span style="font-weight:400;color:var(--text2)">/ ${co.shares.toLocaleString()}</span></div><div style="font-size:11px;color:var(--text3);margin-top:1px">${pct}% available</div><div class="sbar-bg"><div class="sbar-fill" style="width:${pct}%"></div></div></div>`;};
const roleBadge=role=>role==='chairman'?'<span class="badge b-chair">Chairman</span>':role==='president'?'<span class="badge b-pres">President</span>':role==='student'?'<span class="badge b-blue">Student</span>':role==='company'?'<span class="badge b-amber">Company</span>':'';
const avatarClass=role=>role==='chairman'?'av-ch':role==='president'?'av-pr':role==='company'?'av-c':'av-s';

function toast(msg){const t=get('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3200);}
function destroyCharts(){Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};}

// ═══════════════════════════════════════════════
// SESSION
// ═══════════════════════════════════════════════
const pad=n=>n<10?'0'+n:String(n);
function getAZTime(){return new Date(new Date().toLocaleString('en-US',{timeZone:'America/Phoenix'}));}
function fmtAZTime(d){return d.toLocaleString('en-US',{timeZone:'America/Phoenix',weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true})+' MST';}
async function saveSession(data){Object.assign(DB.session,data);await sb.patch('jex_session','id=eq.1',data);}
async function setSession(status){const label=status==='open'?'Session open':status==='paused'?'Session paused':'Session closed';clearInterval(sessionTimer);sessionTimer=null;await saveSession({status,label,ends_at:null,scheduled_open:null,scheduled_close:null});const u=cu();await logActivity('session','Session '+status+(u?' by '+u.name:''),{userId:u?.id,userName:u?.name});render();}
async function startTimer(mins){clearInterval(sessionTimer);sessionTimer=null;const endsAt=Date.now()+mins*60000;await saveSession({status:'open',label:'Session — '+mins+'min',ends_at:endsAt,scheduled_open:null,scheduled_close:null});sessionTimer=setInterval(tickTimer,500);render();}
function tickTimer(){if(!DB.session.ends_at)return;const rem=DB.session.ends_at-Date.now();if(rem<=0){saveSession({status:'closed',label:'Session ended',ends_at:null}).then(()=>{clearInterval(sessionTimer);sessionTimer=null;render();toast('Session ended!');});return;}const el=get('timer-el');if(el){const m=Math.floor(rem/60000),s=Math.floor((rem%60000)/1000);el.textContent=m+':'+(s<10?'0':'')+s;}const al=get('admin-timer-txt');if(al)al.textContent=Math.max(0,Math.round(rem/1000))+'s';}
async function scheduleSession(){const sh=parseInt(get('sched-start-h')?.value||'8'),sm2=parseInt(get('sched-start-m')?.value||'0'),eh=parseInt(get('sched-end-h')?.value||'15'),em=parseInt(get('sched-end-m')?.value||'0');if([sh,sm2,eh,em].some(isNaN))return toast('Enter valid times');const startMin=sh*60+sm2,endMin=eh*60+em;if(endMin<=startMin)return toast('End time must be after start time');const az=getAZTime(),nowMin=az.getHours()*60+az.getMinutes();if(nowMin>=endMin)return toast('End time has already passed in Arizona time');if(nowMin<startMin){await saveSession({status:'closed',label:'Scheduled: opens '+pad(sh)+':'+pad(sm2)+' – '+pad(eh)+':'+pad(em)+' MST',ends_at:null,scheduled_open:{h:sh,m:sm2},scheduled_close:{h:eh,m:em}});toast('Session scheduled for '+pad(sh)+':'+pad(sm2)+' – '+pad(eh)+':'+pad(em)+' AZ time');}else{const msUntilEnd=(endMin-nowMin)*60*1000-az.getSeconds()*1000;await saveSession({status:'open',label:'Open until '+pad(eh)+':'+pad(em)+' MST',ends_at:Date.now()+msUntilEnd,scheduled_open:null,scheduled_close:{h:eh,m:em}});sessionTimer=setInterval(tickTimer,500);toast('Session open until '+pad(eh)+':'+pad(em)+' AZ time');}render();}
async function clearSchedule(){await saveSession({scheduled_open:null,scheduled_close:null,status:'closed',label:'Session closed',ends_at:null});toast('Schedule cleared');render();}
function checkSchedule(){if(!DB.session.scheduled_open&&!DB.session.scheduled_close)return;const az=getAZTime(),nowMin=az.getHours()*60+az.getMinutes();if(DB.session.scheduled_open){const openMin=DB.session.scheduled_open.h*60+DB.session.scheduled_open.m,closeMin=DB.session.scheduled_close.h*60+DB.session.scheduled_close.m;if(nowMin>=openMin&&nowMin<closeMin&&DB.session.status!=='open'){const msUntilEnd=(closeMin-nowMin)*60*1000-az.getSeconds()*1000;saveSession({status:'open',label:'Open until '+pad(DB.session.scheduled_close.h)+':'+pad(DB.session.scheduled_close.m)+' MST',ends_at:Date.now()+msUntilEnd,scheduled_open:null}).then(()=>{sessionTimer=setInterval(tickTimer,500);render();toast('Trading session is now open!');});}}if(DB.session.scheduled_close&&DB.session.status==='open'&&DB.session.ends_at&&Date.now()>=DB.session.ends_at){saveSession({status:'closed',label:'Session ended',ends_at:null,scheduled_close:null}).then(()=>{clearInterval(sessionTimer);sessionTimer=null;render();toast('Session ended.');});}}
setInterval(()=>{checkSchedule();if(DB.session.ends_at&&DB.session.status==='open'&&!sessionTimer)sessionTimer=setInterval(tickTimer,500);},15000);

// ── Limit orders ────────────────────────────────────────
async function placeLimitOrder(ticker,side,qty,limitPrice){
  if(!requireOpen())return;
  const u=cu(),co=getCo(ticker);if(!u||!co)return;
  qty=parseInt(qty);limitPrice=parseFloat(limitPrice);
  if(isNaN(qty)||qty<=0)return toast('Enter a valid quantity');
  if(isNaN(limitPrice)||limitPrice<=0)return toast('Enter a valid limit price');
  // Check if fills immediately
  const fillsNow=(side==='buy'&&co.price<=limitPrice)||(side==='sell'&&co.price>=limitPrice);
  if(fillsNow){
    if(side==='buy')await placeBuy(ticker,qty);
    else await placeSell(ticker,qty);
    toast(qty+' × '+ticker+' limit order filled immediately at '+fmt(co.price));
    return;
  }
  // Check student has enough
  if(side==='buy'){
    const maxCost=Math.round(limitPrice*qty*100)/100;
    if(u.cash<maxCost)return toast('Insufficient funds to reserve (need '+fmt(maxCost)+' at limit price)');
  } else {
    const held=(holdings(u)[ticker])||0;
    if(held<qty)return toast('You only hold '+held+' shares');
  }
  const order={id:uid(),user_id:u.id,ticker,side,qty,limit_price:limitPrice,status:'open',ts:ts()};
  await sb.post('jex_limit_orders',order);
  DB.limitOrders.push(order);
  await logActivity('limit_order',u.name+' placed limit '+side+' '+qty+'×'+ticker+' @ '+fmt(limitPrice),{ticker,userId:u.id,userName:u.name,amount:limitPrice});
  toast('Limit '+side+' order placed: '+qty+' × '+ticker+' @ '+fmt(limitPrice));render();
}
async function cancelLimitOrder(id){
  const o=DB.limitOrders.find(x=>x.id===id);if(!o)return;
  await sb.patch('jex_limit_orders','id=eq.'+id,{status:'cancelled'});
  o.status='cancelled';
  toast('Order cancelled');render();
}
async function checkLimitOrders(){
  const openOrders=DB.limitOrders.filter(o=>o.status==='open');
  if(!openOrders.length||!isOpen())return;
  for(const o of openOrders){
    const co=getCo(o.ticker);if(!co)continue;
    const u=getUser(o.user_id);if(!u)continue;
    const shouldFill=(o.side==='buy'&&co.price<=o.limit_price)||(o.side==='sell'&&co.price>=o.limit_price);
    if(!shouldFill)continue;
    // Fill it
    if(o.side==='buy'){
      if(co.shares_avail<o.qty||u.cash<co.price*o.qty)continue;
      const np=impactPrice(co,o.qty,'buy'),cost=Math.round(np*o.qty*100)/100;
      if(u.cash<cost)continue;
      const bH={...holdings(u)};bH[o.ticker]=(bH[o.ticker]||0)+o.qty;
      await updateUser(u.id,{cash:Math.round((u.cash-cost)*100)/100,holdings:bH});
      await updateCo(o.ticker,{price:np,shares_avail:Math.max(0,co.shares_avail-o.qty),price_history:[...co.price_history,{p:np,t:ts()}]});
      await recordTrade(o.ticker,o.qty,np,u.id,'exchange','limit_buy');
    } else {
      const held=(holdings(u)[o.ticker])||0;if(held<o.qty)continue;
      const np=impactPrice(co,o.qty,'sell');
      const nH={...holdings(u)};nH[o.ticker]=held-o.qty;if(nH[o.ticker]<=0)delete nH[o.ticker];
      await updateUser(u.id,{cash:Math.round((u.cash+o.qty*np)*100)/100,holdings:nH});
      await updateCo(o.ticker,{price:np,shares_avail:co.shares_avail+o.qty,price_history:[...co.price_history,{p:np,t:ts()}]});
      await recordTrade(o.ticker,o.qty,np,'exchange',u.id,'limit_sell');
    }
    await sb.patch('jex_limit_orders','id=eq.'+o.id,{status:'filled',filled_price:getCo(o.ticker)?.price,filled_at:ts()});
    o.status='filled';o.filled_price=getCo(o.ticker)?.price;
    await logActivity('limit_fill',u.name+"'s limit "+o.side+" "+o.qty+"×"+o.ticker+" filled @ "+fmt(o.filled_price||o.limit_price),{ticker:o.ticker,userId:u.id,userName:u.name,amount:o.filled_price});
    toast('Limit order filled: '+o.qty+' × '+o.ticker+' for '+u.name);
  }
}
// Check limit orders every 15 seconds
setInterval(checkLimitOrders,15000);

async function updateUser(uid2,data){const u=getUser(uid2);if(!u)return;Object.assign(u,data);await sb.patch('jex_users','id=eq.'+uid2,data);}
async function updateCo(ticker,data){const co=getCo(ticker);if(!co)return;Object.assign(co,data);await sb.patch('jex_companies','ticker=eq.'+ticker,data);}
async function recordTrade(ticker,qty,price,buyerId,sellerId,type='market'){const rec={ticker,qty,price,buyer_id:buyerId,seller_id:sellerId,type,ts:ts()};const result=await sb.post('jex_trades',rec);if(result&&result[0])DB.trades.push(result[0]);}

async function placeBuy(ticker,qty){
  if(!requireOpen())return;const u=cu(),co=getCo(ticker);if(!u||!co)return;
  if(u.role==='company'&&co.owner_id===u.id)return toast("You can't buy your own company's stock — use Buyback instead.");
  qty=parseInt(qty);if(isNaN(qty)||qty<=0)return toast('Enter a valid quantity');
  if(co.shares_avail<qty)return toast('Only '+co.shares_avail+' shares available');
  const np=impactPrice(co,qty,'buy'),cost=Math.round(np*qty*100)/100;
  if(u.cash<cost)return toast('Insufficient funds (need '+fmt(cost)+')');
  const bH={...holdings(u)};bH[ticker]=(bH[ticker]||0)+qty;
  await updateUser(u.id,{cash:Math.round((u.cash-cost)*100)/100,holdings:bH});
  const newH=[...co.price_history,{p:np,t:ts()}];
  await updateCo(ticker,{price:np,shares_avail:Math.max(0,co.shares_avail-qty),price_history:newH});
  await recordTrade(ticker,qty,np,u.id,'exchange');
  toast('Bought '+qty+' × '+ticker+' @ '+fmt(np));openPanel(ticker);
}
async function placeSell(ticker,qty){
  if(!requireOpen())return;const u=cu(),co=getCo(ticker);if(!u||!co)return;
  qty=parseInt(qty);if(isNaN(qty)||qty<=0)return toast('Enter a valid quantity');
  const held=(holdings(u)[ticker])||0;if(held<qty)return toast('You only hold '+held+' shares');
  const np=impactPrice(co,qty,'sell');
  const nH={...holdings(u)};nH[ticker]=held-qty;if(nH[ticker]<=0)delete nH[ticker];
  await updateUser(u.id,{cash:Math.round((u.cash+qty*np)*100)/100,holdings:nH});
  const newH=[...co.price_history,{p:np,t:ts()}];
  await updateCo(ticker,{price:np,shares_avail:co.shares_avail+qty,price_history:newH});
  await recordTrade(ticker,qty,np,'exchange',u.id);
  toast('Sold '+qty+' × '+ticker+' @ '+fmt(np));openPanel(ticker);
}
async function placeShort(ticker,qty){
  if(!requireOpen())return;const u=cu(),co=getCo(ticker);if(!u||!co)return;
  qty=parseInt(qty);if(isNaN(qty)||qty<=0)return toast('Enter a valid quantity');
  const price=co.price,coll=Math.round(price*qty*1.5*100)/100;
  if(u.cash<coll)return toast('Need '+fmt(coll)+' collateral');
  const sh={...shorts(u)};if(!sh[ticker])sh[ticker]={qty:0,avgPrice:0,collateral:0};
  const ex=sh[ticker],tq=ex.qty+qty;
  sh[ticker]={qty:tq,avgPrice:Math.round(((ex.avgPrice*ex.qty)+(price*qty))/tq*100)/100,collateral:Math.round((ex.collateral+coll)*100)/100};
  await updateUser(u.id,{cash:Math.round((u.cash-coll)*100)/100,shorts:sh});
  const np=impactPrice(co,qty,'sell');
  await updateCo(ticker,{price:np,price_history:[...co.price_history,{p:np,t:ts()}]});
  await recordTrade(ticker,qty,price,'short',u.id,'short');
  toast('Shorted '+qty+' × '+ticker+' @ '+fmt(price));openPanel(ticker);
}
async function coverShort(ticker,qty){
  if(!requireOpen())return;const u=cu(),co=getCo(ticker);if(!u||!co)return;
  qty=parseInt(qty);if(isNaN(qty)||qty<=0)return toast('Enter a valid quantity');
  const sh={...shorts(u)},short=sh[ticker];if(!short||short.qty<qty)return toast('You only have '+(short?.qty||0)+' shorted');
  const cp=impactPrice(co,qty,'buy'),pnl=Math.round((short.avgPrice-cp)*qty*100)/100;
  const cb=Math.round((short.collateral*(qty/short.qty))*100)/100;
  sh[ticker]={...short,qty:short.qty-qty,collateral:Math.round((short.collateral-cb)*100)/100};
  if(sh[ticker].qty<=0)delete sh[ticker];
  await updateUser(u.id,{cash:Math.round((u.cash+cb+pnl)*100)/100,shorts:sh});
  await updateCo(ticker,{price:cp,price_history:[...co.price_history,{p:cp,t:ts()}]});
  await recordTrade(ticker,qty,cp,u.id,'cover','cover');
  toast('Covered '+qty+' × '+ticker+' | P&L: '+(pnl>=0?'+':'')+fmt(pnl));openPanel(ticker);
}
async function toggleWatch(ticker){const u=cu();if(!u)return;const wl=[...watchlist(u)];const i=wl.indexOf(ticker);if(i>=0){wl.splice(i,1);toast(ticker+' removed from watchlist');}else{wl.push(ticker);toast(ticker+' added to watchlist');}await updateUser(u.id,{watchlist:wl});render();}
async function doBuyback(ticker,qty){
  if(!requireOpen())return;const owner=cu(),co=getCo(ticker);if(!owner||!co)return;
  qty=parseInt(qty);if(isNaN(qty)||qty<=0)return toast('Enter valid quantity');
  const sold=co.shares-co.shares_avail;if(qty>sold)return toast('Only '+sold+' shares in circulation');
  const price=impactPrice(co,qty,'buy'),cost=Math.round(price*qty*100)/100;
  if(owner.cash<cost)return toast('Insufficient funds');
  await updateUser(owner.id,{cash:Math.round((owner.cash-cost)*100)/100});
  await updateCo(ticker,{price,shares_avail:co.shares_avail+qty,shares:co.shares-qty,price_history:[...co.price_history,{p:price,t:'Buyback'}]});
  const bb={id:uid(),ticker,company_name:co.name,qty,price,total:cost,ts:ts()};
  await sb.post('jex_buybacks',bb);DB.buybacks.push(bb);
  toast('Bought back '+qty+' shares @ '+fmt(price));render();
}
async function issueDividend(ticker,perShare,note){
  const co=getCo(ticker),owner=cu();if(!co||!owner)return;
  perShare=Math.round(parseFloat(perShare)*100)/100;
  if(isNaN(perShare)||perShare<=0)return toast('Enter a valid per-share amount');
  if(!note||note.trim().length<5)return toast('Please add a note');
  const sh=shareholders(ticker);if(!sh.length)return toast('No shareholders yet');
  const total=divTotal(ticker,perShare);
  if(owner.cash<total)return toast('Insufficient funds (need '+fmt(total)+')');
  if(!confirm('Pay '+fmt(perShare)+'/share? Total: '+fmt(total)))return;
  await updateUser(owner.id,{cash:Math.round((owner.cash-total)*100)/100});
  const payouts=[];

function buildChart(canvasId,co){
  const canvas=get(canvasId);if(!canvas||!window.Chart)return;
  const pts=co.price_history||[],prices=pts.map(p=>p.p),labels=pts.map((p,i)=>i===pts.length-1?'Now':p.t);
  const isUp=prices.length>0&&prices[prices.length-1]>=prices[0],lc=isUp?'#00c896':'#ff4d6a';
  charts[canvasId]=new Chart(canvas,{type:'line',data:{labels,datasets:[{data:prices,borderColor:lc,borderWidth:2,pointRadius:pts.length>30?0:3,pointBackgroundColor:lc,fill:false,tension:0.3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmt(ctx.parsed.y)}}},
      scales:{x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#4a5568',font:{size:11},maxTicksLimit:8,autoSkip:true}},y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#4a5568',font:{size:11},callback:v=>fmt(v)},beginAtZero:false}}}});
}
function impactPreview(co,qty,dir){if(!qty||qty<=0)return'';const np=impactPrice(co,qty,dir),delta=np-co.price,pct=((delta/co.price)*100).toFixed(2),cls=dir==='buy'?'price-up':'price-down';return `<div style="font-size:12px;margin-top:6px;padding:6px 10px;background:var(--bg3);border-radius:var(--radius)">Fill: <strong>${fmt(np)}</strong> <span class="${cls}">${delta>=0?'+':''}${fmt(delta)} (${delta>=0?'+':''}${pct}%)</span> &nbsp;|&nbsp; Total: <strong>${fmt(np*qty)}</strong></div>`;}
function shortPrev(co,qty){if(!qty||qty<=0)return'';const c=Math.round(co.price*qty*1.5*100)/100;return `<div style="font-size:12px;margin-top:6px;padding:6px 10px;background:rgba(83,74,183,0.1);border-radius:var(--radius);color:#AFA9EC">Short ${qty} @ ${fmt(co.price)} | Collateral: <strong>${fmt(c)}</strong></div>`;}
function dilPreview(co,ns){if(!ns||ns<=0)return'';const ta=co.shares+ns,np=Math.max(0.01,Math.round(co.price*(co.shares/ta)*100)/100);return `<div style="font-size:12px;padding:10px;background:var(--bg3);border-radius:var(--radius);margin-top:6px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px"><div><div style="color:var(--text2);margin-bottom:2px">Total after</div><div style="font-weight:500">${ta.toLocaleString()}</div></div><div><div style="color:var(--text2);margin-bottom:2px">Increase</div><div style="font-weight:500;color:var(--amber)">+${Math.round((ns/co.shares)*100)}%</div></div><div><div style="color:var(--text2);margin-bottom:2px">Est. price</div><div style="font-weight:500;color:var(--red)">${fmt(np)}</div></div></div>`;}

// Helper: get class metadata for a ticker (or null if base class)
function getClassMeta(ticker){return DB.shareClasses.find(c=>c.ticker===ticker)||null;}
// Helper: get all tickers for a company (base + classes)
function getCompanyTickers(parentTicker){
  const base=[parentTicker];
  const classes=DB.shareClasses.filter(c=>c.parent_ticker===parentTicker).map(c=>c.ticker);
  return [...base,...classes];
}
// Helper: can this user see/trade this ticker?
function canAccessTicker(ticker,userId){
  const meta=getClassMeta(ticker);
  if(!meta)return true; // base class, always accessible
  if(!meta.restricted)return true;
  if(!userId)return false;
  return (meta.whitelist||[]).includes(userId);
}
// Helper: voting power a user has for a company
function getVotingPower(userId,parentTicker){
  const u=getUser(userId);if(!u)return 0;
  const tickers=getCompanyTickers(parentTicker);
  return tickers.reduce((total,ticker)=>{
    const held=(holdings(u)[ticker])||0;if(!held)return total;
    const meta=getClassMeta(ticker);
    const vps=meta?meta.votes_per_share:1; // base class = 1 vote
    return total+held*vps;
  },0);
}

        class:app.class,label:'Class '+app.class,votes_per_share:app.votes_per_share,
        restricted:app.restricted,whitelist:app.whitelist||[],

async function postVote(parentTicker,question,optA,optB,closesAt){

  const u=cu();
  const v={id:uid(),parent_ticker:parentTicker,company_name:co.name,
    question:question.trim(),option_a:optA.trim(),option_b:optB.trim(),
    status:'open',created_by:u.id,ts:ts(),closes_at:closesAt||null};
  await sb.post('jex_votes',v);DB.votes.push(v);
  await logActivity('vote',co.name+' posted vote: '+question.trim(),{ticker:parentTicker,userId:u.id,userName:u.name});
  toast('Vote posted');UI.companyTab='votes';render();
}
async function castVote(voteId,choice){
  const v=DB.votes.find(x=>x.id===voteId);if(!v)return;
  const u=cu();if(!u)return;
  if(DB.ballots.find(b=>b.vote_id===voteId&&b.voter_id===u.id))return toast('You have already voted');
  const power=getVotingPower(u.id,v.parent_ticker);
  if(power<=0)return toast('You have no voting shares in this company');
  const ballot={id:uid(),vote_id:voteId,voter_id:u.id,voter_name:u.name,choice,voting_power:power,ts:ts()};
  await sb.post('jex_vote_ballots',ballot);DB.ballots.push(ballot);
  toast('Vote cast — '+power+' vote'+(power!==1?'s':'')+' counted');render();
}
async function closeVote(voteId){
  if(!confirm('Close this vote?'))return;
  await sb.patch('jex_votes','id=eq.'+voteId,{status:'closed'});

async function deleteVote(voteId){
  if(!confirm('Delete this vote and all ballots?'))return;
  await sb.del('jex_votes','id=eq.'+voteId);
  await sb.del('jex_vote_ballots','vote_id=eq.'+voteId);
  DB.votes=DB.votes.filter(x=>x.id!==voteId);
  DB.ballots=DB.ballots.filter(b=>b.vote_id!==voteId);
  toast('Vote deleted');render();
}
function getVoteResults(voteId){
  const ballots=DB.ballots.filter(b=>b.vote_id===voteId);
  const powerA=ballots.filter(b=>b.choice==='A').reduce((s,b)=>s+b.voting_power,0);
  const powerB=ballots.filter(b=>b.choice==='B').reduce((s,b)=>s+b.voting_power,0);
  const total=powerA+powerB;
  return{powerA,powerB,total,pctA:total?Math.round(powerA/total*100):0,pctB:total?Math.round(powerB/total*100):0,count:ballots.length};
}

function doRegister(){const active=document.querySelector('.reg-tab.active');const type=active?.id==='reg-tab-company'?'company':'student';if(type==='student')registerStudent(get('reg-name')?.value,get('reg-email')?.value,get('reg-pw')?.value,get('reg-secq')?.value,get('reg-secq-answer')?.value);else registerCompany(get('reg-co-name')?.value,get('reg-co-email')?.value,get('reg-co-pw')?.value,get('reg-co-desc')?.value,get('reg-co-secq')?.value,get('reg-co-secq-answer')?.value);}

function renderBanner(){
  const s=DB.session,cls=s.status==='open'?'s-open':s.status==='paused'?'s-paused':'s-closed';
  const timer=s.ends_at?'<span id="timer-el" class="timer">...</span>':'';
  const u=cu();const canControl=isAdmin(u);
  const ann=DB.announcements&&DB.announcements[0]||null;
  let annHtml='';
  if(ann){
    const annColor=ann.level==='urgent'?'background:rgba(255,77,106,0.12);border-bottom:1px solid rgba(255,77,106,0.25);color:#ff4d6a':ann.level==='warning'?'background:rgba(240,165,0,0.1);border-bottom:1px solid rgba(240,165,0,0.2);color:var(--amber)':'background:rgba(55,138,221,0.08);border-bottom:1px solid rgba(55,138,221,0.2);color:#85B7EB';
    const delBtn=canControl?('<button class="btn btn-sm btn-danger" style="font-size:11px;padding:2px 8px" onclick="deleteAnnouncement(&#39;'+ann.id+'&#39;)">&#x2715;</button>'):'';
    annHtml='<div style="'+annColor+';padding:8px 20px;font-size:13px;display:flex;align-items:center;justify-content:space-between"><span>📢 <strong>'+ann.title+'</strong>'+(ann.body?' — '+ann.body:'')+' <span style="font-size:11px;opacity:0.7;margin-left:8px">'+(ann.author_name||'')+' · '+(ann.ts||'')+'</span></span>'+delBtn+'</div>';
  }
  let sessionBtns='';
  if(canControl){
    const openBtn=s.status!=='open'?'<button class="btn btn-sm btn-success" onclick="setSession(&quot;open&quot;)">Open</button>':'';
    const pauseBtn=s.status==='open'?'<button class="btn btn-sm" style="border-color:var(--amber);color:var(--amber)" onclick="setSession(&quot;paused&quot;)">Pause</button>':'';
    const closeBtn=s.status!=='closed'?'<button class="btn btn-sm btn-danger" onclick="setSession(&quot;closed&quot;)">Close</button>':'';
    sessionBtns='<div style="display:flex;gap:6px">'+openBtn+' '+pauseBtn+' '+closeBtn+'</div>';
  }
  return annHtml+'<div class="session-banner '+cls+'"><span>'+s.label+timer+'</span>'+sessionBtns+'</div>';
}

      +DB.votes.filter(v=>v.status==='open').map(v=>renderVoteCard(v,false,isAdmin(u))).join('')
      +'</div>':''}
    ${recentNews.length?`<div class="card"><div class="section-title" style="display:flex;align-items:center;justify-content:space-between">Company news <span style="font-size:12px;font-weight:400;color:var(--text2)">${DB.news.length} post${DB.news.length!==1?'s':''}</span></div>${recentNews.map(n=>`<div class="news-item"><div class="news-headline">${n.headline}</div>${n.body?`<div class="news-body">${n.body}</div>`:''}<div class="news-meta" style="justify-content:space-between"><div style="display:flex;align-items:center;gap:10px"><span class="news-ticker">${n.ticker}</span><span>${n.company_name}</span><span>${n.ts||''}</span></div>${isAdmin(u)?`<button class="btn btn-sm btn-danger" onclick="deleteNews('${n.id}')">Delete</button>`:''}</div></div>`).join('')}${DB.news.length>5?`<div style="font-size:12px;color:var(--text2);text-align:center;padding:8px">Showing 5 of ${DB.news.length} posts</div>`:''}</div>`:''}
    <div id="trade-panel"></div>`;

function buildSparklines(){
  setTimeout(()=>{
    DB.companies.filter(c=>c.status==='listed').forEach(c=>{
      const canvas=document.getElementById('spark-'+c.ticker);
      if(!canvas||!window.Chart)return;
      if(charts['spark-'+c.ticker])return;
      const pts=(c.price_history||[]).slice(-20);
      if(pts.length<2)return;
      const prices=pts.map(p=>p.p);
      const isUp=prices[prices.length-1]>=prices[0];
      charts['spark-'+c.ticker]=new Chart(canvas,{type:'line',data:{labels:prices.map((_,i)=>i),datasets:[{data:prices,borderColor:isUp?'#00c896':'#ff4d6a',borderWidth:1.5,pointRadius:0,fill:false,tension:0.3}]},options:{responsive:false,animation:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}}}});
    });
  },80);
}

    :short?`<div class="ibox ibox-purple">Buy back borrowed shares to close your position.</div><div style="font-size:13px;margin-bottom:10px">Open: <strong>${short.qty} shares</strong> @ avg ${fmt(short.avgPrice)} | P&L: <span class="${(short.avgPrice-c.price)*short.qty>=0?'price-up':'price-down'}">${fmt((short.avgPrice-c.price)*short.qty)}</span></div><div class="row" style="align-items:flex-end"><div class="frow" style="flex:1"><label class="flabel">Quantity to cover</label><input type="number" id="t-qty" value="${short.qty}" min="1" max="${short.qty}"></div><div style="padding-bottom:12px"><button class="btn btn-warning" onclick="coverShort('${ticker}',get('t-qty')?.value)">Cover short</button></div></div><div id="t-preview">${impactPreview(c,short.qty,'buy')}</div>`:''}
  </div>`;
  const qi=get('t-qty');if(qi){qi.addEventListener('input',()=>{const q=parseInt(qi.value)||0,p=get('t-preview');if(!p)return;if(mode==='buy')p.innerHTML=impactPreview(c,q,'buy');else if(mode==='sell')p.innerHTML=impactPreview(c,q,'sell');else if(mode==='short')p.innerHTML=shortPrev(c,q);else if(mode==='cover')p.innerHTML=impactPreview(c,q,'buy');});}
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});setTimeout(()=>buildChart('panel-chart',c),50);
}

async function convertBaseClass(parentTicker,classType,votesPerShare,restricted,whitelistIds,reason){
  const co=getCo(parentTicker);if(!co)return;
  const u=cu();
  if(!classType)return toast('Select a class type');
  votesPerShare=parseInt(votesPerShare);
  if(isNaN(votesPerShare)||votesPerShare<0)return toast('Enter valid votes per share');
  if(!reason||reason.trim().length<5)return toast('Please add a reason');
  // Check not already converted
  if(DB.shareClasses.find(c=>c.ticker===parentTicker))return toast('This stock is already classified');
  if(DB.classApps.find(a=>a.proposed_ticker===parentTicker&&a.status==='pending'))return toast('A conversion is already pending');
  const app={id:uid(),parent_ticker:parentTicker,proposed_ticker:parentTicker,
    class:classType,label:'Class '+classType,votes_per_share:votesPerShare,
    shares:co.shares,price:co.price,
    restricted:!!restricted,whitelist:whitelistIds||[],
    company_name:co.name,owner_id:u.id,status:'pending',
    reason:'[CONVERT] '+(reason||'').trim(),ts:ts()};
  await sb.post('jex_class_applications',app);
  DB.classApps.push(app);
  toast('Conversion request submitted — awaiting Chairman approval');
  UI.companyTab='classes';render();
}
function convertBaseClassForm(parentTicker){
  const classType=document.getElementById('conv-type')?.value;
  const votes=document.getElementById('conv-votes')?.value;
  const restrictedVal=document.getElementById('conv-restricted')?.value;
  const restricted=restrictedVal==='yes';
  const whitelistEl=document.getElementById('conv-whitelist');
  const whitelist=restricted&&whitelistEl?Array.from(whitelistEl.selectedOptions).map(o=>o.value):[];
  const reason=document.getElementById('conv-reason')?.value;
  convertBaseClass(parentTicker,classType,votes,restricted,whitelist,reason);
}

  html+='</div>';

  html+='<div class="card"><div class="section-title">Price charts</div>'
    +'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px">';

}

function submitClassAppForm(parentTicker){

async function adjustCash(uid2){
  const u=getUser(uid2);if(!u)return;
  const op=get('cash-op-'+uid2)?.value;
  const amt=parseFloat(get('cash-amt-'+uid2)?.value);
  if(isNaN(amt)||amt<0)return toast('Enter a valid amount');
  let newCash;
  if(op==='add')newCash=Math.round((u.cash+amt)*100)/100;
  else if(op==='subtract')newCash=Math.max(0,Math.round((u.cash-amt)*100)/100);
  else if(op==='set')newCash=Math.round(amt*100)/100;
  else return toast('Select an operation');
  const prev=u.cash;
  await updateUser(uid2,{cash:newCash});
  await logActivity('balance_adj',op==='add'?'+'+fmt(amt)+' added to '+u.name:op==='subtract'?'-'+fmt(amt)+' removed from '+u.name:''+u.name+"'s balance set to "+fmt(newCash),{userId:uid2,userName:u.name,amount:newCash-prev});
  toast(u.name+"'s balance updated to "+fmt(newCash));render();
}

// ═══════════════════════════════════════════════
// RENDER: TRADING HISTORY (per stock)
// ═══════════════════════════════════════════════
function renderTradingHistory(){
  const u=cu();
  const myTrades=DB.trades.filter(t=>t.buyer_id===u.id||t.seller_id===u.id);
  if(!myTrades.length)return`<div class="card"><div class="empty">No trades yet</div></div>`;
  // Group by ticker
  const byTicker={};
  myTrades.forEach(t=>{
    if(!byTicker[t.ticker])byTicker[t.ticker]={ticker:t.ticker,bought:0,boughtVal:0,sold:0,soldVal:0,trades:[]};
    const b=byTicker[t.ticker];
    if(t.buyer_id===u.id){b.bought+=t.qty;b.boughtVal+=t.qty*t.price;}
    else{b.sold+=t.qty;b.soldVal+=t.qty*t.price;}
    b.trades.push(t);
  });
  return`<div class="tab-row" style="margin-bottom:14px"><span style="font-size:13px;color:var(--text2)">Per-stock breakdown — ${Object.keys(byTicker).length} stock${Object.keys(byTicker).length!==1?'s':''} traded</span></div>
  ${Object.values(byTicker).map(g=>{
    const co=getCo(g.ticker);
    const realised=Math.round((g.soldVal-g.boughtVal*(g.sold/Math.max(g.bought,1)))*100)/100;
    return`<div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div><span style="font-weight:500;font-size:15px">${co?.name||g.ticker}</span> <span class="badge b-gray" style="font-family:var(--mono)">${g.ticker}</span></div>
        <div style="text-align:right;font-size:12px;color:var(--text2)">Current price: <span style="font-family:var(--mono);color:var(--text)">${co?fmt(co.price):'delisted'}</span></div>
      </div>
      <div class="grid4" style="margin-bottom:10px">
        <div class="mcard"><div class="mlabel">Total bought</div><div class="mval" style="font-size:16px">${g.bought} shares</div></div>
        <div class="mcard"><div class="mlabel">Spent</div><div class="mval" style="font-size:16px;font-family:var(--mono)">${fmt(g.boughtVal)}</div></div>
        <div class="mcard"><div class="mlabel">Total sold</div><div class="mval" style="font-size:16px">${g.sold} shares</div></div>
        <div class="mcard"><div class="mlabel">Realised P&L</div><div class="mval ${realised>=0?'green':'red'}" style="font-size:16px;font-family:var(--mono)">${realised>=0?'+':''}${fmt(realised)}</div></div>
      </div>
      <table><thead><tr><th>Time</th><th>Side</th><th>Qty</th><th>Price</th><th>Value</th><th>Type</th></tr></thead>
      <tbody>${[...g.trades].reverse().map(t=>`<tr>
        <td style="color:var(--text2)">${t.ts}</td>
        <td><span class="badge ${t.buyer_id===u.id?'b-teal':'b-red'}">${t.buyer_id===u.id?'bought':'sold'}</span></td>
        <td>${t.qty}</td>
        <td style="font-family:var(--mono)">${fmt(t.price)}</td>
        <td style="font-family:var(--mono)">${fmt(t.qty*t.price)}</td>
        <td><span class="badge b-gray">${t.type||'market'}</span></td>
      </tr>`).join('')}</tbody></table>
    </div>`;
  }).join('')}`;
}

// ═══════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════
function getPageContent(){
  const t=UI.navTab,u=cu();
  if(t==='market')return`<div id="market-content">${renderMarket()}</div>`;
  if(t==='news')return u.role==='company'?renderNewsPage():renderNewsFeed();
  if(t==='portfolio')return renderPortfolio();
  if(t==='leaderboard')return renderLeaderboard();
  if(t==='orders')return renderStudentOrders();
  if(t==='trades')return renderTrades(isAdmin(u));
  if(t==='apply')return renderApply();
  if(t==='mystock')return renderMyStock();
  if(t==='admin')return renderAdmin();
  if(t==='settings')return renderSettings();
  return '';
}
function render(){
  destroyCharts();
  const app=document.getElementById('app');
  if(!UI.userId){app.innerHTML=renderLogin();return;}
  const u=cu();if(!u){UI.userId=null;app.innerHTML=renderLogin();return;}
  app.innerHTML=`${renderTopbar()}${renderBanner()}${renderNav()}<div class="content">${getPageContent()}</div>`;
  if(DB.session.ends_at&&DB.session.status==='open'&&!sessionTimer)sessionTimer=setInterval(tickTimer,500);
  setTimeout(()=>{
    if(UI.navTab==='mystock'&&UI.companyTab==='stock'){
      const co=DB.companies.find(c=>c.owner_id===UI.userId);
      if(co){
        getCompanyTickers(co.ticker).forEach(ticker=>{
          const stock=getCo(ticker);
          if(stock)buildChart('co-chart-'+ticker,stock);
        });
      }
    }
    if(UI.navTab==='market')buildSparklines();
  },60);
}
function setTab(t){UI.navTab=t;UI.panelTicker=null;destroyCharts();render();}

// ═══════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════
async function boot(){
  if(!isConfigured()){document.getElementById('app').innerHTML=renderConfig();return;}
  try{
    await loadAll();
    const savedId=localStorage.getItem(SESSION_KEY);
    if(savedId&&DB.users.find(u=>u.id===savedId)){
      UI.userId=savedId;const u=DB.users.find(u=>u.id===savedId);
      UI.navTab=isAdmin(u)?'admin':u?.role==='company'?'apply':'market';
    }
    if(DB.session.ends_at&&DB.session.status==='open')sessionTimer=setInterval(tickTimer,500);
    render();
  }catch(err){
    document.getElementById('app').innerHTML=`<div class="config-page"><div class="config-card"><div style="font-family:var(--mono);font-size:20px;font-weight:600;margin-bottom:12px;color:var(--red)">Connection failed</div><div class="ibox ibox-red" style="margin-bottom:16px">Could not connect to Supabase.<br><br><strong>Error:</strong> ${err.message}</div><div style="font-size:13px;color:var(--text2);margin-bottom:12px">Check that your Supabase URL and anon key are correct.</div><button class="btn btn-primary" onclick="boot()">Retry</button></div></div>`;
  }
}
boot();
</script>
